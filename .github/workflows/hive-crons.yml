name: "Crons: Manual Trigger (legacy fallback)"

# Vercel native crons are the primary trigger (vercel.json).
# This workflow is kept for manual fallback only.
on:
  workflow_dispatch:
    inputs:
      endpoint:
        description: "Which cron to trigger (sentinel, metrics, digest, all)"
        required: false
        default: "sentinel"

jobs:
  trigger:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Determine which crons to run
        id: crons
        run: |
          MANUAL="${{ github.event.inputs.endpoint }}"
          if [ "$MANUAL" = "all" ]; then
            echo "run_sentinel=true" >> $GITHUB_OUTPUT
            echo "run_metrics=true" >> $GITHUB_OUTPUT
            echo "run_digest=true" >> $GITHUB_OUTPUT
          else
            echo "run_sentinel=$( [ '$MANUAL' = 'sentinel' ] && echo true || echo false )" >> $GITHUB_OUTPUT
            echo "run_metrics=$( [ '$MANUAL' = 'metrics' ] && echo true || echo false )" >> $GITHUB_OUTPUT
            echo "run_digest=$( [ '$MANUAL' = 'digest' ] && echo true || echo false )" >> $GITHUB_OUTPUT
          fi

      - name: Trigger Sentinel
        if: steps.crons.outputs.run_sentinel == 'true'
        run: |
          STATUS=$(curl -s -o /tmp/sentinel.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://hive-phi.vercel.app/api/cron/sentinel")
          echo "Sentinel HTTP $STATUS"
          cat /tmp/sentinel.json | head -c 2000
          [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]

      - name: Trigger Metrics
        if: steps.crons.outputs.run_metrics == 'true'
        run: |
          STATUS=$(curl -s -o /tmp/metrics.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://hive-phi.vercel.app/api/cron/metrics")
          echo "Metrics HTTP $STATUS"
          cat /tmp/metrics.json | head -c 2000
          [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]

      - name: Trigger Digest
        if: steps.crons.outputs.run_digest == 'true'
        run: |
          STATUS=$(curl -s -o /tmp/digest.json -w "%{http_code}" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://hive-phi.vercel.app/api/cron/digest")
          echo "Digest HTTP $STATUS"
          cat /tmp/digest.json | head -c 2000
          [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]
