name: Hive Digest (legacy)
run-name: "Digest: daily portfolio summary (legacy)"

# DEPRECATED: Digest now runs on Vercel cron at /api/cron/digest (daily 8am UTC)
# This workflow is kept as a manual fallback only
on:
  workflow_dispatch: {}

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install postgres

      - name: Build and send digest
        run: |
          node -e "
          const postgres = require('postgres');
          const sql = postgres(process.env.DATABASE_URL);

          async function buildDigest() {
            // Get digest email and Resend key from settings
            const settings = await sql\`SELECT key, value FROM settings WHERE key IN ('digest_email', 'resend_api_key', 'sending_domain')\`;
            const settingsMap = {};
            for (const s of settings) settingsMap[s.key] = s.value;

            if (!settingsMap.digest_email || !settingsMap.resend_api_key) {
              console.log('Digest skipped: digest_email or resend_api_key not configured');
              await sql.end();
              return;
            }

            // Portfolio summary (mrr/customers live in metrics, not companies)
            const companies = await sql\`
              SELECT c.slug, c.status, c.company_type,
                COALESCE(m.mrr, 0) as mrr,
                COALESCE(m.customers, 0) as customers
              FROM companies c
              LEFT JOIN (
                SELECT DISTINCT ON (company_id) company_id, mrr, customers
                FROM metrics ORDER BY company_id, date DESC
              ) m ON m.company_id = c.id
              WHERE c.status IN ('idea','approved','provisioning','mvp','active')
              ORDER BY c.status, c.slug
            \`;

            // Last 24h agent activity
            const actions = await sql\`
              SELECT agent, status, COUNT(*) as cnt
              FROM agent_actions
              WHERE finished_at > NOW() - INTERVAL '24 hours'
              GROUP BY agent, status
              ORDER BY agent
            \`;

            // Pending approvals
            const approvals = await sql\`
              SELECT gate_type, title FROM approvals
              WHERE status = 'pending'
              ORDER BY created_at
            \`;

            // Errors in last 24h
            const errors = await sql\`
              SELECT agent, error, company_id
              FROM agent_actions
              WHERE status = 'failed'
              AND finished_at > NOW() - INTERVAL '24 hours'
              ORDER BY finished_at DESC
              LIMIT 5
            \`;

            // Build email HTML
            const totalMrr = companies.reduce((sum, c) => sum + (parseFloat(c.mrr) || 0), 0);
            const totalCustomers = companies.reduce((sum, c) => sum + (parseInt(c.customers) || 0), 0);

            let html = '<h2>Hive Daily Digest</h2>';
            html += '<p><strong>Portfolio:</strong> ' + companies.length + ' companies | MRR: EUR ' + totalMrr.toFixed(2) + ' | Customers: ' + totalCustomers + '</p>';

            html += '<h3>Companies</h3><ul>';
            for (const c of companies) {
              html += '<li><strong>' + c.slug + '</strong> [' + c.status + '] — MRR: EUR ' + (parseFloat(c.mrr) || 0).toFixed(2) + ', ' + (c.customers || 0) + ' customers</li>';
            }
            html += '</ul>';

            if (actions.length > 0) {
              html += '<h3>Agent Activity (24h)</h3><ul>';
              for (const a of actions) {
                html += '<li>' + a.agent + ': ' + a.cnt + ' ' + a.status + '</li>';
              }
              html += '</ul>';
            }

            if (approvals.length > 0) {
              html += '<h3>Pending Approvals (' + approvals.length + ')</h3><ul>';
              for (const a of approvals) {
                html += '<li>[' + a.gate_type + '] ' + a.title + '</li>';
              }
              html += '</ul>';
            }

            if (errors.length > 0) {
              html += '<h3>Recent Errors</h3><ul>';
              for (const e of errors) {
                html += '<li>' + e.agent + ': ' + (e.error || 'unknown').slice(0, 200) + '</li>';
              }
              html += '</ul>';
            }

            html += '<p style=\"color:#888;font-size:12px\">Sent by Hive Sentinel at ' + new Date().toISOString() + '</p>';

            // Send via Resend
            const domain = settingsMap.sending_domain;
            const fromAddr = domain ? 'digest@' + domain : 'onboarding@resend.dev';

            const res = await fetch('https://api.resend.com/emails', {
              method: 'POST',
              headers: {
                Authorization: 'Bearer ' + settingsMap.resend_api_key,
                'Content-Type': 'application/json',
              },
              body: JSON.stringify({
                from: 'Hive <' + fromAddr + '>',
                to: [settingsMap.digest_email],
                subject: 'Hive Digest — ' + companies.length + ' cos, EUR ' + totalMrr.toFixed(2) + ' MRR, ' + approvals.length + ' pending',
                html: html,
              }),
            });

            if (res.ok) {
              console.log('Digest sent to ' + settingsMap.digest_email);
            } else {
              const err = await res.text();
              console.error('Resend error:', res.status, err);
            }

            // Log the digest action
            await sql\`
              INSERT INTO agent_actions (agent, action_type, status, description, started_at, finished_at)
              VALUES ('ops', 'daily_digest', 'success',
                \${'Digest sent: ' + companies.length + ' companies, EUR ' + totalMrr.toFixed(2) + ' MRR, ' + approvals.length + ' pending approvals'},
                NOW(), NOW())
            \`;

            await sql.end();
          }

          buildDigest().catch(e => { console.error('Digest failed:', e.message); process.exit(1); });
          "
