name: Neon Schema Diff

on:
  pull_request:
    branches: [main]
    paths: ['schema.sql']
    # Only run on improvement branches
    types: [opened, synchronize, reopened]

jobs:
  schema-diff:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    # Only run on improvement branches
    if: startsWith(github.head_ref, 'hive/improvement/')

    env:
      NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
      NEON_PROJECT_ID: ${{ secrets.NEON_PROJECT_ID }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create temporary Neon branch for schema diff
        id: create-branch
        run: |
          # Generate unique branch name based on PR
          TEMP_BRANCH_NAME="schema-diff-pr-${{ github.event.number }}-$(date +%s)"
          echo "temp_branch_name=$TEMP_BRANCH_NAME" >> $GITHUB_OUTPUT

          # Create temporary branch from main branch
          RESPONSE=$(curl -s -X POST \
            "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches" \
            -H "Authorization: Bearer $NEON_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "name": "'$TEMP_BRANCH_NAME'",
              "parent_id": "main"
            }')

          echo "Neon branch creation response: $RESPONSE"

          # Extract branch ID and database URL
          BRANCH_ID=$(echo "$RESPONSE" | jq -r '.id // empty')
          if [ -z "$BRANCH_ID" ]; then
            echo "Failed to create Neon branch"
            exit 1
          fi

          echo "temp_branch_id=$BRANCH_ID" >> $GITHUB_OUTPUT
          echo "Created temporary Neon branch: $TEMP_BRANCH_NAME (ID: $BRANCH_ID)"

      - name: Apply schema changes to temporary branch
        run: |
          # Get the connection string for the temporary branch
          TEMP_DB_RESPONSE=$(curl -s -X GET \
            "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches/${{ steps.create-branch.outputs.temp_branch_id }}" \
            -H "Authorization: Bearer $NEON_API_KEY")

          TEMP_DATABASE_URL=$(echo "$TEMP_DB_RESPONSE" | jq -r '.connection_uris[0].connection_uri // empty')

          if [ -z "$TEMP_DATABASE_URL" ]; then
            echo "Failed to get temporary database URL"
            exit 1
          fi

          echo "Applying schema.sql to temporary branch..."

          # Apply the new schema to the temporary branch
          npx tsx -e "
            import { readFileSync } from 'fs';
            import postgres from 'postgres';

            const sql = postgres('$TEMP_DATABASE_URL');
            const schema = readFileSync('schema.sql', 'utf8');

            try {
              await sql.unsafe(schema);
              console.log('Schema applied successfully');
            } catch (error) {
              console.error('Failed to apply schema:', error.message);
              process.exit(1);
            } finally {
              await sql.end();
            }
          "

      - name: Compare schema between branches
        id: schema-diff
        run: |
          echo "Comparing schema between main and temporary branch..."

          # Use Neon's compare_schema API
          DIFF_RESPONSE=$(curl -s -X POST \
            "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches/${{ steps.create-branch.outputs.temp_branch_id }}/schema_diff" \
            -H "Authorization: Bearer $NEON_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{
              "target_branch_id": "main"
            }')

          echo "Schema diff response: $DIFF_RESPONSE"

          # Extract the diff
          SCHEMA_DIFF=$(echo "$DIFF_RESPONSE" | jq -r '.diff // empty')

          if [ -z "$SCHEMA_DIFF" ]; then
            echo "No schema differences detected"
            SCHEMA_DIFF="No schema changes detected between branches."
          fi

          # Save diff to file for commenting
          echo "$SCHEMA_DIFF" > schema_diff.txt

          # Set output for commenting
          {
            echo 'schema_diff<<EOF'
            echo "$SCHEMA_DIFF"
            echo 'EOF'
          } >> $GITHUB_OUTPUT

      - name: Comment schema diff on PR
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const schemaDiff = `${{ steps.schema-diff.outputs.schema_diff }}`;

            const body = `## 🔍 Neon Schema Diff

            The following schema changes were detected:

            \`\`\`sql
            ${schemaDiff}
            \`\`\`

            ---

            *This diff was automatically generated by comparing the schema changes against the main branch using Neon's Schema Diff API.*

            **Branch created:** \`${{ steps.create-branch.outputs.temp_branch_name }}\`
            **Status:** Schema validation completed ✅
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });

      - name: Clean up temporary Neon branch
        if: always()
        run: |
          if [ -n "${{ steps.create-branch.outputs.temp_branch_id }}" ]; then
            echo "Deleting temporary Neon branch..."
            curl -s -X DELETE \
              "https://console.neon.tech/api/v2/projects/$NEON_PROJECT_ID/branches/${{ steps.create-branch.outputs.temp_branch_id }}" \
              -H "Authorization: Bearer $NEON_API_KEY"

            echo "Temporary branch ${{ steps.create-branch.outputs.temp_branch_name }} deleted"
          fi

      - name: Fail if schema validation errors
        run: |
          # Check if there were any validation errors in the diff
          if grep -i "error\|fail\|invalid" schema_diff.txt > /dev/null 2>&1; then
            echo "Schema validation errors detected. Please review the diff above."
            exit 1
          fi

          echo "Schema validation completed successfully ✅"