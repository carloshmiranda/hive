name: Hive Evolver
run-name: "Evolver: ${{ github.event.action || 'weekly' }} — ${{ github.event.inputs.focus || 'all' }}"

on:
  # No calendar cron — Evolver is triggered by data conditions via Sentinel:
  # - >10 completed cycles since last evolve
  # - High failure rate (>20% in 48h)
  # - Max turns exhaustion (2+ agents in 48h)
  # - Success rate drop (>15pp week-over-week)
  repository_dispatch:
    types:
      - evolve_trigger

  workflow_dispatch:
    inputs:
      focus:
        description: 'Focus area: all, outcome, capability, knowledge (default: all)'
        required: false
        default: 'all'

permissions:
  contents: write
  issues: write
  id-token: write

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}

# Prevent duplicate Evolver runs. cancel-in-progress: false queues rather than kills an in-progress run.
concurrency:
  group: hive-evolver
  cancel-in-progress: false

jobs:
  evolver:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get tokens via OIDC
        id: auth
        uses: ./.github/actions/get-hive-tokens
        with:
          tokens: "claude:claude_token:true"

      - name: Run Evolver agent
        id: agent
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          HIVE_URL: https://hive-phi.vercel.app
        uses: anthropics/claude-code-action@v1
        with:
          allowed_bots: "hive-orchestrator[bot]"
          claude_code_oauth_token: ${{ steps.auth.outputs.claude_token }}
          claude_args: "--model claude-opus-4-6 --max-turns 25 --allowedTools Bash,Read,Write,Edit"
          prompt: |
            You are the Evolver agent of Hive. Read prompts/evolver.md for your full role description.

            FOCUS: ${{ github.event.inputs.focus || github.event.client_payload.focus || 'all' }}
            TRIGGER: ${{ github.event_name }} (${{ github.event.action || 'scheduled' }})

            Read BRIEFING.md for current state context.

            ## STEP 1: Fetch Evolver context from the context API
            ```bash
            curl -s "$HIVE_URL/api/agents/context?agent=evolver" -H "Authorization: Bearer $CRON_SECRET"
            ```
            This returns pre-computed data for your three-layer gap detection:
            - agent_stats: success/failure counts per agent (14d)
            - cycle_scores: company scores (30d)
            - stalled_companies: mvp/active with no activity in 48h (CRITICAL if they have infra)
            - repeated_errors: errors occurring 3+ times (14d)
            - playbook_coverage: entries/confidence/unreferenced per domain
            - pending_proposals: your existing pending/deferred proposals (check for duplicates)

            Use this data to perform your three-layer gap detection (outcome, capability, knowledge).

            ## STEP 2: Check pipeline capacity and write proposals
            4. CHECK PIPELINE CAPACITY — Exit early if proposal pipeline is full:
               ```sql
               SELECT COUNT(*) as pending_count FROM evolver_proposals WHERE status IN ('pending', 'deferred')
               ```
               If pending_count > 5, output: {"analysis": {"pipeline_full": true}, "proposals": []}
               and exit. The review pipeline is at capacity.

            5. CHECK FOR DUPLICATES — Before creating proposals:
               ```sql
               SELECT id, title, status FROM evolver_proposals WHERE status IN ('pending', 'deferred')
               ```
               Use semantic comparison, not just exact title matches. Consider these similar:
               - "Agent performance regression: engineer" vs "Engineer agent failing frequently"
               - "Growth content quality issues" vs "Growth agent producing low-quality content"

            6. WRITE PROPOSALS to evolver_proposals table (max 5):
               ```sql
               INSERT INTO evolver_proposals (gap_type, severity, title, diagnosis, signal_source, signal_data, proposed_fix, affected_companies, cross_company)
               VALUES ($1, $2, $3, $4, $5, $6::jsonb, $7::jsonb, $8::text[], $9)
               ```

            7. UPDATE PLAYBOOK REFERENCES — For any playbook entries you consulted:
               ```sql
               UPDATE playbook SET last_referenced_at = NOW(), reference_count = reference_count + 1 WHERE id = $1
               ```

            8. LOG your analysis to agent_actions:
               ```sql
               INSERT INTO agent_actions (agent, action_type, description, status, output, started_at, finished_at)
               VALUES ('evolver', 'gap_analysis', $1, 'success', $2::jsonb, $3, NOW())
               ```

            9. Output your full JSON analysis (see prompts/evolver.md for format).

            RULES:
            - Never auto-implement. Every proposal goes through approval.
            - Include concrete evidence in signal_data.
            - Max 5 proposals per run. Quality over quantity.
            - Check for existing pending/deferred proposals to avoid duplicates.
            - If prompt evolution is needed, store new version in agent_prompts (is_active = false).

      # Evolver is a terminal node — no chain dispatch needed.

      - name: Job summary
        if: always()
        env:
          AGENT_OUTCOME: ${{ steps.agent.outcome }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          STATUS_ICON="${{ steps.agent.outcome == 'success' && '✅' || '❌' }}"
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          # ${STATUS_ICON} Evolver

          | Field | Value |
          |-------|-------|
          | Trigger | scheduled |
          | Outcome | ${AGENT_OUTCOME} |
          | Run | [View logs](${RUN_URL}) |
          EOF
