name: Hive Evolver
run-name: "Evolver: ${{ github.event.action || 'weekly' }} — ${{ github.event.inputs.focus || 'all' }}"

on:
  # No calendar cron — Evolver is triggered by data conditions via Sentinel:
  # - >10 completed cycles since last evolve
  # - High failure rate (>20% in 48h)
  # - Max turns exhaustion (2+ agents in 48h)
  # - Success rate drop (>15pp week-over-week)
  repository_dispatch:
    types:
      - evolve_trigger

  workflow_dispatch:
    inputs:
      focus:
        description: 'Focus area: all, outcome, capability, knowledge (default: all)'
        required: false
        default: 'all'

permissions:
  contents: write
  issues: write
  id-token: write

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}

jobs:
  evolver:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run Evolver agent
        id: agent
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model claude-opus-4-20250514 --max-turns 20 --allowedTools Bash,Read,Write,Edit"
          prompt: |
            You are the Evolver agent of Hive. Read prompts/evolver.md for your full role description.

            FOCUS: ${{ github.event.inputs.focus || github.event.client_payload.focus || 'all' }}
            TRIGGER: ${{ github.event_name }} (${{ github.event.action || 'scheduled' }})

            Read BRIEFING.md for current state context.

            Connect to the Neon database using DATABASE_URL and perform your three-layer gap detection:

            1. OUTCOME GAPS — Query agent_actions (last 14 days):
               ```sql
               SELECT agent,
                 COUNT(*) FILTER (WHERE status = 'success') as successes,
                 COUNT(*) FILTER (WHERE status = 'failed') as failures,
                 COUNT(*) as total
               FROM agent_actions
               WHERE started_at > now() - interval '14 days'
               GROUP BY agent
               ```
               Also query cycle scores:
               ```sql
               SELECT c.company_id, co.slug, c.cycle_number, c.ceo_review->>'score' as score
               FROM cycles c JOIN companies co ON co.id = c.company_id
               WHERE c.started_at > now() - interval '30 days'
               ORDER BY c.company_id, c.cycle_number DESC
               ```

            1b. STALLED COMPANIES — Companies with no agent activity at all:
               ```sql
               SELECT c.slug, c.status,
                 MAX(aa.finished_at) as last_activity,
                 (SELECT COUNT(*) FROM cycles cy WHERE cy.company_id = c.id) as total_cycles,
                 (SELECT COUNT(*) FROM infra i WHERE i.company_id = c.id) as infra_count
               FROM companies c
               LEFT JOIN agent_actions aa ON aa.company_id = c.id
               WHERE c.status IN ('mvp', 'active')
               GROUP BY c.id, c.slug, c.status
               HAVING MAX(aa.finished_at) < NOW() - INTERVAL '48 hours'
                  OR MAX(aa.finished_at) IS NULL
               ```
               If a company has infra but no activity in 48h, that's a CRITICAL gap — something in the dispatch chain is broken.

            2. CAPABILITY GAPS — Query escalations and repeated failures:
               ```sql
               SELECT agent, error, COUNT(*) as occurrences
               FROM agent_actions
               WHERE status = 'failed' AND started_at > now() - interval '14 days'
               GROUP BY agent, error
               HAVING COUNT(*) >= 3
               ```
               Also check company capabilities:
               ```sql
               SELECT slug, capabilities, company_type FROM companies WHERE status IN ('mvp', 'active')
               ```

            3. KNOWLEDGE GAPS — Query playbook coverage:
               ```sql
               SELECT domain, COUNT(*) as entries, AVG(confidence) as avg_confidence,
                 SUM(CASE WHEN reference_count = 0 AND created_at < now() - interval '14 days' THEN 1 ELSE 0 END) as unreferenced
               FROM playbook WHERE superseded_by IS NULL
               GROUP BY domain
               ```

            4. CHECK FOR DUPLICATES — Before creating proposals:
               ```sql
               SELECT id, title, status FROM evolver_proposals WHERE status IN ('pending', 'deferred')
               ```

            5. WRITE PROPOSALS to evolver_proposals table (max 5):
               ```sql
               INSERT INTO evolver_proposals (gap_type, severity, title, diagnosis, signal_source, signal_data, proposed_fix, affected_companies, cross_company)
               VALUES ($1, $2, $3, $4, $5, $6::jsonb, $7::jsonb, $8::text[], $9)
               ```

            6. UPDATE PLAYBOOK REFERENCES — For any playbook entries you consulted:
               ```sql
               UPDATE playbook SET last_referenced_at = NOW(), reference_count = reference_count + 1 WHERE id = $1
               ```

            7. LOG your analysis to agent_actions:
               ```sql
               INSERT INTO agent_actions (agent, action_type, description, status, output, started_at, finished_at)
               VALUES ('evolver', 'gap_analysis', $1, 'success', $2::jsonb, $3, NOW())
               ```

            8. Output your full JSON analysis (see prompts/evolver.md for format).

            RULES:
            - Never auto-implement. Every proposal goes through approval.
            - Include concrete evidence in signal_data.
            - Max 5 proposals per run. Quality over quantity.
            - Check for existing pending/deferred proposals to avoid duplicates.
            - If prompt evolution is needed, store new version in agent_prompts (is_active = false).

      # Evolver is a terminal node — no chain dispatch needed.
