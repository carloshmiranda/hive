name: Hive CEO
run-name: "CEO: ${{ github.event.action || github.event_name }} — ${{ github.event.client_payload.company || 'portfolio' }}"

on:
  repository_dispatch:
    types:
      - stripe_payment
      - cycle_complete
      - gate_approved
      - ceo_review
      - cycle_start

  workflow_dispatch:
    inputs:
      task:
        description: 'Override task (e.g. "review company X", "portfolio analysis")'
        required: false
        default: ''

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}

jobs:
  ceo:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get tokens via OIDC
        id: auth
        run: |
          OIDC_TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://hive-phi.vercel.app" \
            | jq -r '.value')

          fetch_token() {
            local TYPE="$1" OUTPUT_KEY="$2" CRITICAL="${3:-false}"
            RESPONSE=$(curl -s -X POST "https://hive-phi.vercel.app/api/agents/token" \
              -H "Authorization: Bearer $OIDC_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"token_type\":\"$TYPE\"}")
            VALUE=$(echo "$RESPONSE" | jq -r '.data.token // empty')
            if [ -n "$VALUE" ]; then
              echo "::add-mask::$VALUE"
              echo "${OUTPUT_KEY}=$VALUE" >> $GITHUB_OUTPUT
            else
              if [ "$CRITICAL" = "true" ]; then
                echo "FATAL: Failed to get $TYPE token: $(echo "$RESPONSE" | jq -r '.error // "unknown"')"
                exit 1
              else
                echo "WARNING: Failed to get $TYPE token (non-critical, continuing)"
              fi
            fi
          }

          fetch_token "claude" "claude_token" "true"
          fetch_token "github_pat" "gh_pat" "true"
          fetch_token "cron_secret" "cron_secret"

      - name: Build CEO context
        id: context
        env:
          DISPATCH_PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          EVENT="${{ github.event_name }}"
          TASK="${{ github.event.inputs.task }}"

          # Helper: write multiline-safe output using heredoc delimiters
          set_output() {
            local key="$1" value="$2"
            echo "${key}<<GHEOF" >> $GITHUB_OUTPUT
            echo "${value}" >> $GITHUB_OUTPUT
            echo "GHEOF" >> $GITHUB_OUTPUT
          }

          if [ "$EVENT" = "repository_dispatch" ]; then
            ACTION="${{ github.event.action }}"
            PAYLOAD="${DISPATCH_PAYLOAD}"
            set_output "trigger" "repository_dispatch:${ACTION}"
            set_output "payload" "${PAYLOAD}"
          else
            set_output "trigger" "manual${TASK:+: $TASK}"
            set_output "payload" "{\"task\":\"${TASK}\"}"
          fi

      - name: Run CEO agent
        id: agent
        env:
          GH_PAT: ${{ steps.auth.outputs.gh_pat }}
          CRON_SECRET: ${{ steps.auth.outputs.cron_secret }}
          HIVE_URL: https://hive-phi.vercel.app
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ steps.auth.outputs.claude_token }}
          claude_args: "--model claude-opus-4-20250514 --max-turns 40 --allowedTools Bash,Read,Write,Edit"
          prompt: |
            You are the CEO agent of Hive, an autonomous venture orchestrator.
            GH_PAT is available as $GH_PAT env var — use it for all gh commands: `GH_TOKEN="$GH_PAT" gh ...`
            DATABASE_URL is set for Neon queries. HIVE_URL and CRON_SECRET are set for API calls.

            TRIGGER: ${{ steps.context.outputs.trigger }}
            PAYLOAD: ${{ steps.context.outputs.payload }}

            ## Context loading (be efficient — do NOT read CLAUDE.md)
            1. Read `prompts/ceo.md` for your role, validation phases, and output format
            2. Only read `BRIEFING.md` if trigger is cycle_start or cycle_complete (skip for ceo_review)
            3. Fetch validation context: curl -s "$HIVE_URL/api/agents/context?agent=build&company_slug=<slug>" -H "Authorization: Bearer $CRON_SECRET"

            ## Trigger-specific instructions

            **cycle_start**: Plan a new cycle for the company.
            - Load research reports, product spec, directives from DB
            - Create engineering_tasks and growth_tasks gated by validation phase
            - Save updated product_spec to research_reports (UPSERT)
            - Output: { "company": "slug", "needs_research": bool, "needs_feature": bool, "needs_provisioning": bool }

            **cycle_complete**: Score the cycle 1-10.
            - Find cycle: SELECT id FROM cycles WHERE company_id = '<id>' ORDER BY started_at DESC LIMIT 1
            - Save review: curl -X PATCH "$HIVE_URL/api/cycles/<cycle_id>/review" -H "Authorization: Bearer $CRON_SECRET" -H "Content-Type: application/json" -d '{"ceo_review": {"review": {"score": N, "agent_grades": {...}, "kill_flag": false, "validation_phase": "...", "summary": "...", "next_priorities": [...]}}, "status": "completed"}'
            - CRITICAL: Without saving, the score is lost and validation gating breaks.

            **ceo_review**: Review and merge PRs. Read `prompts/ceo-review.md` for the full process.
            - Payload has `company` and `pr_number` — review that PR first
            - Then check for ALL open PRs: GH_TOKEN="$GH_PAT" gh pr list --repo carloshmiranda/<company> --state open --json number,title
            - Review each one following prompts/ceo-review.md

            **gate_approved**: Route the approval.
            - If gate_type is 'new_company': output { "needs_provisioning": true, "company": "<slug>" }

            **stripe_payment**: Review revenue impact, update company status if first revenue.

            **manual / directive**: Execute the specified task.

            Write ALL decisions to the database. Output JSON at the end.

      - name: Log failure to DB
        if: always() && steps.agent.outcome == 'failure'
        run: |
          npm install --no-save postgres 2>/dev/null
          EXEC_FILE="${{ steps.agent.outputs.execution_file }}"
          if [ -z "$EXEC_FILE" ] || [ ! -f "$EXEC_FILE" ]; then
            EXEC_FILE="/home/runner/work/_temp/claude-execution-output.json"
          fi

          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ -f "$EXEC_FILE" ] && [ -s "$EXEC_FILE" ]; then
            SUBTYPE=$(jq -r '.[-1].subtype // "unknown"' "$EXEC_FILE" 2>/dev/null || echo "unknown")
            TURNS=$(jq -r '.[-1].num_turns // 0' "$EXEC_FILE" 2>/dev/null || echo "0")
            COST=$(jq -r '.[-1].total_cost_usd // 0' "$EXEC_FILE" 2>/dev/null || echo "0")
            ERROR_MSG=$(jq -r '
              (.[-1].error // null) as $e1 |
              (.[-1].result // null) as $e2 |
              ([.[] | select(.type == "system" or .type == "error")] | last | .error // .result // null) as $e3 |
              ($e1 // $e2 // $e3 // "No error detail in execution output") | tostring | .[0:300]
            ' "$EXEC_FILE" 2>/dev/null || echo "Failed to parse execution file")
          else
            SUBTYPE="workflow_crash"
            TURNS="0"
            COST="0"
            ERROR_MSG="No execution output — CEO agent never started. Run: ${RUN_URL}"
          fi

          ERROR_FULL="error_${SUBTYPE}: ${ERROR_MSG} (${TURNS} turns) ${RUN_URL}"

          # 0-turn = ghost run (workflow issue, not real agent failure)
          LOG_STATUS="failed"
          if [ "$TURNS" = "0" ]; then LOG_STATUS="skipped"; fi

          node -e "
          const postgres = require('postgres');
          const sql = postgres(process.env.DATABASE_URL);
          async function log() {
            await sql\`
              INSERT INTO agent_actions (agent, action_type, status, error, output, started_at, finished_at)
              VALUES ('ceo', '${{ steps.context.outputs.trigger }}', '${LOG_STATUS}',
                \${process.env.ERROR_FULL},
                \${JSON.stringify({subtype: '${SUBTYPE}', turns: parseInt('${TURNS}'), cost: parseFloat('${COST}'), run_url: '${RUN_URL}'})}::jsonb,
                NOW() - INTERVAL '${TURNS} minutes', NOW())
            \`;
            await sql.end();
          }
          log().catch(e => console.error('DB log failed:', e.message));
          "
          echo "Logged CEO failure: $SUBTYPE ($TURNS turns) — ${ERROR_MSG:0:100}"

          # Send enriched Telegram notification for failures (skip ghost runs)
          if [ "$LOG_STATUS" = "failed" ]; then
            COMPANY=$(echo '${{ steps.context.outputs.payload }}' | jq -r '.company // ""' 2>/dev/null || echo "")
            ESCAPED_ERR=$(echo "$ERROR_MSG" | sed 's/"/\\"/g' | head -c 200)
            curl -s -X POST "https://hive-phi.vercel.app/api/notify" \
              -H "Authorization: Bearer $CRON_SECRET" \
              -H "Content-Type: application/json" \
              -d "{\"agent\":\"ceo\",\"action\":\"${{ steps.context.outputs.trigger }}\",\"company\":\"$COMPANY\",\"status\":\"failed\",\"summary\":\"${SUBTYPE} after ${TURNS} turns (\$${COST})\",\"error\":\"$ESCAPED_ERR\",\"run_url\":\"$RUN_URL\",\"duration_s\":$((TURNS * 60))}" || true
          fi

      - name: Chain dispatch
        if: always() && steps.agent.outcome == 'success'
        env:
          GH_TOKEN: ${{ steps.auth.outputs.gh_pat }}
          CRON_SECRET: ${{ steps.auth.outputs.cron_secret }}
          HIVE_URL: https://hive-phi.vercel.app
          DISPATCH_PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          set +e  # Prevent grep/jq exit codes from crashing the step
          RESULT=$(jq -r '[.[] | select(.type == "assistant")] | last | [.message.content[] | select(.type == "text") | .text] | join("\n")' "${{ steps.agent.outputs.execution_file }}" 2>/dev/null || echo "{}")
          REPO="${{ github.repository }}"
          TRIGGER="${{ steps.context.outputs.trigger }}"
          TRACE_ID=$(echo "${DISPATCH_PAYLOAD}" | jq -r '.trace_id // empty' 2>/dev/null || echo "")
          echo "Chain dispatch parsing last assistant output (${#RESULT} chars)"
          echo "Trigger: $TRIGGER"
          echo "Trace ID: $TRACE_ID"

          dispatch() {
            curl -s -X POST "https://api.github.com/repos/$REPO/dispatches" \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              -d "{\"event_type\":\"$1\",\"client_payload\":$2}"
            echo "  Dispatched: $1"
          }

          # Extract company: try output first, then input payload (multiple fallbacks)
          COMPANY=$(echo "$RESULT" | grep -oP '"company"\s*:\s*"\K[^"]+' | head -1 || echo "")
          if [ -z "$COMPANY" ]; then
            COMPANY=$(echo "${DISPATCH_PAYLOAD}" | jq -r '.company // ""' 2>/dev/null || echo "")
          fi
          # Also extract company_id for downstream agents
          COMPANY_ID=$(echo "$RESULT" | grep -oP '"company_id"\s*:\s*"\K[^"]+' | head -1 || echo "")
          if [ -z "$COMPANY_ID" ]; then
            COMPANY_ID=$(echo "${DISPATCH_PAYLOAD}" | jq -r '.company_id // ""' 2>/dev/null || echo "")
          fi
          GITHUB_REPO=""
          echo "Company: $COMPANY | Company ID: $COMPANY_ID"

          # Guard: if no company found, skip all dispatches
          if [ -z "$COMPANY" ]; then
            echo "WARNING: No company slug found in output or payload — skipping dispatches"
            echo "Chain dispatch complete (no company)"
            exit 0
          fi

          # Detect signals: strict JSON-only matching (no prose matching to avoid false positives)
          check_signal() {
            echo "$RESULT" | grep -qP "\"${1}\"\s*:\s*true" && return 0
            return 1
          }

          # Build reusable payload with company + company_id + trace_id
          BASE_PAYLOAD="\"company\":\"$COMPANY\",\"company_id\":\"$COMPANY_ID\""
          if [ -n "$TRACE_ID" ]; then
            BASE_PAYLOAD="$BASE_PAYLOAD,\"trace_id\":\"$TRACE_ID\""
          fi

          # Only dispatch downstream agents for cycle_start (not cycle_complete — avoids infinite loop)
          IS_CYCLE_START=false
          echo "$TRIGGER" | grep -q "cycle_start" && IS_CYCLE_START=true

          if [ "$IS_CYCLE_START" = "true" ]; then
            # Chain to Engineer for provisioning (only if explicitly flagged)
            if check_signal "needs_provisioning"; then
              dispatch "new_company" "{\"source\":\"ceo\",$BASE_PAYLOAD}"
            fi

            # Chain to Scout if research needed
            if check_signal "needs_research"; then
              dispatch "research_request" "{\"source\":\"ceo\",$BASE_PAYLOAD}"
            fi

            # Define dispatch helpers (must be before first call)
            dispatch_worker() {
              local WORKER_PAYLOAD="{\"company_slug\":\"$COMPANY\",\"agent\":\"$1\",\"trigger\":\"ceo_plan\""
              if [ -n "$TRACE_ID" ]; then
                WORKER_PAYLOAD="$WORKER_PAYLOAD,\"trace_id\":\"$TRACE_ID\""
              fi
              WORKER_PAYLOAD="$WORKER_PAYLOAD}"
              curl -s -X POST "$HIVE_URL/api/agents/dispatch" \
                -H "Authorization: Bearer $CRON_SECRET" \
                -H "Content-Type: application/json" \
                -d "$WORKER_PAYLOAD" \
                -o /dev/null -w "  Worker $1: HTTP %{http_code}\n" || true
            }
            dispatch_to_company_repo() {
              local WORKFLOW="$1" SUMMARY="$2"
              # Get company's github_repo from DB (cached after first call)
              if [ -z "$GITHUB_REPO" ]; then
                GITHUB_REPO=$(node -e "
                  const postgres = require('postgres');
                  const sql = postgres(process.env.DATABASE_URL);
                  sql\`SELECT github_repo FROM companies WHERE slug = '${COMPANY}' LIMIT 1\`
                    .then(r => { console.log(r[0]?.github_repo || ''); sql.end(); })
                    .catch(() => { console.log(''); process.exit(0); });
                " 2>/dev/null)
              fi
              if [ -n "$GITHUB_REPO" ]; then
                curl -s -X POST "https://api.github.com/repos/${GITHUB_REPO}/actions/workflows/${WORKFLOW}/dispatches" \
                  -H "Authorization: token $GH_TOKEN" \
                  -H "Accept: application/vnd.github.v3+json" \
                  -H "Content-Type: application/json" \
                  -d "{\"ref\":\"main\",\"inputs\":{\"company_slug\":\"$COMPANY\",\"trigger\":\"ceo_plan\",\"task_summary\":\"$SUMMARY\"}}" \
                  -o /dev/null -w "  Company $WORKFLOW: HTTP %{http_code}\n" || dispatch_worker "$3"
              else
                dispatch_worker "$3"
              fi
            }

            # Chain to Engineer → dispatch directly to company repo (free Actions)
            # Falls back to Hive Engineer only if no company repo exists
            dispatch_to_company_repo "hive-build.yml" "Feature build for $COMPANY" ""
            if [ -z "$GITHUB_REPO" ]; then
              dispatch "feature_request" "{\"source\":\"ceo\",$BASE_PAYLOAD}"
            fi

            # Growth → company repo (Claude, free) with Vercel fallback
            echo "$RESULT" | grep -qiP "growth_tasks|growth_strategy|content.?calendar" && \
              dispatch_to_company_repo "hive-growth.yml" "Growth cycle for $COMPANY" "growth"
            # Outreach → Vercel serverless (Gemini, doesn't need repo access)
            echo "$RESULT" | grep -qiP "outreach_tasks|lead.?list|cold.?email" && \
              dispatch_worker "outreach"

            # Dispatch cycle_complete ONCE (for review/reflection after agents finish)
            dispatch "cycle_complete" "{\"source\":\"ceo\",$BASE_PAYLOAD}"
          fi

          # For gate_approved: only dispatch the specific action needed
          if echo "$TRIGGER" | grep -q "gate_approved"; then
            if check_signal "needs_provisioning"; then
              dispatch "new_company" "{\"source\":\"ceo\",$BASE_PAYLOAD}"
            fi
          fi

          # cycle_complete / ceo_review: trigger post-cycle consolidation + chain next company
          # This feeds CEO review outcomes back into the playbook (learning loop)
          if echo "$TRIGGER" | grep -qE "cycle_complete|ceo_review"; then
            echo "Triggering post-cycle consolidation..."
            curl -s -X POST "$HIVE_URL/api/agents/consolidate" \
              -H "Authorization: Bearer $CRON_SECRET" \
              -H "Content-Type: application/json" \
              -d "{\"company_slug\":\"$COMPANY\"}" \
              -o /dev/null -w "  Consolidation: HTTP %{http_code}\n" || true

            # Chain dispatch: cycle done → health gate → next company
            echo "Chaining to next company cycle..."
            CHAIN_RESULT=$(curl -s -X POST "$HIVE_URL/api/dispatch/cycle-complete" \
              -H "Authorization: Bearer $CRON_SECRET" \
              -H "Content-Type: application/json" \
              -d "{\"agent\":\"ceo\",\"company\":\"$COMPANY\",\"status\":\"cycle_complete\",\"action_type\":\"cycle_review\"}")
            echo "  Chain result: $CHAIN_RESULT"
          fi

          # Notify success via Telegram
          EXEC_FILE="${{ steps.agent.outputs.execution_file }}"
          if [ -z "$EXEC_FILE" ]; then EXEC_FILE="/home/runner/work/_temp/claude-execution-output.json"; fi
          CEO_TURNS=$(jq -r '.[-1].num_turns // 0' "$EXEC_FILE" 2>/dev/null || echo "0")
          CEO_COST=$(jq -r '.[-1].total_cost_usd // 0' "$EXEC_FILE" 2>/dev/null || echo "0")
          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "$HIVE_URL/api/notify" \
            -H "Authorization: Bearer $CRON_SECRET" \
            -H "Content-Type: application/json" \
            -d "{\"agent\":\"ceo\",\"action\":\"$TRIGGER\",\"company\":\"$COMPANY\",\"status\":\"success\",\"summary\":\"Completed in ${CEO_TURNS} turns (\$${CEO_COST})\",\"run_url\":\"$RUN_URL\",\"duration_s\":$((CEO_TURNS * 60))}" || true

          echo "Chain dispatch complete"
