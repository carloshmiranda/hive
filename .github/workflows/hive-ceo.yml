name: Hive CEO
run-name: "CEO: ${{ github.event.action || github.event_name }} — ${{ github.event.client_payload.company || 'portfolio' }}"

on:
  repository_dispatch:
    types:
      - stripe_payment
      - cycle_complete
      - gate_approved
      - ceo_review
      - cycle_start

  issues:
    types: [opened, labeled]

  pull_request:
    types: [opened]

  workflow_dispatch:
    inputs:
      task:
        description: 'Override task (e.g. "review company X", "portfolio analysis")'
        required: false
        default: ''

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}

jobs:
  ceo:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Only run on issues with directive/research labels
    if: >
      github.event_name != 'issues' ||
      contains(github.event.issue.labels.*.name, 'directive') ||
      contains(github.event.issue.labels.*.name, 'hive-directive')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build CEO context
        id: context
        run: |
          EVENT="${{ github.event_name }}"
          TASK="${{ github.event.inputs.task }}"

          # Helper: write multiline-safe output using heredoc delimiters
          set_output() {
            local key="$1" value="$2"
            echo "${key}<<GHEOF" >> $GITHUB_OUTPUT
            echo "${value}" >> $GITHUB_OUTPUT
            echo "GHEOF" >> $GITHUB_OUTPUT
          }

          if [ "$EVENT" = "repository_dispatch" ]; then
            ACTION="${{ github.event.action }}"
            PAYLOAD='${{ toJson(github.event.client_payload) }}'
            set_output "trigger" "repository_dispatch:${ACTION}"
            set_output "payload" "${PAYLOAD}"
          elif [ "$EVENT" = "issues" ]; then
            set_output "trigger" "issue:#${{ github.event.issue.number }} ${{ github.event.issue.title }}"
            set_output "payload" "{\"issue_number\":${{ github.event.issue.number }},\"title\":\"${{ github.event.issue.title }}\"}"
          elif [ "$EVENT" = "pull_request" ]; then
            set_output "trigger" "pr:#${{ github.event.pull_request.number }} ${{ github.event.pull_request.title }}"
            set_output "payload" "{\"pr_number\":${{ github.event.pull_request.number }}}"
          else
            set_output "trigger" "manual${TASK:+: $TASK}"
            set_output "payload" "{\"task\":\"${TASK}\"}"
          fi

      - name: Run CEO agent
        id: agent
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model claude-opus-4-20250514 --max-turns 25 --allowedTools Bash,Read,Write,Edit"
          prompt: |
            You are the CEO agent of Hive, an autonomous venture orchestrator.

            TRIGGER: ${{ steps.context.outputs.trigger }}
            PAYLOAD: ${{ steps.context.outputs.payload }}

            Read BRIEFING.md, CLAUDE.md, and prompts/ceo.md for full context. Then:

            1. Query Neon (DATABASE_URL is set) for: active companies, pending approvals, recent metrics, open directives
            2. Determine lifecycle mode for each company you're acting on:
               - Count cycles for the company
               - Check if revenue > 0 and customers > 0
               - If cycles <= 2 OR no customers: you are in BUILD mode — read research reports and spec features with acceptance criteria
               - If cycles 3-5 AND no paying customers: you are in LAUNCH mode — focus on conversion with hypotheses
               - If cycles 6+ AND has customers: you are in OPTIMIZE mode — manage by metrics
               - Load the original Scout proposal from the approvals table (gate_type='new_company', status='approved')
               - Load ALL research reports for this company (market_research, competitive_analysis, seo_keywords)
               - Load the previous product spec: `SELECT content FROM research_reports WHERE company_id = '<id>' AND report_type = 'product_spec'` — UPDATE it, don't rewrite from scratch
               - After planning, ALWAYS save the updated product_spec to research_reports (UPSERT on company_id + report_type = 'product_spec')
            3. Based on the trigger:
               - stripe_payment: Review revenue impact, update company status if first revenue, plan next actions
               - cycle_complete: Score the cycle 1-10 using mode-specific criteria from prompts/ceo.md
               - gate_approved: Route the approval. If gate_type is 'new_company', output needs_provisioning: true so Engineer can scaffold the repo, Vercel project, Neon DB, and Stripe product. Include the company slug.
               - cycle_start: Start a new cycle for the specified company. Load research reports, determine lifecycle mode, create a cycle plan with engineering_tasks and growth_tasks.
               - ceo_review: Do portfolio analysis across all companies
               - issue/directive: Decompose into tasks, assign to agents
               - PR opened: Review for strategic alignment
               - manual: Execute the specified task
            4. Write your plan to the cycles table using the output format matching your lifecycle mode
            5. Output JSON with: { "actions": [...], "needs_research": bool, "needs_feature": bool, "needs_provisioning": bool, "company": "slug" }

            IMPORTANT: Write ALL decisions to the database. Update BRIEFING.md if state changed.

      - name: Log failure to DB
        if: always() && steps.agent.outcome == 'failure'
        run: |
          npm install --no-save postgres 2>/dev/null
          EXEC_FILE="${{ steps.agent.outputs.execution_file }}"
          SUBTYPE=$(jq -r '.[-1].subtype // "unknown"' "$EXEC_FILE" 2>/dev/null || echo "unknown")
          TURNS=$(jq -r '.[-1].num_turns // 0' "$EXEC_FILE" 2>/dev/null || echo "0")
          COST=$(jq -r '.[-1].total_cost_usd // 0' "$EXEC_FILE" 2>/dev/null || echo "0")

          node -e "
          const postgres = require('postgres');
          const sql = postgres(process.env.DATABASE_URL);
          async function log() {
            await sql\`
              INSERT INTO agent_actions (agent, action_type, status, error, output, started_at, finished_at)
              VALUES ('ceo', '${{ steps.context.outputs.trigger }}', 'failed',
                \${'error_' + '${SUBTYPE}' + ': exhausted after ${TURNS} turns'},
                \${JSON.stringify({subtype: '${SUBTYPE}', turns: parseInt('${TURNS}'), cost: parseFloat('${COST}')})}::jsonb,
                NOW() - INTERVAL '${TURNS} minutes', NOW())
            \`;
            await sql.end();
          }
          log().catch(e => console.error('DB log failed:', e.message));
          "
          echo "Logged CEO failure: $SUBTYPE ($TURNS turns)"

      - name: Chain dispatch
        if: always() && steps.agent.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          HIVE_URL: https://hive-phi.vercel.app
        run: |
          set +e  # Prevent grep/jq exit codes from crashing the step
          RESULT=$(jq -r '[.[] | select(.type == "assistant")] | last | [.message.content[] | select(.type == "text") | .text] | join("\n")' "${{ steps.agent.outputs.execution_file }}" 2>/dev/null || echo "{}")
          REPO="${{ github.repository }}"
          TRIGGER="${{ steps.context.outputs.trigger }}"
          echo "Chain dispatch parsing last assistant output (${#RESULT} chars)"
          echo "Trigger: $TRIGGER"

          dispatch() {
            curl -s -X POST "https://api.github.com/repos/$REPO/dispatches" \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              -d "{\"event_type\":\"$1\",\"client_payload\":$2}"
            echo "  Dispatched: $1"
          }

          # Extract company: try output first, then input payload (multiple fallbacks)
          COMPANY=$(echo "$RESULT" | grep -oP '"company"\s*:\s*"\K[^"]+' | head -1 || echo "")
          if [ -z "$COMPANY" ]; then
            COMPANY=$(echo '${{ toJson(github.event.client_payload) }}' | jq -r '.company // ""' 2>/dev/null || echo "")
          fi
          # Also extract company_id for downstream agents
          COMPANY_ID=$(echo "$RESULT" | grep -oP '"company_id"\s*:\s*"\K[^"]+' | head -1 || echo "")
          if [ -z "$COMPANY_ID" ]; then
            COMPANY_ID=$(echo '${{ toJson(github.event.client_payload) }}' | jq -r '.company_id // ""' 2>/dev/null || echo "")
          fi
          echo "Company: $COMPANY | Company ID: $COMPANY_ID"

          # Guard: if no company found, skip all dispatches
          if [ -z "$COMPANY" ]; then
            echo "WARNING: No company slug found in output or payload — skipping dispatches"
            echo "Chain dispatch complete (no company)"
            exit 0
          fi

          # Detect signals: strict JSON-only matching (no prose matching to avoid false positives)
          check_signal() {
            echo "$RESULT" | grep -qP "\"${1}\"\s*:\s*true" && return 0
            return 1
          }

          # Build reusable payload with company + company_id
          BASE_PAYLOAD="\"company\":\"$COMPANY\",\"company_id\":\"$COMPANY_ID\""

          # Only dispatch downstream agents for cycle_start (not cycle_complete — avoids infinite loop)
          IS_CYCLE_START=false
          echo "$TRIGGER" | grep -q "cycle_start" && IS_CYCLE_START=true

          if [ "$IS_CYCLE_START" = "true" ]; then
            # Chain to Engineer for provisioning (only if explicitly flagged)
            if check_signal "needs_provisioning"; then
              dispatch "new_company" "{\"source\":\"ceo\",$BASE_PAYLOAD}"
            fi

            # Chain to Scout if research needed
            if check_signal "needs_research"; then
              dispatch "research_request" "{\"source\":\"ceo\",$BASE_PAYLOAD}"
            fi

            # Chain to Engineer for features
            dispatch "feature_request" "{\"source\":\"ceo\",$BASE_PAYLOAD}"

            # Chain to workers — Growth on company repo (free), Outreach on Vercel serverless
            dispatch_worker() {
              curl -s -X POST "$HIVE_URL/api/agents/dispatch" \
                -H "Authorization: Bearer $CRON_SECRET" \
                -H "Content-Type: application/json" \
                -d "{\"company_slug\":\"$COMPANY\",\"agent\":\"$1\",\"trigger\":\"ceo_plan\"}" \
                -o /dev/null -w "  Worker $1: HTTP %{http_code}\n" || true
            }
            dispatch_to_company_repo() {
              local WORKFLOW="$1" SUMMARY="$2"
              # Get company's github_repo from DB
              GITHUB_REPO=$(node -e "
                const postgres = require('postgres');
                const sql = postgres(process.env.DATABASE_URL);
                sql\`SELECT github_repo FROM companies WHERE slug = '${COMPANY}' LIMIT 1\`
                  .then(r => { console.log(r[0]?.github_repo || ''); sql.end(); })
                  .catch(() => { console.log(''); process.exit(0); });
              " 2>/dev/null)
              if [ -n "$GITHUB_REPO" ]; then
                curl -s -X POST "https://api.github.com/repos/${GITHUB_REPO}/actions/workflows/${WORKFLOW}/dispatches" \
                  -H "Authorization: token $GH_PAT" \
                  -H "Accept: application/vnd.github.v3+json" \
                  -H "Content-Type: application/json" \
                  -d "{\"ref\":\"main\",\"inputs\":{\"company_slug\":\"$COMPANY\",\"trigger\":\"ceo_plan\",\"task_summary\":\"$SUMMARY\"}}" \
                  -o /dev/null -w "  Company $WORKFLOW: HTTP %{http_code}\n" || dispatch_worker "$3"
              else
                dispatch_worker "$3"
              fi
            }
            # Growth → company repo (Claude, free) with Vercel fallback
            echo "$RESULT" | grep -qiP "growth_tasks|growth_strategy|content.?calendar" && \
              dispatch_to_company_repo "hive-growth.yml" "Growth cycle for $COMPANY" "growth"
            # Outreach → Vercel serverless (Gemini, doesn't need repo access)
            echo "$RESULT" | grep -qiP "outreach_tasks|lead.?list|cold.?email" && \
              dispatch_worker "outreach"

            # Dispatch cycle_complete ONCE (for review/reflection after agents finish)
            dispatch "cycle_complete" "{\"source\":\"ceo\",$BASE_PAYLOAD}"
          fi

          # For gate_approved: only dispatch the specific action needed
          if echo "$TRIGGER" | grep -q "gate_approved"; then
            if check_signal "needs_provisioning"; then
              dispatch "new_company" "{\"source\":\"ceo\",$BASE_PAYLOAD}"
            fi
          fi

          # cycle_complete: NO further dispatches (prevents infinite loop)
          # The CEO reviews the cycle and writes to DB — no chaining needed

          echo "Chain dispatch complete"
