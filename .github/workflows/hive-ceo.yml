name: Hive CEO
run-name: "CEO: ${{ github.event.action || github.event_name }} — ${{ github.event.client_payload.company || 'portfolio' }}"

on:
  repository_dispatch:
    types:
      - stripe_payment
      - cycle_complete
      - gate_approved
      - ceo_review
      - cycle_start

  workflow_dispatch:
    inputs:
      task:
        description: 'Override task (e.g. "review company X", "portfolio analysis")'
        required: false
        default: ''

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}

# Prevent duplicate CEO runs. cancel-in-progress: false queues rather than kills an in-progress run.
concurrency:
  group: hive-ceo-${{ github.event.client_payload.company || 'portfolio' }}
  cancel-in-progress: false

jobs:
  ceo:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get tokens via OIDC
        id: auth
        uses: ./.github/actions/get-hive-tokens
        with:
          tokens: "claude:claude_token:true github_pat:gh_pat:true"

      - name: Verify GitHub token scopes
        id: token_check
        continue-on-error: true
        env:
          GH_PAT: ${{ steps.auth.outputs.gh_pat }}
        run: |
          # Verify the token can reach the repo (basic connectivity)
          if ! gh api /repos/carloshmiranda/hive --silent 2>/dev/null; then
            echo "::error::GH_PAT lacks repo access — check token scopes or App installation permissions"
            exit 1
          fi

          # Probe issues:write by checking the X-OAuth-Scopes header.
          # For GitHub App tokens this header may be absent — that's OK; we log what we see.
          SCOPES=$(curl -s -I -H "Authorization: Bearer $GH_PAT" \
            https://api.github.com/repos/carloshmiranda/hive \
            | grep -i "^x-oauth-scopes:" | tr -d '\r' || true)

          if [ -n "$SCOPES" ]; then
            echo "Token scopes: $SCOPES"
            if echo "$SCOPES" | grep -qi "issues"; then
              echo "issues:write scope confirmed"
            else
              echo "::warning::issues:write scope NOT present in token — CEO escalation comments will fail with 403. Grant issues:write to the GitHub App installation or update the PAT in settings."
            fi
          else
            echo "No X-OAuth-Scopes header (expected for GitHub App installation tokens — fine-grained permissions apply)"
          fi

      - name: Build CEO context
        id: context
        env:
          DISPATCH_PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          EVENT="${{ github.event_name }}"
          TASK="${{ github.event.inputs.task }}"

          # Helper: write multiline-safe output using heredoc delimiters
          set_output() {
            local key="$1" value="$2"
            echo "${key}<<GHEOF" >> $GITHUB_OUTPUT
            echo "${value}" >> $GITHUB_OUTPUT
            echo "GHEOF" >> $GITHUB_OUTPUT
          }

          if [ "$EVENT" = "repository_dispatch" ]; then
            ACTION="${{ github.event.action }}"
            PAYLOAD="${DISPATCH_PAYLOAD}"
            set_output "trigger" "repository_dispatch:${ACTION}"
            set_output "payload" "${PAYLOAD}"
          else
            set_output "trigger" "manual${TASK:+: $TASK}"
            set_output "payload" "{\"task\":\"${TASK}\"}"
          fi

      - name: Run CEO agent
        id: agent
        env:
          GH_PAT: ${{ steps.auth.outputs.gh_pat }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          HIVE_URL: https://hive-phi.vercel.app
        uses: anthropics/claude-code-action@v1
        with:
          allowed_bots: "hive-orchestrator[bot]"
          claude_code_oauth_token: ${{ steps.auth.outputs.claude_token }}
          claude_args: "--model claude-opus-4-6 --max-turns 50 --allowedTools Bash,Read,Write,Edit"
          prompt: |
            You are the CEO agent of Hive, an autonomous venture orchestrator.
            GH_PAT is available as $GH_PAT env var — use it for all gh commands: `GH_TOKEN="$GH_PAT" gh ...`
            DATABASE_URL is set for Neon queries. HIVE_URL and CRON_SECRET are set for API calls.

            TRIGGER: ${{ steps.context.outputs.trigger }}
            PAYLOAD: ${{ steps.context.outputs.payload }}

            ## Context loading (be efficient — do NOT read CLAUDE.md)
            1. Read `prompts/ceo.md` for your role, validation phases, and output format
            2. Only read `BRIEFING.md` if trigger is cycle_start or cycle_complete (skip for ceo_review)
            3. Fetch CEO context: curl -s "$HIVE_URL/api/agents/context?agent=ceo&company_slug=<slug>" -H "Authorization: Bearer $CRON_SECRET"
               This returns validation phase, cycle info, research summaries, playbook, tasks, directives, metrics, and recent scores — all in one call.
            4. Before making any Hive platform-level architectural decision, read `DECISIONS.md` to check if it was already decided.

            ## Trigger-specific instructions

            **cycle_start**: Plan a new cycle for the company.
            - Load research reports, product spec, directives from DB
            - Create engineering_tasks and growth_tasks gated by validation phase
            - Save updated product_spec to research_reports (UPSERT)
            - Output: { "company": "slug", "needs_research": bool, "needs_feature": bool, "needs_provisioning": bool }

            **cycle_complete**: Score the cycle 1-10.
            - Find cycle: SELECT id FROM cycles WHERE company_id = '<id>' ORDER BY started_at DESC LIMIT 1
            - Save review: curl -X PATCH "$HIVE_URL/api/cycles/<cycle_id>/review" -H "Authorization: Bearer $CRON_SECRET" -H "Content-Type: application/json" -d '{"ceo_review": {"review": {"score": N, "agent_grades": {...}, "kill_flag": false, "validation_phase": "...", "summary": "...", "next_priorities": [...]}}, "status": "completed"}'
            - CRITICAL: Without saving, the score is lost and validation gating breaks.

            **ceo_review**: Review and merge PRs. Read `prompts/ceo-review.md` for the full process.
            - Payload has `company` and `pr_number` — review that PR first
            - Then check for ALL open PRs: GH_TOKEN="$GH_PAT" gh pr list --repo carloshmiranda/<company> --state open --json number,title
            - Review each one following prompts/ceo-review.md

            **gate_approved**: Route the approval.
            - If gate_type is 'new_company': output { "needs_provisioning": true, "company": "<slug>" }

            **stripe_payment**: Review revenue impact, update company status if first revenue.

            **manual / directive**: Execute the specified task.

            Write ALL decisions to the database. Output JSON at the end.

      - name: Log failure to DB
        if: always() && steps.agent.outcome == 'failure'
        uses: ./.github/actions/log-agent-failure
        with:
          agent: ceo
          trigger: ${{ steps.context.outputs.trigger }}
          execution_file: ${{ steps.agent.outputs.execution_file }}
          cron_secret: ${{ secrets.CRON_SECRET }}
          context_payload: ${{ steps.context.outputs.payload }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Chain dispatch
        if: always() && steps.agent.outcome == 'success'
        env:
          GH_TOKEN: ${{ steps.auth.outputs.gh_pat }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          HIVE_URL: https://hive-phi.vercel.app
          EXECUTION_FILE: ${{ steps.agent.outputs.execution_file }}
          TRIGGER: ${{ steps.context.outputs.trigger }}
          DISPATCH_PAYLOAD: ${{ toJson(github.event.client_payload) }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_SERVER_URL: ${{ github.server_url }}
        run: npx tsx scripts/chain-dispatch.ts

      - name: Job summary
        if: always()
        env:
          TRIGGER: ${{ steps.context.outputs.trigger }}
          COMPANY: ${{ github.event.client_payload.company || 'portfolio' }}
          AGENT_OUTCOME: ${{ steps.agent.outcome }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          STATUS_ICON="${{ steps.agent.outcome == 'success' && '✅' || '❌' }}"
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          # ${STATUS_ICON} CEO — ${TRIGGER} (${COMPANY})

          | Field | Value |
          |-------|-------|
          | Trigger | \`${TRIGGER}\` |
          | Company | \`${COMPANY}\` |
          | Outcome | ${AGENT_OUTCOME} |
          | Run | [View logs](${RUN_URL}) |
          EOF
