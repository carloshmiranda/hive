name: Hive Sentinel

on:
  schedule:
    - cron: '0 */4 * * *'  # Every 4 hours

  workflow_dispatch: {}

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
  sentinel:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install postgres client
        run: npm install postgres

      - name: Query conditions and dispatch
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          REPO="${{ github.repository }}"

          dispatch() {
            curl -s -X POST "https://api.github.com/repos/$REPO/dispatches" \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              -d "{\"event_type\":\"$1\",\"client_payload\":$2}"
            echo "  Dispatched: $1 with payload $2"
          }

          DISPATCHED=0

          # Query all 7 conditions from Neon in one script
          RESULTS=$(node -e "
          const postgres = require('postgres');
          const sql = postgres(process.env.DATABASE_URL);

          async function check() {
            const results = {};

            // 1. Pipeline count (idea + approved + provisioning + mvp + active)
            const [pipeline] = await sql\`
              SELECT COUNT(*) as cnt FROM companies
              WHERE status IN ('idea','approved','provisioning','mvp','active')
            \`;
            results.pipeline_low = parseInt(pipeline.cnt) < 3;

            // 2. Companies with no content in 7 days
            const staleContent = await sql\`
              SELECT c.slug FROM companies c
              WHERE c.status IN ('mvp','active')
              AND NOT EXISTS (
                SELECT 1 FROM agent_actions aa
                WHERE aa.company_id = c.id
                AND aa.agent = 'growth'
                AND aa.status = 'success'
                AND aa.finished_at > NOW() - INTERVAL '7 days'
              )
            \`;
            results.stale_content = staleContent.map(r => r.slug);

            // 3. Leads older than 5 days without outreach
            const staleLeads = await sql\`
              SELECT c.slug FROM companies c
              WHERE c.status IN ('mvp','active')
              AND EXISTS (
                SELECT 1 FROM research_reports rr
                WHERE rr.company_id = c.id AND rr.report_type = 'lead_list'
                AND rr.updated_at < NOW() - INTERVAL '5 days'
              )
              AND NOT EXISTS (
                SELECT 1 FROM agent_actions aa
                WHERE aa.company_id = c.id
                AND aa.agent = 'outreach'
                AND aa.status = 'success'
                AND aa.finished_at > NOW() - INTERVAL '5 days'
              )
            \`;
            results.stale_leads = staleLeads.map(r => r.slug);

            // 4. No CEO review in 48h for active companies
            const noCeoReview = await sql\`
              SELECT c.slug FROM companies c
              WHERE c.status IN ('mvp','active')
              AND NOT EXISTS (
                SELECT 1 FROM agent_actions aa
                WHERE aa.company_id = c.id
                AND aa.agent = 'ceo'
                AND aa.status = 'success'
                AND aa.finished_at > NOW() - INTERVAL '48 hours'
              )
            \`;
            results.no_ceo_review = noCeoReview.map(r => r.slug);

            // 5. Unverified deploy in 24h (deploy logged but no ops check)
            const unverifiedDeploys = await sql\`
              SELECT c.slug FROM companies c
              WHERE c.status IN ('mvp','active')
              AND EXISTS (
                SELECT 1 FROM agent_actions aa
                WHERE aa.company_id = c.id
                AND aa.action_type = 'deploy'
                AND aa.finished_at > NOW() - INTERVAL '24 hours'
              )
              AND NOT EXISTS (
                SELECT 1 FROM agent_actions aa
                WHERE aa.company_id = c.id
                AND aa.agent = 'ops'
                AND aa.action_type = 'health_check'
                AND aa.finished_at > NOW() - INTERVAL '24 hours'
              )
            \`;
            results.unverified_deploys = unverifiedDeploys.map(r => r.slug);

            // 6. Completed cycles since last evolve > 10
            const [lastEvolve] = await sql\`
              SELECT MAX(finished_at) as last_run FROM agent_actions
              WHERE agent = 'evolver' AND status = 'success'
            \`;
            const [cyclesSinceEvolve] = await sql\`
              SELECT COUNT(*) as cnt FROM cycles
              WHERE status = 'completed'
              AND finished_at > COALESCE(\${lastEvolve?.last_run}, '2000-01-01'::timestamptz)
            \`;
            results.evolve_due = parseInt(cyclesSinceEvolve.cnt) > 10;

            // 7. Agent failure rate > 20% in 48h
            const [failureStats] = await sql\`
              SELECT
                COUNT(*) FILTER (WHERE status = 'failed') as failed,
                COUNT(*) as total
              FROM agent_actions
              WHERE finished_at > NOW() - INTERVAL '48 hours'
            \`;
            const failRate = failureStats.total > 0 ? failureStats.failed / failureStats.total : 0;
            results.high_failure_rate = failRate > 0.2 && failureStats.total >= 5;

            // 8. Stale research (active companies with no research in 14 days)
            const staleResearch = await sql\`
              SELECT c.slug FROM companies c
              WHERE c.status IN ('mvp','active')
              AND NOT EXISTS (
                SELECT 1 FROM research_reports rr
                WHERE rr.company_id = c.id
                AND rr.updated_at > NOW() - INTERVAL '14 days'
              )
            \`;
            results.stale_research = staleResearch.map(r => r.slug);

            // 9. Companies stuck in 'approved' status (not provisioned)
            const stuckApproved = await sql\`
              SELECT slug FROM companies
              WHERE status = 'approved'
              AND updated_at < NOW() - INTERVAL '1 hour'
            \`;
            results.stuck_approved = stuckApproved.map(r => r.slug);

            // 9. Agents hitting max_turns (wasting quota without completing work)
            const maxTurnsHits = await sql\`
              SELECT agent, COUNT(*) as cnt
              FROM agent_actions
              WHERE status = 'failed'
              AND error ILIKE '%max_turns%'
              AND finished_at > NOW() - INTERVAL '48 hours'
              GROUP BY agent
              HAVING COUNT(*) >= 2
            \`;
            results.max_turns_exhaustion = maxTurnsHits.map(r => ({ agent: r.agent, count: parseInt(r.cnt) }));

            // 9. Chain dispatch gaps (agent succeeded but no downstream agent ran within 30min)
            const chainGaps = await sql\`
              SELECT aa.agent as source_agent, aa.company_id,
                c.slug, aa.finished_at,
                aa.output::text as output_text
              FROM agent_actions aa
              JOIN companies c ON c.id = aa.company_id
              WHERE aa.status = 'success'
              AND aa.agent = 'ceo'
              AND aa.output::text ILIKE '%needs_feature%true%'
              AND aa.finished_at > NOW() - INTERVAL '48 hours'
              AND NOT EXISTS (
                SELECT 1 FROM agent_actions aa2
                WHERE aa2.agent = 'engineer'
                AND aa2.company_id = aa.company_id
                AND aa2.started_at > aa.finished_at
                AND aa2.started_at < aa.finished_at + INTERVAL '30 minutes'
              )
            \`;
            results.chain_gaps = chainGaps.map(r => ({ company: r.slug, source: r.source_agent }));

            // 12. Cycles stuck in 'running' for >2 hours (auto-cleanup)
            const stuckCycles = await sql\`
              UPDATE cycles
              SET status = 'failed',
                  finished_at = NOW(),
                  ceo_review = jsonb_build_object('timeout_reason', 'Cycle stuck in running state >2h, cleaned up by Sentinel')
              WHERE status = 'running'
                AND started_at < NOW() - INTERVAL '2 hours'
              RETURNING cycle_number, company_id
            \`;
            if (stuckCycles.length > 0) {
              results.stuck_cycles_cleaned = stuckCycles.length;
              console.error('Cleaned ' + stuckCycles.length + ' stuck cycles');
            }

            console.log(JSON.stringify(results));
            await sql.end();
          }

          check().catch(e => { console.error(e.message); process.exit(1); });
          ")

          echo "Sentinel results: $RESULTS"

          # Parse and dispatch
          PIPELINE_LOW=$(echo "$RESULTS" | jq -r '.pipeline_low')
          STALE_CONTENT=$(echo "$RESULTS" | jq -r '.stale_content | length')
          STALE_LEADS=$(echo "$RESULTS" | jq -r '.stale_leads | length')
          NO_CEO=$(echo "$RESULTS" | jq -r '.no_ceo_review | length')
          UNVERIFIED=$(echo "$RESULTS" | jq -r '.unverified_deploys | length')
          EVOLVE_DUE=$(echo "$RESULTS" | jq -r '.evolve_due')
          HIGH_FAIL=$(echo "$RESULTS" | jq -r '.high_failure_rate')

          # 1. Pipeline low → Scout
          if [ "$PIPELINE_LOW" = "true" ]; then
            dispatch "pipeline_low" '{"source":"sentinel"}'
            DISPATCHED=$((DISPATCHED + 1))
          fi

          # 2. Stale content → Growth (via workers)
          if [ "$STALE_CONTENT" -gt 0 ]; then
            for SLUG in $(echo "$RESULTS" | jq -r '.stale_content[]'); do
              dispatch "growth_trigger" "{\"source\":\"sentinel\",\"company\":\"$SLUG\"}"
              DISPATCHED=$((DISPATCHED + 1))
            done
          fi

          # 3. Stale leads → Outreach (via workers)
          if [ "$STALE_LEADS" -gt 0 ]; then
            for SLUG in $(echo "$RESULTS" | jq -r '.stale_leads[]'); do
              dispatch "outreach_trigger" "{\"source\":\"sentinel\",\"company\":\"$SLUG\"}"
              DISPATCHED=$((DISPATCHED + 1))
            done
          fi

          # 4. No CEO review → CEO
          if [ "$NO_CEO" -gt 0 ]; then
            FIRST_SLUG=$(echo "$RESULTS" | jq -r '.no_ceo_review[0]')
            dispatch "ceo_review" "{\"source\":\"sentinel\",\"company\":\"$FIRST_SLUG\"}"
            DISPATCHED=$((DISPATCHED + 1))
          fi

          # 5. Unverified deploys → Ops (via workers)
          if [ "$UNVERIFIED" -gt 0 ]; then
            for SLUG in $(echo "$RESULTS" | jq -r '.unverified_deploys[]'); do
              dispatch "health_check" "{\"source\":\"sentinel\",\"company\":\"$SLUG\"}"
              DISPATCHED=$((DISPATCHED + 1))
            done
          fi

          # 6. Evolve due → Evolver
          if [ "$EVOLVE_DUE" = "true" ]; then
            dispatch "evolve_trigger" '{"source":"sentinel"}'
            DISPATCHED=$((DISPATCHED + 1))
          fi

          # 7. High failure rate → Evolver (urgent)
          if [ "$HIGH_FAIL" = "true" ]; then
            dispatch "evolve_trigger" '{"source":"sentinel","reason":"high_failure_rate"}'
            DISPATCHED=$((DISPATCHED + 1))
          fi

          # 8. Stale research → Scout research refresh
          STALE_RESEARCH=$(echo "$RESULTS" | jq -r '.stale_research | length')
          if [ "$STALE_RESEARCH" -gt 0 ]; then
            FIRST_SLUG=$(echo "$RESULTS" | jq -r '.stale_research[0]')
            echo "Stale research for $FIRST_SLUG — dispatching research refresh"
            dispatch "research_request" "{\"source\":\"sentinel\",\"company\":\"$FIRST_SLUG\"}"
            DISPATCHED=$((DISPATCHED + 1))
          fi

          # 9. Companies stuck in 'approved' → dispatch provisioning via Engineer
          STUCK_APPROVED=$(echo "$RESULTS" | jq -r '.stuck_approved | length')
          if [ "$STUCK_APPROVED" -gt 0 ]; then
            for SLUG in $(echo "$RESULTS" | jq -r '.stuck_approved[]'); do
              echo "Company $SLUG stuck in approved status — dispatching provisioning"
              dispatch "new_company" "{\"source\":\"sentinel\",\"company\":\"$SLUG\"}"
              DISPATCHED=$((DISPATCHED + 1))
            done
          fi

          # 9. Max turns exhaustion → log warning + trigger Evolver
          MAX_TURNS_AGENTS=$(echo "$RESULTS" | jq -r '.max_turns_exhaustion | length')
          if [ "$MAX_TURNS_AGENTS" -gt 0 ]; then
            echo "WARNING: Agents hitting max_turns repeatedly:"
            echo "$RESULTS" | jq -r '.max_turns_exhaustion[] | "  \(.agent): \(.count) times in 48h"'
            dispatch "evolve_trigger" "{\"source\":\"sentinel\",\"reason\":\"max_turns_exhaustion\",\"agents\":$(echo "$RESULTS" | jq -c '.max_turns_exhaustion')}"
            DISPATCHED=$((DISPATCHED + 1))
          fi

          # 9. Chain dispatch gaps → re-dispatch the missed downstream agent
          CHAIN_GAPS=$(echo "$RESULTS" | jq -r '.chain_gaps | length')
          if [ "$CHAIN_GAPS" -gt 0 ]; then
            echo "WARNING: Chain dispatch gaps detected:"
            for i in $(seq 0 $((CHAIN_GAPS - 1))); do
              SLUG=$(echo "$RESULTS" | jq -r ".chain_gaps[$i].company")
              SOURCE=$(echo "$RESULTS" | jq -r ".chain_gaps[$i].source")
              echo "  $SOURCE → engineer missed for $SLUG — re-dispatching"
              dispatch "feature_request" "{\"source\":\"sentinel_recovery\",\"company\":\"$SLUG\"}"
              DISPATCHED=$((DISPATCHED + 1))
            done
          fi

          # 10. Deploy drift: Hive main SHA vs Vercel production SHA
          if [ -n "$VERCEL_TOKEN" ]; then
            MAIN_SHA=$(curl -s -H "Authorization: token $GH_TOKEN" \
              "https://api.github.com/repos/carloshmiranda/hive/commits/main" \
              | jq -r '.sha // empty')

            DEPLOY_SHA=$(curl -s -H "Authorization: Bearer $VERCEL_TOKEN" \
              "https://api.vercel.com/v6/deployments?projectId=prj_n9JaPbWmRv0SKoHgkdXYOEGQtjRv&teamId=team_Z4AsGtjfy6pAjCOtvJqzMT8d&target=production&limit=1" \
              | jq -r '.deployments[0].meta.githubCommitSha // empty')

            if [ -n "$MAIN_SHA" ] && [ -n "$DEPLOY_SHA" ] && [ "$MAIN_SHA" != "$DEPLOY_SHA" ]; then
              echo "DRIFT DETECTED: main=${MAIN_SHA:0:12} deployed=${DEPLOY_SHA:0:12}"
              dispatch "deploy_drift" "{\"source\":\"sentinel\",\"main_sha\":\"${MAIN_SHA:0:12}\",\"deploy_sha\":\"${DEPLOY_SHA:0:12}\"}"
              DISPATCHED=$((DISPATCHED + 1))
            else
              echo "No deploy drift (main=${MAIN_SHA:0:12} deployed=${DEPLOY_SHA:0:12})"
            fi
          else
            echo "Skipping deploy drift check: VERCEL_TOKEN not set"
          fi

          echo ""
          echo "Sentinel complete: $DISPATCHED dispatches"
