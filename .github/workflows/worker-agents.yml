name: Hive Workers
run-name: "Workers: ${{ github.event.action || github.event.inputs.agent || 'dispatch' }} — ${{ github.event.client_payload.company || github.event.inputs.company || 'all' }}"

on:
  repository_dispatch:
    types:
      - growth_trigger
      - outreach_trigger
      - health_check
      - agent_dispatch

  workflow_dispatch:
    inputs:
      agent:
        description: 'Agent to dispatch'
        required: true
        type: choice
        options: [growth, outreach, ops]
      company:
        description: 'Company slug (leave empty for all active)'
        required: false
        default: ''
      trigger:
        description: 'Trigger reason'
        required: false
        default: 'manual'

env:
  HIVE_URL: https://hive-phi.vercel.app

jobs:
  dispatch-agents:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Determine what to dispatch
        id: plan
        run: |
          TRIGGER_TYPE="${{ github.event_name }}"

          if [ "$TRIGGER_TYPE" = "workflow_dispatch" ]; then
            echo "agents=${{ github.event.inputs.agent }}" >> $GITHUB_OUTPUT
            echo "company=${{ github.event.inputs.company }}" >> $GITHUB_OUTPUT
            echo "trigger=${{ github.event.inputs.trigger }}" >> $GITHUB_OUTPUT

          elif [ "$TRIGGER_TYPE" = "repository_dispatch" ]; then
            ACTION="${{ github.event.action }}"
            COMPANY="${{ github.event.client_payload.company }}"

            case "$ACTION" in
              growth_trigger)  echo "agents=growth" >> $GITHUB_OUTPUT ;;
              outreach_trigger) echo "agents=outreach" >> $GITHUB_OUTPUT ;;
              health_check)    echo "agents=ops" >> $GITHUB_OUTPUT ;;
              agent_dispatch)  echo "agents=${{ github.event.client_payload.agent }}" >> $GITHUB_OUTPUT ;;
              *)               echo "agents=ops" >> $GITHUB_OUTPUT ;;
            esac
            echo "company=${COMPANY}" >> $GITHUB_OUTPUT
            echo "trigger=${ACTION}" >> $GITHUB_OUTPUT
          fi

      - name: Get active companies
        id: companies
        run: |
          if [ -n "${{ steps.plan.outputs.company }}" ]; then
            echo "slugs=${{ steps.plan.outputs.company }}" >> $GITHUB_OUTPUT
          else
            SLUGS=$(curl -sf \
              "${{ env.HIVE_URL }}/api/agents/companies" \
              -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
              | jq -r '.data // . | .[]' 2>/dev/null || echo "")

            if [ -z "$SLUGS" ]; then
              echo "No active companies found"
              echo "slugs=" >> $GITHUB_OUTPUT
            else
              echo "slugs=$(echo $SLUGS | tr '\n' ' ')" >> $GITHUB_OUTPUT
            fi
          fi

      - name: Dispatch agents
        if: steps.companies.outputs.slugs != ''
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          AGENTS="${{ steps.plan.outputs.agents }}"
          COMPANIES="${{ steps.companies.outputs.slugs }}"
          TRIGGER="${{ steps.plan.outputs.trigger }}"
          SUCCESS=0
          FAIL=0

          echo "Dispatching: agents=[$AGENTS] companies=[$COMPANIES] trigger=$TRIGGER"
          echo ""

          for AGENT in $AGENTS; do
            for COMPANY in $COMPANIES; do
              echo "-> $AGENT for $COMPANY..."

              RESPONSE=$(curl -s -w "\n%{http_code}" \
                -X POST "${{ env.HIVE_URL }}/api/agents/dispatch" \
                -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
                -H "Content-Type: application/json" \
                -d "{\"company_slug\":\"$COMPANY\",\"agent\":\"$AGENT\",\"trigger\":\"$TRIGGER\"}")

              HTTP_CODE=$(echo "$RESPONSE" | tail -1)
              BODY=$(echo "$RESPONSE" | head -n -1)

              if [ "$HTTP_CODE" -lt 400 ]; then
                DURATION=$(echo "$BODY" | jq -r '.duration_seconds // "?"' 2>/dev/null)
                echo "  OK $AGENT/$COMPANY (${DURATION}s)"
                SUCCESS=$((SUCCESS + 1))
              else
                echo "  FAIL $AGENT/$COMPANY HTTP $HTTP_CODE"
                echo "  $BODY" | head -3
                FAIL=$((FAIL + 1))
              fi
              echo ""
            done
          done

          echo "Results: $SUCCESS succeeded, $FAIL failed"

          # If Ops finds issues needing engineer, chain dispatch
          if [ "$AGENTS" = "ops" ]; then
            for COMPANY in $COMPANIES; do
              LAST_OUTPUT=$(curl -sf \
                "${{ env.HIVE_URL }}/api/agents/companies" \
                -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" 2>/dev/null || echo "")
              # Ops escalation is handled in the dispatch endpoint's post-processing
            done
          fi

          if [ $FAIL -gt 0 ] && [ $SUCCESS -eq 0 ]; then
            exit 1
          fi
