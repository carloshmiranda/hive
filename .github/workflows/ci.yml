name: CI
on:
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Full checkout so we can push the auto-fix commit back to the PR branch
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Lint SQL queries
        id: sql_lint
        continue-on-error: true
        run: npx tsx scripts/lint-sql.ts 2>&1 | tee /tmp/sql-lint-output.txt
      - name: Dispatch Engineer on SQL lint failure
        if: steps.sql_lint.outcome == 'failure'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          ERROR_OUTPUT=$(cat /tmp/sql-lint-output.txt | head -50)
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_PAT" \
            https://api.github.com/repos/${{ github.repository }}/dispatches \
            -d "{\"event_type\":\"ci_fix\",\"client_payload\":{\"task\":\"Fix SQL lint failures in CI\",\"branch\":\"${{ github.head_ref }}\",\"pr_number\":${{ github.event.pull_request.number }},\"error_output\":$(echo "$ERROR_OUTPUT" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')}}"
          echo "Dispatched Engineer to fix SQL lint failures"
          exit 1
      - name: Auto-sync schema-map.ts
        # Regenerate the schema map and auto-commit if stale.
        # Eliminates the entire category of "schema-map out of date" CI failures:
        # Engineer PRs often forget to run schema-map:generate, so CI fixes it automatically.
        run: |
          npm run schema-map:generate
          if ! git diff --quiet src/lib/schema-map.ts; then
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git config user.name "github-actions[bot]"
            git add src/lib/schema-map.ts
            git commit -m "chore: auto-sync schema-map.ts"
            git push
          fi
      - name: Build
        run: npx next build
        env:
          DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"
          NEXTAUTH_SECRET: "ci-secret"
          AUTH_GITHUB_ID: "fake"
          AUTH_GITHUB_SECRET: "fake"
