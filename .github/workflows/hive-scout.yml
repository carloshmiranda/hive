name: Hive Scout
run-name: "Scout: ${{ github.event.action || github.event.inputs.mode || 'scheduled' }} — ${{ github.event.client_payload.company || github.event.inputs.company || 'pipeline' }}"

on:
  repository_dispatch:
    types:
      - pipeline_low
      - company_killed
      - new_company
      - research_request

  workflow_dispatch:
    inputs:
      mode:
        description: 'Mode: ideas, research, or both'
        required: false
        default: 'ideas'
      company:
        description: 'Company slug (for research mode)'
        required: false
        default: ''

permissions:
  contents: write
  issues: write
  id-token: write

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}

jobs:
  scout:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    # Skip new_company if it's a provisioning dispatch (those go to Engineer)
    if: >
      (github.event.action != 'new_company' || github.event.client_payload.source != 'ceo') &&
      (github.event.action != 'new_company' || github.event.client_payload.source != 'sentinel')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get tokens via OIDC
        id: auth
        run: |
          OIDC_TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://hive-phi.vercel.app" \
            | jq -r '.value')

          fetch_token() {
            local TYPE="$1" OUTPUT_KEY="$2" CRITICAL="${3:-false}"
            RESPONSE=$(curl -s -X POST "https://hive-phi.vercel.app/api/agents/token" \
              -H "Authorization: Bearer $OIDC_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"token_type\":\"$TYPE\"}")
            VALUE=$(echo "$RESPONSE" | jq -r '.data.token // empty')
            if [ -n "$VALUE" ]; then
              echo "::add-mask::$VALUE"
              echo "${OUTPUT_KEY}=$VALUE" >> $GITHUB_OUTPUT
            else
              if [ "$CRITICAL" = "true" ]; then
                echo "FATAL: Failed to get $TYPE token: $(echo "$RESPONSE" | jq -r '.error // "unknown"')"
                exit 1
              else
                echo "WARNING: Failed to get $TYPE token (non-critical, continuing)"
              fi
            fi
          }

          fetch_token "claude" "claude_token" "true"
          fetch_token "github_pat" "gh_pat"
          fetch_token "cron_secret" "cron_secret"

      - name: Build Scout context
        id: context
        run: |
          EVENT="${{ github.event_name }}"

          set_output() {
            local key="$1" value="$2"
            echo "${key}<<GHEOF" >> $GITHUB_OUTPUT
            echo "${value}" >> $GITHUB_OUTPUT
            echo "GHEOF" >> $GITHUB_OUTPUT
          }

          if [ "$EVENT" = "repository_dispatch" ]; then
            ACTION="${{ github.event.action }}"
            # Use heredoc to avoid single-quote / special char breakage in JSON payloads
            read -r -d '' PAYLOAD <<'PAYLOAD_EOF' || true
${{ toJson(github.event.client_payload) }}
PAYLOAD_EOF
            set_output "trigger" "${ACTION}"
            set_output "payload" "${PAYLOAD}"
          else
            set_output "trigger" "${{ github.event.inputs.mode }}"
            set_output "payload" "{\"mode\":\"${{ github.event.inputs.mode }}\",\"company\":\"${{ github.event.inputs.company }}\"}"
          fi

      - name: Check pending proposals
        id: gate
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          PENDING=$(node -e "
            const { neon } = require('@neondatabase/serverless');
            const sql = neon(process.env.DATABASE_URL);
            sql\`SELECT COUNT(*)::int as cnt FROM approvals WHERE gate_type = 'new_company' AND status = 'pending'\`
              .then(r => console.log(r[0].cnt)).catch(() => console.log('0'));
          " 2>/dev/null || echo "0")
          echo "pending_proposals=$PENDING" >> $GITHUB_OUTPUT
          TRIGGER="${{ steps.context.outputs.trigger }}"
          if [ "$PENDING" -ge 5 ] && [ "$TRIGGER" != "research_request" ]; then
            echo "skip_ideas=true" >> $GITHUB_OUTPUT
            echo "Scout: $PENDING pending proposals (>=5) — skipping idea generation, research only"
          else
            echo "skip_ideas=false" >> $GITHUB_OUTPUT
          fi

      - name: Run Scout agent
        id: agent
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ steps.auth.outputs.claude_token }}
          claude_args: "--model claude-opus-4-20250514 --max-turns 35 --allowedTools Bash,Read,Write,Edit,WebSearch,WebFetch"
          prompt: |
            You are the Scout agent of Hive. You find new business ideas AND do market research.

            TRIGGER: ${{ steps.context.outputs.trigger }}
            PAYLOAD: ${{ steps.context.outputs.payload }}
            SKIP_IDEAS: ${{ steps.gate.outputs.skip_ideas }}
            PENDING_PROPOSALS: ${{ steps.gate.outputs.pending_proposals }}

            ## IDEA GENERATION GATE
            If SKIP_IDEAS is "true", there are already 5+ business proposals pending review.
            DO NOT generate new business ideas or create new_company approvals.
            Instead, focus ONLY on research tasks: market research, competitive analysis, SEO keywords
            for existing companies. If the trigger is pipeline_low or company_killed AND SKIP_IDEAS is true,
            pick an active company that hasn't had research in 7+ days and do a competitive refresh instead.

            ## STEP 1: Read your full prompt and context
            1. Read `prompts/scout.md` — this contains your COMPLETE research methodology, business model categories, output format, and constraints. Follow it exactly.
            2. Read `BRIEFING.md` for current state.
            3. Read `CLAUDE.md` for architecture context.

            ## STEP 2: Gather dynamic context from Neon
            Query the database (use DATABASE_URL env var) for:
            - All existing companies: `SELECT name, slug, description, status, kill_reason FROM companies ORDER BY created_at`
            - Recently rejected: `SELECT name, description, kill_reason FROM companies WHERE status = 'killed' AND kill_reason IS NOT NULL AND killed_at > NOW() - INTERVAL '90 days'`
            - Rejected approvals: `SELECT title, decision_note FROM approvals WHERE gate_type = 'new_company' AND status = 'rejected' AND decided_at > NOW() - INTERVAL '90 days'`
            - Playbook: `SELECT domain, insight, confidence FROM playbook WHERE superseded_by IS NULL ORDER BY confidence DESC LIMIT 10`

            Inject all of this as context into your research — the prompt file tells you how.

            ## STEP 3: Execute research following prompts/scout.md methodology
            Use BOTH web_search AND web_fetch. You MUST web_fetch at least 5 community URLs (Reddit, HN, etc.) — do not skip this.

            ## STEP 4: Write results to Neon
            IMPORTANT: You are a RESEARCHER. Do NOT classify proposals as "expansion" vs "new_company" — the CEO agent handles that decision later.
            For each of your 3 proposals:
            1. Create the company: `INSERT INTO companies (name, slug, description, status) VALUES (..., 'idea') ON CONFLICT (slug) DO NOTHING RETURNING *`
            2. Create an approval gate with the FULL proposal in context (wrapped as `{"proposal": {...}, "research": {...}}`):
               ```sql
               INSERT INTO approvals (company_id, gate_type, title, description, context)
               VALUES (company_id, 'new_company', 'Launch {name} [{flag} {market}]', '{problem} → {solution}',
                 '{"proposal": {full proposal object}, "research": {research object}}'::jsonb)
               ```
               IMPORTANT: The context field MUST be a JSON object with "proposal" and "research" keys. The dashboard reads context.proposal to render rich cards.
               If a proposal has `expansion_candidate` data (synergy_score > 0.4), still create it as `new_company` gate — the CEO will re-evaluate.
            3. Log to agent_actions: `INSERT INTO agent_actions (agent, action_type, description, status, output, started_at, finished_at) VALUES ('scout', 'idea_generation', '...', 'success', '{...}'::jsonb, NOW(), NOW())`

            ## If trigger is research_request or research mode:
            1. Query Neon for the target company's current state
            2. Do competitive analysis, SEO keyword research, market sizing via web search
            3. Write results to research_reports table
            4. Output JSON: { "company": "slug", "research_delivered": true, "leads_found": bool }

            ## Output (for chain dispatch):
            After writing to Neon, output: { "proposals": [...slugs...], "research_delivered": true }

      - name: Log failure to DB
        if: always() && steps.agent.outcome == 'failure'
        run: |
          npm install --no-save postgres 2>/dev/null
          EXEC_FILE="${{ steps.agent.outputs.execution_file }}"
          SUBTYPE=$(jq -r '.[-1].subtype // "unknown"' "$EXEC_FILE" 2>/dev/null || echo "unknown")
          TURNS=$(jq -r '.[-1].num_turns // 0' "$EXEC_FILE" 2>/dev/null || echo "0")
          COST=$(jq -r '.[-1].total_cost_usd // 0' "$EXEC_FILE" 2>/dev/null || echo "0")

          node -e "
          const postgres = require('postgres');
          const sql = postgres(process.env.DATABASE_URL);
          async function log() {
            await sql\`
              INSERT INTO agent_actions (agent, action_type, status, error, output, started_at, finished_at)
              VALUES ('scout', '${{ steps.context.outputs.trigger }}', 'failed',
                \${'error_' + '${SUBTYPE}' + ': exhausted after ${TURNS} turns'},
                \${JSON.stringify({subtype: '${SUBTYPE}', turns: parseInt('${TURNS}'), cost: parseFloat('${COST}')})}::jsonb,
                NOW() - INTERVAL '${TURNS} minutes', NOW())
            \`;
            await sql.end();
          }
          log().catch(e => console.error('DB log failed:', e.message));
          "
          echo "Logged Scout failure: $SUBTYPE ($TURNS turns)"

      - name: Chain dispatch
        if: always() && steps.agent.outcome == 'success'
        env:
          GH_TOKEN: ${{ steps.auth.outputs.gh_pat }}
          CRON_SECRET: ${{ steps.auth.outputs.cron_secret }}
          HIVE_URL: https://hive-phi.vercel.app
        run: |
          set +e  # Prevent grep/jq exit codes from crashing the step
          RESULT=$(jq -r '[.[] | select(.type == "assistant")] | last | [.message.content[] | select(.type == "text") | .text] | join("\n")' "${{ steps.agent.outputs.execution_file }}" 2>/dev/null || echo "{}")
          REPO="${{ github.repository }}"
          TRIGGER="${{ steps.context.outputs.trigger }}"
          echo "Chain dispatch parsing last assistant output (${#RESULT} chars)"
          echo "Trigger: $TRIGGER"

          dispatch() {
            curl -s -X POST "https://api.github.com/repos/$REPO/dispatches" \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              -d "{\"event_type\":\"$1\",\"client_payload\":$2}"
            echo "  Dispatched: $1"
          }

          # Extract company from agent output (handles JSON in code blocks, prose, or raw)
          COMPANY=$(echo "$RESULT" | grep -oP '"company"\s*:\s*"\K[^"]+' | head -1 || echo "")
          if [ -z "$COMPANY" ]; then
            COMPANY=$(cat <<'JQEOF' | jq -r '.company // ""' 2>/dev/null || echo ""
${{ toJson(github.event.client_payload) }}
JQEOF
            )
          fi
          # Also extract company_id
          COMPANY_ID=$(echo "$RESULT" | grep -oP '"company_id"\s*:\s*"\K[^"]+' | head -1 || echo "")
          if [ -z "$COMPANY_ID" ]; then
            COMPANY_ID=$(cat <<'JQEOF' | jq -r '.company_id // ""' 2>/dev/null || echo ""
${{ toJson(github.event.client_payload) }}
JQEOF
            )
          fi
          echo "Company: $COMPANY | Company ID: $COMPANY_ID"

          # Detect research_delivered: check multiple patterns (JSON, prose, code blocks)
          RESEARCH_DELIVERED=false
          echo "$RESULT" | grep -qiP '"?research_delivered"?\s*[:=]\s*"?true' && RESEARCH_DELIVERED=true
          echo "$RESULT" | grep -qi "research.*delivered\|delivered.*research\|wrote.*research_reports\|inserted.*research" && RESEARCH_DELIVERED=true
          # If trigger was research_request and Scout succeeded, research was delivered
          if [ "$TRIGGER" = "research_request" ]; then
            RESEARCH_DELIVERED=true
          fi
          echo "Research delivered: $RESEARCH_DELIVERED"

          # Build reusable payload
          BASE_PAYLOAD="\"company\":\"$COMPANY\",\"company_id\":\"$COMPANY_ID\""

          # Direct worker dispatch helper (skips GitHub Actions proxy)
          dispatch_worker() {
            curl -s -X POST "$HIVE_URL/api/agents/dispatch" \
              -H "Authorization: Bearer $CRON_SECRET" \
              -H "Content-Type: application/json" \
              -d "{\"company_slug\":\"$COMPANY\",\"agent\":\"$1\",\"trigger\":\"$2\"}" \
              -o /dev/null -w "  Worker $1: HTTP %{http_code}\n" || true
          }

          # Chain to CEO for cycle planning when research is delivered
          if [ "$RESEARCH_DELIVERED" = "true" ] && [ -n "$COMPANY" ]; then
            dispatch "cycle_start" "{\"source\":\"scout_research\",$BASE_PAYLOAD}"
            dispatch_worker "growth" "scout_research"
          fi

          # Chain to Outreach if leads found
          LEADS_FOUND=false
          echo "$RESULT" | grep -qiP '"?leads_found"?\s*[:=]\s*"?true' && LEADS_FOUND=true
          if [ "$LEADS_FOUND" = "true" ] && [ -n "$COMPANY" ]; then
            dispatch_worker "outreach" "scout_leads"
          fi

          echo "Chain dispatch complete"
