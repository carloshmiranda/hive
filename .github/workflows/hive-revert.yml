name: Hive Revert
run-name: "Revert: PR #${{ github.event.client_payload.pr_number }} — ${{ github.event.client_payload.reason || 'auto-revert' }}"

on:
  repository_dispatch:
    types:
      - revert_request

permissions:
  contents: write
  pull-requests: write

jobs:
  revert:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get tokens via OIDC
        id: auth
        uses: ./.github/actions/get-hive-tokens
        with:
          tokens: "github_pat:gh_pat:true"

      - name: Configure git
        run: |
          git config user.name "Hive Revert Bot"
          git config user.email "noreply@github.com"

      - name: Find and revert merge commit
        id: revert
        env:
          GH_TOKEN: ${{ steps.auth.outputs.gh_pat }}
          PR_NUMBER: ${{ github.event.client_payload.pr_number }}
          REASON: ${{ github.event.client_payload.reason }}
          MERGED_AT: ${{ github.event.client_payload.merged_at }}
        run: |
          echo "Reverting PR #${PR_NUMBER}: ${REASON}"

          # Find the merge commit for this PR
          MERGE_SHA=$(gh pr view "${PR_NUMBER}" --repo "${{ github.repository }}" --json mergeCommit --jq '.mergeCommit.oid' 2>/dev/null || echo "")

          if [ -z "$MERGE_SHA" ] || [ "$MERGE_SHA" = "null" ]; then
            echo "ERROR: Could not find merge commit for PR #${PR_NUMBER}"
            exit 1
          fi

          echo "merge_sha=${MERGE_SHA}" >> $GITHUB_OUTPUT
          echo "Found merge commit: ${MERGE_SHA}"

          # Create revert branch
          REVERT_BRANCH="hive/revert-pr-${PR_NUMBER}"
          git checkout -b "${REVERT_BRANCH}"

          # Attempt revert
          if git revert --mainline 1 "${MERGE_SHA}" --no-edit; then
            echo "Revert applied cleanly"
            echo "revert_branch=${REVERT_BRANCH}" >> $GITHUB_OUTPUT
            echo "success=true" >> $GITHUB_OUTPUT
          else
            echo "Revert has conflicts — aborting"
            git revert --abort 2>/dev/null || true
            echo "success=false" >> $GITHUB_OUTPUT
          fi

      - name: Push revert branch and open PR
        if: steps.revert.outputs.success == 'true'
        env:
          GH_TOKEN: ${{ steps.auth.outputs.gh_pat }}
          PR_NUMBER: ${{ github.event.client_payload.pr_number }}
          REASON: ${{ github.event.client_payload.reason }}
          REVERT_BRANCH: ${{ steps.revert.outputs.revert_branch }}
        run: |
          git push origin "${REVERT_BRANCH}"

          # Open revert PR
          gh pr create \
            --title "revert: Revert PR #${PR_NUMBER} (Sentry error spike)" \
            --body "## Auto-Revert

          **Reason:** ${REASON}

          **Trigger:** Sentry error rate spiked >2x baseline within 15 minutes of merge.

          **Original PR:** #${PR_NUMBER}

          This revert was automatically created by Hive's post-merge health check. Review and merge if the spike was caused by this PR.

          🤖 Auto-generated by Hive Revert Bot" \
            --base main \
            --head "${REVERT_BRANCH}" \
            --repo "${{ github.repository }}"

          echo "Revert PR created for branch ${REVERT_BRANCH}"

      - name: Log revert failure (conflict)
        if: steps.revert.outputs.success == 'false'
        env:
          HIVE_URL: ${{ secrets.NEXT_PUBLIC_URL || 'https://hive-phi.vercel.app' }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          PR_NUMBER: ${{ github.event.client_payload.pr_number }}
          REASON: ${{ github.event.client_payload.reason }}
        run: |
          echo "Revert had conflicts — notifying Hive"
          curl -s -X POST "${HIVE_URL}/api/notify" \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -H "Content-Type: application/json" \
            -d "{\"agent\":\"revert\",\"action\":\"revert_failed\",\"company\":\"_hive\",\"status\":\"failed\",\"summary\":\"PR #${PR_NUMBER} revert has conflicts — manual revert required. Reason: ${REASON}\"}" || true
