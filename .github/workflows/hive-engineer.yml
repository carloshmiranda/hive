name: Hive Engineer
run-name: "Engineer: ${{ github.event.action || github.event_name }} — ${{ github.event.client_payload.meta.title || github.event.client_payload.title || github.event.inputs.task || github.event.client_payload.company || 'task' }}${{ github.event.client_payload.meta.github_issue && format(' (#{0})', github.event.client_payload.meta.github_issue) || github.event.client_payload.github_issue && format(' (#{0})', github.event.client_payload.github_issue) || github.event.client_payload.pr_number && format(' (PR #{0})', github.event.client_payload.pr_number) || '' }}"

on:
  repository_dispatch:
    types:
      - new_company
      - feature_request
      - ops_escalation
      - deploy_drift
      - ci_fix

  workflow_dispatch:
    inputs:
      task:
        description: 'Task description'
        required: false
        default: ''
      company:
        description: 'Company slug'
        required: false
        default: ''

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  SENTRY_DSN: ${{ secrets.SENTRY_DSN }}

# Prevent duplicate Engineer runs per company. cancel-in-progress: false queues rather than kills an in-progress run.
concurrency:
  group: hive-engineer-${{ github.event.client_payload.company || github.event.inputs.company || 'hive' }}
  cancel-in-progress: false

jobs:
  # ─── Resolve context for all jobs (non-secret outputs only) ───
  # NOTE: Tokens are NOT passed between jobs — GitHub Actions strips masked secrets from outputs.
  # Each job that needs tokens fetches its own via OIDC.
  context:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      trigger: ${{ steps.ctx.outputs.trigger }}
      payload: ${{ steps.ctx.outputs.payload }}
      company: ${{ steps.resolve.outputs.company }}
      company_repo: ${{ steps.resolve.outputs.company_repo }}

    steps:
      - name: Build context
        id: ctx
        run: |
          set_output() {
            local key="$1" value="$2"
            echo "${key}<<GHEOF" >> $GITHUB_OUTPUT
            echo "${value}" >> $GITHUB_OUTPUT
            echo "GHEOF" >> $GITHUB_OUTPUT
          }

          EVENT="${{ github.event_name }}"
          if [ "$EVENT" = "repository_dispatch" ]; then
            ACTION="${{ github.event.action }}"
            set_output "trigger" "${ACTION}"
            set_output "payload" "${DISPATCH_PAYLOAD}"
          else
            set_output "trigger" "manual"
            set_output "payload" "{\"task\":\"${{ github.event.inputs.task }}\",\"company\":\"${{ github.event.inputs.company }}\"}"
          fi
        env:
          DISPATCH_PAYLOAD: ${{ toJson(github.event.client_payload) }}

      - name: Resolve company repo
        id: resolve
        env:
          DISPATCH_PAYLOAD: ${{ toJson(github.event.client_payload) }}
        run: |
          npm install --no-save @neondatabase/serverless 2>/dev/null
          COMPANY=$(echo "${DISPATCH_PAYLOAD}" | jq -r '.company // ""' 2>/dev/null || echo "")
          if [ -z "$COMPANY" ]; then
            COMPANY="${{ github.event.inputs.company }}"
          fi
          echo "company=${COMPANY}" >> $GITHUB_OUTPUT

          # Look up github_repo from DB
          if [ -n "$COMPANY" ]; then
            REPO=$(node -e "
              const { neon } = require('@neondatabase/serverless');
              const sql = neon(process.env.DATABASE_URL);
              sql\`SELECT github_repo FROM companies WHERE slug = \${'${COMPANY}'} LIMIT 1\`
                .then(r => { console.log(r[0]?.github_repo || ''); })
                .catch(() => process.exit(0));
            " 2>/dev/null || echo "")
            echo "company_repo=${REPO}" >> $GITHUB_OUTPUT
          else
            echo "company_repo=" >> $GITHUB_OUTPUT
          fi

  # ─── Job 1: Provision new company (needs Hive repo for templates) ───
  provision:
    needs: context
    if: needs.context.outputs.trigger == 'new_company'
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout Hive (for templates)
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Get tokens via OIDC
        id: auth
        uses: ./.github/actions/get-hive-tokens
        with:
          tokens: "claude:claude_token:true github_pat:gh_pat:true vercel_token:vercel_token:true"

      - name: Pre-flight — set company_type from approval context
        id: preflight
        run: |
          # Extract business_model from the Scout proposal approval context BEFORE Claude runs.
          # This prevents the bug where max_turns exhaustion leaves company_type unset.
          # Uses DATABASE_URL directly (already in env) — no API auth needed.
          COMPANY_SLUG="${{ needs.context.outputs.company }}"

          if [ -z "$COMPANY_SLUG" ]; then
            echo "No company slug — skipping preflight"
            exit 0
          fi

          npm install --no-save postgres 2>/dev/null

          BIZ_MODEL=$(node -e "
            const postgres = require('postgres');
            const sql = postgres(process.env.DATABASE_URL);
            async function run() {
              const [company] = await sql\`SELECT id, company_type FROM companies WHERE slug = \${'${COMPANY_SLUG}'} LIMIT 1\`;
              if (!company) { console.log(''); await sql.end(); return; }
              if (company.company_type) {
                console.log(company.company_type);
                await sql.end();
                return;
              }
              const [approval] = await sql\`
                SELECT context FROM approvals
                WHERE company_id = \${company.id} AND gate_type = 'new_company' AND status = 'approved'
                ORDER BY created_at DESC LIMIT 1
              \`;
              const biz = approval?.context?.proposal?.business_model || '';
              const market = approval?.context?.proposal?.market || 'global';
              const lang = market === 'Portugal' || market === 'portugal' ? 'pt' : 'en';
              if (biz) {
                await sql\`UPDATE companies SET company_type = \${biz}, market = \${market.toLowerCase()}, content_language = \${lang}, updated_at = NOW() WHERE id = \${company.id}\`;
                console.error('Set company_type=' + biz + ' market=' + market + ' lang=' + lang);
              }
              console.log(biz);
              await sql.end();
            }
            run().catch(e => { console.error(e.message); process.exit(0); });
          " 2>&1 | tail -1)

          echo "company_type=${BIZ_MODEL}" >> $GITHUB_OUTPUT
          if [ -n "$BIZ_MODEL" ]; then
            echo "Pre-flight: company_type set to ${BIZ_MODEL}"
          else
            echo "WARNING: Could not determine business_model from approval context"
          fi

      - name: Run provision agent
        id: agent
        env:
          GH_PAT: ${{ steps.auth.outputs.gh_pat }}
          GH_TOKEN: ${{ steps.auth.outputs.gh_pat }}
          VERCEL_TOKEN: ${{ steps.auth.outputs.vercel_token }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
        uses: anthropics/claude-code-action@v1
        with:
          allowed_bots: "hive-orchestrator[bot]"
          claude_code_oauth_token: ${{ steps.auth.outputs.claude_token }}
          claude_args: "--model claude-sonnet-4-6 --max-turns 70 --allowedTools Bash,Read,Write,Edit"
          prompt: |
            You are the Engineer agent of Hive. You provision infrastructure for new companies.

            TRIGGER: ${{ needs.context.outputs.trigger }}
            PAYLOAD: ${{ needs.context.outputs.payload }}

            FIRST check if already provisioned:
            `SELECT status, github_repo, vercel_project_id FROM companies WHERE slug = '${{ needs.context.outputs.company }}'`
            If status is 'mvp' AND github_repo IS NOT NULL AND vercel_project_id IS NOT NULL → already done.
            Log success and output: { "company": "${{ needs.context.outputs.company }}", "provisioned": true, "skipped": true }

            Otherwise, query: `SELECT id, name, slug, description, company_type FROM companies WHERE slug = '${{ needs.context.outputs.company }}'`
            Also get the approval context: `SELECT context FROM approvals WHERE company_id = '<id>' AND gate_type = 'new_company' ORDER BY created_at DESC LIMIT 1`
            Extract business_model from context.proposal.business_model.

            STEP 0 — Set company_type and check if business type is known:
            ```bash
            OIDC=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
              "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://hive-phi.vercel.app" | jq -r '.value')
            TYPE_RESULT=$(curl -s -X POST "https://hive-phi.vercel.app/api/agents/research-type" \
              -H "Authorization: Bearer $OIDC" \
              -H "Content-Type: application/json" \
              -d '{"business_model":"<business_model>","company_name":"<name>","company_description":"<description>"}')
            TYPE_STATUS=$(echo "$TYPE_RESULT" | jq -r '.status')
            ```
            If TYPE_STATUS is "known": good, continue provisioning normally.
            If TYPE_STATUS is "unknown": this is a new business type. You MUST:
              a. Read the research_prompt from TYPE_RESULT
              b. Use web search to research best practices for this business model
              c. Use the type_template and reference_types to generate a complete BusinessTypeDefinition
              d. Read src/lib/business-types.ts and add the new entry to the BUSINESS_TYPES array
              e. If the new type has unique phases, add PHASE_RULES entries in src/lib/validation.ts
              f. If the existing scoring models (saas/content/affiliate) don't fit, add a new scoring function in validation.ts
              g. Run `npx next build` to verify
              h. Commit the changes: `git add src/lib/business-types.ts src/lib/validation.ts && git commit -m "feat: add <type> business type definition"`
              i. Push to main (this is Hive's own repo, the type definition must be live before provisioning)
            Also set company_type on the company record:
            ```sql
            UPDATE companies SET company_type = '<business_model>', updated_at = NOW() WHERE slug = '<slug>'
            ```

            Then execute these steps IN ORDER:

            IMPORTANT: For ALL `gh` commands, you MUST set GH_TOKEN so it uses the personal access token:
            `export GH_TOKEN="$GH_PAT"`

            1. Create GitHub repo: `GH_TOKEN="$GH_PAT" gh repo create carloshmiranda/<slug> --public --description "<description>"`
               If the repo already exists, skip this step.
            2. Copy templates/boilerplate/ into /tmp/<slug> (INCLUDE hidden dirs like .github/):
               `cp -a templates/boilerplate/. /tmp/<slug>/` (the `-a` flag preserves structure, the `/.` copies hidden dirs)
               Then replace ALL template placeholders:
               Run these sed commands (use `sed -i` WITHOUT quotes after -i — this runs on Ubuntu):
               ```bash
               cd /tmp/<slug>
               # IMPORTANT: Do NOT run sed on .github/workflows/ — those use GitHub Actions expression syntax, not templates
               find . -path ./.github -prune -o -type f \( -name '*.ts' -o -name '*.tsx' -o -name '*.json' -o -name '*.txt' -o -name '*.md' -o -name '*.mjs' -o -name '*.example' \) -print | xargs sed -i \
                 -e 's/{{SLUG}}/<slug>/g' \
                 -e 's/{{COMPANY_NAME}}/<company_name>/g' \
                 -e 's/{{DESCRIPTION}}/<description>/g' \
                 -e 's/{{COMPANY_URL}}/https:\/\/<slug>.vercel.app/g' \
                 -e 's/{{TARGET_AUDIENCE}}/<target_audience_from_proposal>/g' \
                 -e 's/{{VALUE_PROPOSITION}}/<value_prop_from_proposal>/g' \
                 -e 's/{{FEATURE_1_TITLE}}/<feature_1_title>/g' \
                 -e 's/{{FEATURE_1_DESC}}/<feature_1_desc>/g' \
                 -e 's/{{FEATURE_2_TITLE}}/<feature_2_title>/g' \
                 -e 's/{{FEATURE_2_DESC}}/<feature_2_desc>/g' \
                 -e 's/{{FEATURE_3_TITLE}}/<feature_3_title>/g' \
                 -e 's/{{FEATURE_3_DESC}}/<feature_3_desc>/g' \
                 -e 's/{{FAQ_1_Q}}/<faq_1_question>/g' \
                 -e 's/{{FAQ_1_A}}/<faq_1_answer>/g' \
                 -e 's/{{FAQ_2_Q}}/<faq_2_question>/g' \
                 -e 's/{{FAQ_2_A}}/<faq_2_answer>/g' \
                 -e 's/{{FAQ_3_Q}}/<faq_3_question>/g' \
                 -e 's/{{FAQ_3_A}}/<faq_3_answer>/g' \
                 -e 's/{{LANG}}/<lang_code>/g' \
                 -e 's/{{STEP_1_TITLE}}/<step_1_title>/g' \
                 -e 's/{{STEP_1_DESC}}/<step_1_desc>/g' \
                 -e 's/{{STEP_2_TITLE}}/<step_2_title>/g' \
                 -e 's/{{STEP_2_DESC}}/<step_2_desc>/g' \
                 -e 's/{{STEP_3_TITLE}}/<step_3_title>/g' \
                 -e 's/{{STEP_3_DESC}}/<step_3_desc>/g' \
                 -e 's/{{METRIC_1}}/<metric_1_label>/g' \
                 -e 's/{{METRIC_2}}/<metric_2_label>/g' \
                 -e 's/{{METRIC_3}}/<metric_3_label>/g' \
                 -e "s/{{LAUNCH_DATE}}/$(date +%Y-%m-%d)/g" \
                 -e "s/{{INDEXNOW_KEY}}/$(openssl rand -hex 16)/g" \
                 -e 's/{{GSC_VERIFICATION}}//g'
               ```
               Get ALL placeholder values from the proposal context (step below):
               - TARGET_AUDIENCE, VALUE_PROPOSITION: from the proposal description
               - LANG: Set based on target audience language. Portuguese audience → "pt", English → "en", Spanish → "es", etc. This sets `<html lang="...">`. ALL landing page copy must be written in this language.
               - FEATURE_1/2/3_TITLE and FEATURE_1/2/3_DESC: Extract 3 key product features from the proposal. These appear on the landing page as feature cards. Write in the LANG language.
               - FAQ_1/2/3_Q and FAQ_1/2/3_A: Generate 3 relevant FAQs based on the product, target audience, and business model from the proposal. Write in the LANG language.
               - STEP_1/2/3_TITLE and STEP_1/2/3_DESC: 3 concrete steps showing how THIS product works (not generic "sign up, set up, get results"). Write in the LANG language. Each title 2-4 words, each desc under 80 chars.
               - METRIC_1/2/3: 3 domain-specific metric labels for the dashboard preview (e.g., "Active Users", "Revenue", "Uptime"). Write in the LANG language. Keep under 15 chars each.
               When building the landing page, customize the product preview mockups to show the actual product UI. Replace the generic dashboard mockup with a domain-specific preview (e.g., for a tax tool show tax calculations, for a portfolio tracker show holdings). The mockup should be built with CSS/SVG, not images.
               IMPORTANT: sed values must NOT contain `/` or `&` — escape them or use simple text. Keep feature titles short (3-5 words) and descriptions under 100 chars.
               Do NOT replace `{{POSITION}}` in waitlist/route.ts — that's a runtime template.
               CRITICAL verification — fail if placeholders remain:
               ```bash
               REMAINING=$(grep -r '{{[A-Z]' /tmp/<slug>/ --include='*.ts' --include='*.tsx' --include='*.json' --include='*.txt' --include='*.md' | grep -v POSITION | grep -v node_modules | grep -v NAME | grep -v REFERRAL | head -5)
               if [ -n "$REMAINING" ]; then
                 echo "ERROR: Unreplaced template placeholders found:"
                 echo "$REMAINING"
                 echo "Fix the sed commands above before continuing."
               fi
               ```
               - CLAUDE.md: Use templates/company-claude.md, replace ALL {{PLACEHOLDERS}} with real company data from the DB query.
                 Query the approval context for the full proposal: `SELECT context FROM approvals WHERE company_id = '<id>' AND gate_type = 'new_company' ORDER BY created_at DESC LIMIT 1`
                 Use context.proposal for description, target audience, etc.
                 Query playbook for insights: `SELECT domain, insight FROM playbook WHERE confidence >= 0.6 ORDER BY confidence DESC LIMIT 5`
                 This CLAUDE.md is what gives agents context to work on the company repo — make it thorough.
            2b. Company repos need ZERO secrets. All tokens are fetched at runtime via OIDC token exchange,
               and context/logging use the Hive API (no direct DB access from company repos).
            3. Configure git and push to the new repo:
               ```bash
               cd /tmp/<slug>
               git init && git add -A
               git config user.name "Hive Engineer"
               git config user.email "noreply@github.com"
               git commit -m "feat: initial scaffold for <slug>"
               git remote add origin https://x-access-token:${GH_PAT}@github.com/carloshmiranda/<slug>.git
               git push -u origin main
               ```
               If the remote already has commits, use `git push -u origin main --force`.
            4. Provision infrastructure via Hive API (creates Neon DB + Vercel project + enables Web Analytics + sets DATABASE_URL):
               ```bash
               OIDC=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
                 "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://hive-phi.vercel.app" | jq -r '.value')
               PROVISION_RESULT=$(curl -s -X POST "https://hive-phi.vercel.app/api/agents/provision" \
                 -H "Authorization: Bearer $OIDC" \
                 -H "Content-Type: application/json" \
                 -d '{"company_slug":"<slug>","company_id":"<id>"}')
               echo "Provision result: $PROVISION_RESULT"
               ```
               This single call handles: Neon DB creation + schema, Vercel project creation, Web Analytics,
               DATABASE_URL env var on Vercel, and infra records in DB. Check the result for errors.
            5. Record GitHub infra and update company (Neon + Vercel infra is already recorded by the provision API):
               ```sql
               INSERT INTO infra (company_id, service, resource_id, config)
               VALUES ('<id>', 'github', 'carloshmiranda/<slug>', '{}')
               ON CONFLICT DO NOTHING;

               UPDATE companies SET
                 status = 'mvp',
                 github_repo = 'carloshmiranda/<slug>',
                 updated_at = NOW()
               WHERE id = '<id>'
               ```
            6b. Ensure company repo has Hive agent workflows (for both new and imported repos):
               Check if `.github/workflows/hive-build.yml` exists in the company repo:
               ```bash
               HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
                 -H "Authorization: token $GH_PAT" \
                 "https://api.github.com/repos/carloshmiranda/<slug>/contents/.github/workflows/hive-build.yml")
               if [ "$HTTP_CODE" != "200" ]; then
                 echo "Pushing Hive workflow files to company repo..."
                 for file in hive-build.yml hive-growth.yml hive-fix.yml; do
                   CONTENT=$(base64 -w0 templates/boilerplate/.github/workflows/$file)
                   curl -s -X PUT "https://api.github.com/repos/carloshmiranda/<slug>/contents/.github/workflows/$file" \
                     -H "Authorization: token $GH_PAT" \
                     -H "Accept: application/vnd.github.v3+json" \
                     -d "{\"message\":\"chore: add Hive agent workflows\",\"content\":\"$CONTENT\"}"
                 done
               fi
               ```
            6c. Secret scan BEFORE making repo public.
               Scan the repo for leaked secrets. If any are found, DO NOT make the repo public.
               Instead, log an escalation and skip the visibility toggle.
               ```bash
               # Scan for common secret patterns in the pushed code
               SECRETS_FOUND=0
               cd /tmp/<slug> 2>/dev/null && {
                 # Check for hardcoded API keys, tokens, private keys
                 if grep -rIl --include='*.ts' --include='*.js' --include='*.json' --include='*.yml' --include='*.env' \
                   -E '(sk_live|sk_test|ghp_|AKIA|xox[bposa]-|-----BEGIN (RSA |EC )?PRIVATE KEY-----)' . 2>/dev/null; then
                   SECRETS_FOUND=1
                 fi
                 # Check for .env files with actual values (not .env.example)
                 if ls .env .env.local .env.production 2>/dev/null; then
                   SECRETS_FOUND=1
                 fi
                 cd -
               }
               if [ "$SECRETS_FOUND" = "1" ]; then
                 echo "FATAL: Secrets detected in repo. Keeping repo PRIVATE."
                 echo "Create an escalation approval gate and SKIP the visibility toggle."
                 # Insert escalation into approvals table via Hive API
                 # DO NOT proceed to make public
               fi
               ```
               Only if no secrets found, make company repo public (unlimited Actions minutes):
               ```bash
               if [ "$SECRETS_FOUND" = "0" ]; then
                 curl -s -X PATCH "https://api.github.com/repos/carloshmiranda/<slug>" \
                   -H "Authorization: token $GH_PAT" \
                   -H "Accept: application/vnd.github.v3+json" \
                   -d '{"visibility":"public"}'
               fi
               ```
            6d. Add Sentry error monitoring to the scaffolded company repo.
               Read the skill reference first: `cat .claude/skills/sentry-nextjs-sdk/SKILL.md`
               Then apply the minimal setup — error monitoring + tracing only (no session replay for new companies):

               In the company repo at `/tmp/<slug>` (or clone it if not present):
               ```bash
               cd /tmp/<slug>
               npm install @sentry/nextjs
               ```

               Create `sentry.client.config.ts`:
               ```typescript
               import * as Sentry from "@sentry/nextjs";

               Sentry.init({
                 dsn: process.env.NEXT_PUBLIC_SENTRY_DSN,
                 tracesSampleRate: 0.1,
                 debug: false,
               });
               ```

               Create `sentry.server.config.ts`:
               ```typescript
               import * as Sentry from "@sentry/nextjs";

               Sentry.init({
                 dsn: process.env.NEXT_PUBLIC_SENTRY_DSN,
                 tracesSampleRate: 0.1,
                 debug: false,
               });
               ```

               Create `sentry.edge.config.ts`:
               ```typescript
               import * as Sentry from "@sentry/nextjs";

               Sentry.init({
                 dsn: process.env.NEXT_PUBLIC_SENTRY_DSN,
                 tracesSampleRate: 0.1,
                 debug: false,
               });
               ```

               Create `instrumentation.ts` (or merge into existing if present):
               ```typescript
               export async function register() {
                 if (process.env.NEXT_RUNTIME === "nodejs") {
                   await import("./sentry.server.config");
                 }
                 if (process.env.NEXT_RUNTIME === "edge") {
                   await import("./sentry.edge.config");
                 }
               }
               ```

               Patch `next.config.ts` to wrap the default export with `withSentryConfig`.
               Read the current file, then rewrite it so the export becomes:
               ```typescript
               import { withSentryConfig } from "@sentry/nextjs";
               // ... existing imports and config ...
               export default withSentryConfig(nextConfig, {
                 org: "eidolon",
                 project: "<slug>",
                 silent: !process.env.CI,
                 widenClientFileUpload: true,
                 hideSourceMaps: true,
                 disableLogger: true,
               });
               ```

               Commit and push Sentry setup:
               ```bash
               cd /tmp/<slug>
               git add -A
               git commit -m "feat: add Sentry error monitoring"
               git push
               ```

               Add Sentry DSN as Vercel env var (use the Hive Sentry DSN from the SENTRY_DSN secret):
               ```bash
               echo "$SENTRY_DSN" | vercel env add NEXT_PUBLIC_SENTRY_DSN production --token "$VERCEL_TOKEN" --yes 2>/dev/null || true
               echo "$SENTRY_DSN" | vercel env add NEXT_PUBLIC_SENTRY_DSN preview --token "$VERCEL_TOKEN" --yes 2>/dev/null || true
               ```

               Log the Sentry infra record:
               ```sql
               INSERT INTO infra (company_id, service, resource_id, config)
               VALUES ('<id>', 'sentry', 'eidolon/<slug>', '{"project":"<slug>","org":"eidolon"}')
               ON CONFLICT DO NOTHING
               ```

               If SENTRY_DSN is not available in the workflow environment, skip this step silently — do not fail provisioning.

            7. Log success: `INSERT INTO agent_actions (agent, company_id, action_type, status, description, started_at, finished_at) VALUES ('engineer', '<id>', 'scaffold_company', 'success', 'Provisioned: GitHub repo + Vercel project', NOW(), NOW())`
            8. Generate initial product spec from the Scout proposal:
               Using the approval context you already queried (step 2, proposal + research), construct a product_spec JSON:
               ```json
               {
                 "mission": "<1 sentence from problem + solution>",
                 "what_we_build": "<1 paragraph describing the MVP>",
                 "vision": "<1 sentence long-term goal>",
                 "target_users": ["<user persona 1>", "<user persona 2>"],
                 "value_proposition": "<from proposal>",
                 "pricing_model": "<from proposal monetization>",
                 "competitive_positioning": "<1 sentence from competitive analysis>",
                 "feature_roadmap": {
                   "mvp": ["<feature 1>", "<feature 2>", "<feature 3>"],
                   "launch": ["<feature 4>", "<feature 5>"],
                   "scale": ["<feature 6>"]
                 },
                 "spec_version": 1,
                 "last_updated_cycle": 0
               }
               ```
               Write to DB:
               ```sql
               INSERT INTO research_reports (company_id, report_type, content, summary)
               VALUES ('<id>', 'product_spec', '<product_spec_json>'::jsonb, 'Initial spec from Scout proposal')
               ON CONFLICT (company_id, report_type) DO UPDATE SET content = EXCLUDED.content, summary = EXCLUDED.summary, updated_at = NOW()
               ```
               Also extract Scout research into separate reports if available in the approval context:
               ```sql
               INSERT INTO research_reports (company_id, report_type, content, summary)
               SELECT '<id>', unnest(ARRAY['market_research','competitive_analysis','seo_keywords']),
                      unnest(ARRAY[context->'research'->'market_research', context->'research'->'competitive_analysis', context->'research'->'seo_keywords']),
                      'Extracted from Scout proposal'
               FROM approvals WHERE company_id = '<id>' AND gate_type = 'new_company' AND context->'research' IS NOT NULL
               ON CONFLICT (company_id, report_type) DO NOTHING
               ```
            9. Generate initial task backlog (5-8 tasks):
               Based on the product spec, create initial tasks via SQL:
               ```sql
               INSERT INTO company_tasks (company_id, category, title, description, priority, source)
               VALUES
                 ('<id>', 'engineering', 'Build core value flow', '<describe the main user flow based on the product spec>', 1, 'ceo'),
                 ('<id>', 'engineering', 'Set up Stripe checkout', 'Configure pricing page and Stripe integration for the monetization model', 1, 'ceo'),
                 ('<id>', 'growth', 'Optimize landing page copy', 'Replace boilerplate hero/features with compelling copy targeting the primary user persona', 1, 'ceo'),
                 ('<id>', 'growth', 'Write first SEO blog post', 'Target the highest-volume keyword from SEO research with a 1500+ word article', 2, 'ceo'),
                 ('<id>', 'research', 'Validate target audience assumptions', 'Search Reddit/HN/forums for real user complaints matching our value proposition', 2, 'ceo'),
                 ('<id>', 'qa', 'End-to-end test core flow', 'Verify waitlist signup, email confirmation, and referral link work correctly', 2, 'ceo')
               ON CONFLICT DO NOTHING
               ```
               Customize the task descriptions based on the actual company and product spec.

            10. Create Stripe product for the company:
               Get an OIDC token and call the Hive API:
               ```bash
               OIDC=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
                 "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://hive-phi.vercel.app" | jq -r '.value')
               curl -s -X POST "https://hive-phi.vercel.app/api/agents/stripe/product" \
                 -H "Authorization: Bearer $OIDC" \
                 -H "Content-Type: application/json" \
                 -d '{"company_slug":"<slug>","name":"<Company Name> Pro","price_eur":<price>,"interval":"month"}'
               ```
               Use the pricing from the Scout proposal (monetisation field). Default to €9.99/month if unclear.
               Store the returned productId and priceId in the infra table:
               ```sql
               INSERT INTO infra (company_id, service, resource_id, config)
               VALUES ('<id>', 'stripe', '<productId>', '{"priceId":"<priceId>"}')
               ON CONFLICT DO NOTHING
               ```

            11. Extract patterns from imported repos (Phase 2 — only for imported companies):
               If this company was imported (not scaffolded from boilerplate), run pattern extraction:
               ```bash
               OIDC=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
                 "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://hive-phi.vercel.app" | jq -r '.value')
               EXTRACT_RESULT=$(curl -s -X POST "https://hive-phi.vercel.app/api/agents/extract" \
                 -H "Authorization: Bearer $OIDC" \
                 -H "Content-Type: application/json" \
                 -d '{"company_slug":"<slug>","company_id":"<id>"}')
               echo "Extraction result: $EXTRACT_RESULT"
               ```
               The extract API reads the company repo via GitHub API, detects which domains have
               reusable patterns (testing, CI/CD, auth, payments, SEO, etc.), reads key files,
               and returns an extraction_prompt. If new_domains is non-empty, use the prompt to
               generate playbook entries and POST each one to the Hive playbook API:
               ```bash
               curl -s -X POST "https://hive-phi.vercel.app/api/agents/playbook" \
                 -H "Authorization: Bearer $OIDC" \
                 -H "Content-Type: application/json" \
                 -d '{"source_company_id":"<id>","domain":"<domain>","insight":"<insight>","confidence":0.8}'
               ```

            The provision API (step 4) handles Neon DB creation, schema, Vercel project, Web Analytics, and DATABASE_URL.
            You do NOT need to create these manually — the API does it all in one call.
            Output: { "company": "<slug>", "provisioned": true }

  # ─── Job 1b: Teardown killed company (deterministic, no LLM) ───
  teardown:
    needs: context
    if: >
      needs.context.outputs.trigger == 'ops_escalation' &&
      contains(needs.context.outputs.payload, 'kill_teardown')
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout Hive
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Get tokens via OIDC
        id: auth
        uses: ./.github/actions/get-hive-tokens
        with:
          tokens: "github_pat:gh_pat vercel_token:vercel_token neon_api_key:neon_key"

      - name: Teardown infrastructure
        env:
          GH_TOKEN: ${{ steps.auth.outputs.gh_pat }}
          VERCEL_TOKEN: ${{ steps.auth.outputs.vercel_token }}
          NEON_KEY: ${{ steps.auth.outputs.neon_key }}
        run: |
          COMPANY="${{ needs.context.outputs.company }}"
          npm install --no-save postgres 2>/dev/null

          echo "=== Tearing down company: $COMPANY ==="

          # 1. Look up infra records
          INFRA=$(node -e "
            const postgres = require('postgres');
            const sql = postgres(process.env.DATABASE_URL);
            async function run() {
              const rows = await sql\`
                SELECT i.*, c.id as cid FROM infra i
                JOIN companies c ON c.id = i.company_id
                WHERE c.slug = \${'${COMPANY}'} AND i.status != 'torn_down'
              \`;
              console.log(JSON.stringify(rows));
              await sql.end();
            }
            run().catch(e => { console.error(e.message); console.log('[]'); });
          " 2>/dev/null)

          echo "Infra records: $INFRA"

          # 2. Delete Vercel project
          VERCEL_ID=$(echo "$INFRA" | jq -r '.[] | select(.service == "vercel") | .resource_id // empty' | head -1)
          if [ -n "$VERCEL_ID" ] && [ -n "$VERCEL_TOKEN" ]; then
            echo "Deleting Vercel project: $VERCEL_ID"
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
              "https://api.vercel.com/v9/projects/$VERCEL_ID" \
              -H "Authorization: Bearer $VERCEL_TOKEN")
            echo "  Vercel delete: HTTP $HTTP"
          else
            echo "  No Vercel project to delete"
          fi

          # 3. Delete Neon project
          NEON_ID=$(echo "$INFRA" | jq -r '.[] | select(.service == "neon") | .resource_id // empty' | head -1)
          if [ -n "$NEON_ID" ] && [ -n "$NEON_KEY" ]; then
            echo "Deleting Neon project: $NEON_ID"
            HTTP=$(curl -s -o /dev/null -w "%{http_code}" -X DELETE \
              "https://console.neon.tech/api/v2/projects/$NEON_ID" \
              -H "Authorization: Bearer $NEON_KEY")
            echo "  Neon delete: HTTP $HTTP"
          else
            echo "  No Neon project to delete (or no API key)"
          fi

          # 4. Archive GitHub repo (if not already)
          REPO=$(echo "$INFRA" | jq -r '.[] | select(.service == "github") | .resource_id // empty' | head -1)
          if [ -z "$REPO" ]; then
            REPO="carloshmiranda/${COMPANY}"
          fi
          if [ -n "$GH_TOKEN" ]; then
            echo "Archiving GitHub repo: $REPO"
            curl -s -o /dev/null -X PATCH "https://api.github.com/repos/$REPO" \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              -d '{"archived":true}' || true
          fi

          # 5. Mark infra as torn down
          node -e "
            const postgres = require('postgres');
            const sql = postgres(process.env.DATABASE_URL);
            async function run() {
              const [c] = await sql\`SELECT id FROM companies WHERE slug = \${'${COMPANY}'} LIMIT 1\`;
              if (!c) { await sql.end(); return; }
              await sql\`UPDATE infra SET status = 'torn_down', torn_down_at = NOW() WHERE company_id = \${c.id} AND status != 'torn_down'\`;
              console.log('Infra marked as torn_down');
              await sql.end();
            }
            run().catch(e => console.error(e.message));
          " 2>/dev/null

          # 6. Log teardown to agent_actions
          node -e "
            const postgres = require('postgres');
            const sql = postgres(process.env.DATABASE_URL);
            async function run() {
              const [c] = await sql\`SELECT id FROM companies WHERE slug = \${'${COMPANY}'} LIMIT 1\`;
              await sql\`
                INSERT INTO agent_actions (company_id, agent, action_type, status, description, started_at, finished_at)
                VALUES (\${c?.id || null}, 'engineer', 'teardown', 'success',
                  \${'Torn down infrastructure for ' + '${COMPANY}' + ': Vercel, Neon, GitHub archived'},
                  NOW(), NOW())
              \`;
              await sql.end();
            }
            run().catch(e => console.error(e.message));
          " 2>/dev/null

          echo "=== Teardown complete for $COMPANY ==="

  # ─── Job 2: Dispatch build to company repo (runs on their unlimited Actions minutes) ───
  build:
    needs: context
    if: >
      needs.context.outputs.company_repo != '' &&
      !contains(needs.context.outputs.payload, 'kill_teardown') && (
        needs.context.outputs.trigger == 'feature_request' ||
        needs.context.outputs.trigger == 'ops_escalation' ||
        needs.context.outputs.trigger == 'deploy_drift' ||
        startsWith(needs.context.outputs.trigger, 'issue:') ||
        needs.context.outputs.trigger == 'manual'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Get GitHub PAT via OIDC
        id: auth
        run: |
          OIDC_TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://hive-phi.vercel.app" \
            | jq -r '.value')
          RESPONSE=$(curl -s -X POST "https://hive-phi.vercel.app/api/agents/token" \
            -H "Authorization: Bearer $OIDC_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{"token_type":"github_pat"}')
          GH_PAT=$(echo "$RESPONSE" | jq -r '.data.token // empty')
          if [ -z "$GH_PAT" ]; then
            echo "Failed to get GitHub PAT: $(echo "$RESPONSE" | jq -r '.error // "unknown"')"
            exit 1
          fi
          echo "::add-mask::$GH_PAT"
          echo "gh_pat=$GH_PAT" >> $GITHUB_OUTPUT

      - name: Dispatch build to company repo
        env:
          GH_TOKEN: ${{ steps.auth.outputs.gh_pat }}
          PAYLOAD_JSON: ${{ needs.context.outputs.payload }}
        run: |
          COMPANY="${{ needs.context.outputs.company }}"
          COMPANY_REPO="${{ needs.context.outputs.company_repo }}"
          TRIGGER="${{ needs.context.outputs.trigger }}"
          TASK_SUMMARY=$(echo "$PAYLOAD_JSON" | jq -r '.task // .meta.title // .title // "Build task"' 2>/dev/null | head -c 100)

          echo "Dispatching build to ${COMPANY_REPO} (runs on company's unlimited Actions minutes)"

          # Build request body with jq to handle JSON escaping properly
          # workflow_dispatch inputs are strings, so payload must be a JSON-encoded string
          PAYLOAD_STR=$(echo "$PAYLOAD_JSON" | jq -c '.' 2>/dev/null || echo '{}')
          REQUEST_BODY=$(jq -n \
            --arg ref "main" \
            --arg task "$TASK_SUMMARY" \
            --arg slug "$COMPANY" \
            --arg trigger "$TRIGGER" \
            --arg payload "$PAYLOAD_STR" \
            '{ref: $ref, inputs: {task_summary: $task, company_slug: $slug, trigger: $trigger, payload: $payload}}')

          # Trigger workflow_dispatch on the company repo's hive-build.yml
          HTTP_CODE=$(curl -s -o /tmp/dispatch-response.txt -w "%{http_code}" \
            -X POST "https://api.github.com/repos/${COMPANY_REPO}/actions/workflows/hive-build.yml/dispatches" \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            -d "$REQUEST_BODY")

          if [ "$HTTP_CODE" = "204" ]; then
            echo "Build dispatched to ${COMPANY_REPO} (HTTP ${HTTP_CODE})"
          elif [ "$HTTP_CODE" = "404" ]; then
            echo "Dispatch failed (HTTP 404) — GH_PAT likely missing 'workflow' scope, or workflow not found."
            echo "Check: GitHub Settings → Developer settings → PAT → ensure 'workflow' scope is enabled."
            echo "Also verify hive-build.yml exists: gh api repos/${COMPANY_REPO}/actions/workflows"
            cat /tmp/dispatch-response.txt
            exit 1
          else
            echo "Dispatch failed (HTTP ${HTTP_CODE}):"
            cat /tmp/dispatch-response.txt
            exit 1
          fi

      - name: Log dispatch to Hive API
        if: success()
        run: |
          OIDC_TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://hive-phi.vercel.app" \
            | jq -r '.value')
          curl -s -X POST "https://hive-phi.vercel.app/api/agents/log" \
            -H "Authorization: Bearer $OIDC_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"company_slug\":\"${{ needs.context.outputs.company }}\",\"agent\":\"engineer\",\"action_type\":\"${{ needs.context.outputs.trigger }}\",\"status\":\"success\",\"description\":\"Dispatched build to company repo ${{ needs.context.outputs.company_repo }}\"}" || true

  # ─── Job 2b: Fallback — no company repo, run on Hive (Hive-internal work only) ───
  build-hive:
    needs: context
    if: >
      needs.context.outputs.company_repo == '' &&
      !contains(needs.context.outputs.payload, 'kill_teardown') && (
        needs.context.outputs.trigger == 'feature_request' ||
        needs.context.outputs.trigger == 'ops_escalation' ||
        needs.context.outputs.trigger == 'deploy_drift' ||
        needs.context.outputs.trigger == 'ci_fix' ||
        startsWith(needs.context.outputs.trigger, 'issue:') ||
        needs.context.outputs.trigger == 'manual'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Hive
        uses: actions/checkout@v4

      - name: Configure git
        run: |
          git config user.name "Hive Engineer"
          git config user.email "noreply@github.com"

      - name: Get tokens via OIDC
        id: auth
        uses: ./.github/actions/get-hive-tokens
        with:
          tokens: "claude:claude_token:true github_pat:gh_pat:true"

      - name: Resolve model and turn budget
        id: model
        env:
          PAYLOAD_JSON: ${{ needs.context.outputs.payload }}
        run: |
          # Model escalation: payload may override model/max_turns for retries
          MODEL=$(echo "$PAYLOAD_JSON" | jq -r '.meta.model // .model // empty' 2>/dev/null)
          MAX_TURNS=$(echo "$PAYLOAD_JSON" | jq -r '.max_turns // empty' 2>/dev/null)

          # Dynamic max_turns from spec.complexity when no explicit override
          if [ -z "$MAX_TURNS" ]; then
            COMPLEXITY=$(echo "$PAYLOAD_JSON" | jq -r '.spec | if type == "string" then fromjson else . end | .complexity // empty' 2>/dev/null || echo "")
            case "$COMPLEXITY" in
              S)  MAX_TURNS=25 ;;
              M)  MAX_TURNS=45 ;;
              L)  MAX_TURNS=70 ;;
              XL) MAX_TURNS=80 ;;
              *)  MAX_TURNS=70 ;;
            esac
          fi

          echo "model=${MODEL:-claude-sonnet-4-6}" >> $GITHUB_OUTPUT
          echo "max_turns=${MAX_TURNS}" >> $GITHUB_OUTPUT

      - name: Pre-execution guard — check turn budget
        id: turn_guard
        env:
          PAYLOAD_JSON: ${{ needs.context.outputs.payload }}
        run: |
          # Extract estimated_turns from spec (if present)
          ESTIMATED_TURNS=$(echo "$PAYLOAD_JSON" | jq -r '.spec | if type == "string" then fromjson else . end | .estimated_turns // empty' 2>/dev/null || echo "")

          if [ -n "$ESTIMATED_TURNS" ] && [ "$ESTIMATED_TURNS" -gt 28 ]; then
            echo "⚠️  Pre-execution guard: estimated_turns ($ESTIMATED_TURNS) > 28, marking for decomposition"

            # Extract backlog_id to mark item as needing decomposition
            BACKLOG_ID=$(echo "$PAYLOAD_JSON" | jq -r '.backlog_id // empty' 2>/dev/null)

            if [ -n "$BACKLOG_ID" ]; then
              # Get OIDC token and mark item as needs_decomposition
              OIDC_TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
                "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://hive-phi.vercel.app" \
                | jq -r '.value')

              # Mark item as needs_decomposition (this prevents retry loops)
              curl -s -X POST "https://hive-phi.vercel.app/api/backlog/update" \
                -H "Authorization: Bearer $OIDC_TOKEN" \
                -H "Content-Type: application/json" \
                -d "{\"id\":\"$BACKLOG_ID\",\"status\":\"blocked\",\"notes_append\":\" [needs_decomposition] Estimated turns ($ESTIMATED_TURNS) exceeds budget (28) — blocked by pre-execution guard.\"}" || true

              echo "Marked backlog item $BACKLOG_ID as needs_decomposition"
            else
              echo "No backlog_id found — cannot update status"
            fi

            echo "skip=true" >> $GITHUB_OUTPUT

            # Chain continues: dispatch cycle_complete so CEO can score
            COMPANY=$(echo '${{ needs.context.outputs.company }}' || echo "")
            if [ -n "$COMPANY" ]; then
              GH_TOKEN="${{ steps.auth.outputs.gh_pat }}"
              curl -s -X POST "https://api.github.com/repos/${GITHUB_REPOSITORY}/dispatches" \
                -H "Authorization: token ${GH_TOKEN}" \
                -H "Accept: application/vnd.github.v3+json" \
                -d "{\"event_type\":\"cycle_complete\",\"client_payload\":{\"company\":\"${COMPANY}\",\"source\":\"engineer\",\"status\":\"skipped\"}}" || true
            fi
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "✅ Turn budget check passed: estimated_turns=${ESTIMATED_TURNS:-"not specified"}, proceeding with Claude execution"
          fi

      - name: Extract spec fields
        id: spec
        if: steps.turn_guard.outputs.skip != 'true'
        env:
          PAYLOAD_JSON: ${{ needs.context.outputs.payload }}
        run: |
          # Extract spec fields from PAYLOAD for inline injection into prompt
          SPEC_JSON=$(echo "$PAYLOAD_JSON" | jq -r '.spec | if type == "string" then fromjson else . end // empty' 2>/dev/null || echo "")

          if [ -z "$SPEC_JSON" ] || [ "$SPEC_JSON" = "null" ]; then
            echo "has_spec=false" >> $GITHUB_OUTPUT
          else
            echo "has_spec=true" >> $GITHUB_OUTPUT

            # Extract each field — handle both string and array types
            APPROACH=$(echo "$SPEC_JSON" | jq -r '.approach // empty' 2>/dev/null || echo "")
            CRITERIA=$(echo "$SPEC_JSON" | jq -r '.acceptance_criteria | if type == "array" then map("- " + .) | join("\n") elif . == null then "" else . end' 2>/dev/null || echo "")
            FILES=$(echo "$SPEC_JSON" | jq -r '.affected_files | if type == "array" then join(", ") elif . == null then "" else . end' 2>/dev/null || echo "")
            RISKS=$(echo "$SPEC_JSON" | jq -r '.risks | if type == "array" then join("; ") elif . == null then "" else . end' 2>/dev/null || echo "")
            COMPLEXITY=$(echo "$SPEC_JSON" | jq -r '.complexity // empty' 2>/dev/null || echo "")
            EST_TURNS=$(echo "$SPEC_JSON" | jq -r '.estimated_turns // empty' 2>/dev/null || echo "")

            # Write multi-line outputs using heredoc delimiters
            echo "approach<<GHEOF" >> $GITHUB_OUTPUT
            echo "$APPROACH" >> $GITHUB_OUTPUT
            echo "GHEOF" >> $GITHUB_OUTPUT

            echo "acceptance_criteria<<GHEOF" >> $GITHUB_OUTPUT
            echo "$CRITERIA" >> $GITHUB_OUTPUT
            echo "GHEOF" >> $GITHUB_OUTPUT

            echo "affected_files<<GHEOF" >> $GITHUB_OUTPUT
            echo "$FILES" >> $GITHUB_OUTPUT
            echo "GHEOF" >> $GITHUB_OUTPUT

            echo "risks<<GHEOF" >> $GITHUB_OUTPUT
            echo "$RISKS" >> $GITHUB_OUTPUT
            echo "GHEOF" >> $GITHUB_OUTPUT

            echo "complexity=${COMPLEXITY}" >> $GITHUB_OUTPUT
            echo "estimated_turns=${EST_TURNS}" >> $GITHUB_OUTPUT
          fi

      - name: Guard — block company work when company lacks github_repo
        id: company_guard
        if: steps.turn_guard.outputs.skip != 'true'
        env:
          COMPANY: ${{ needs.context.outputs.company }}
          TRIGGER: ${{ needs.context.outputs.trigger }}
        run: |
          # build-hive only runs when company_repo == ''. If COMPANY is a real slug
          # (not empty and not '_hive'), it means the company exists but has no github_repo
          # (unprovisioned). Running the Engineer in the Hive repo for company work would
          # misfile any GitHub Issues to the wrong repo. Block it.
          if [ -z "$COMPANY" ] || [ "$COMPANY" = "_hive" ]; then
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "✅ Hive self-improvement work — company guard passed"
            exit 0
          fi

          echo "::warning::Company '$COMPANY' has no github_repo (unprovisioned). Cannot run Engineer in Hive repo for company work (trigger: $TRIGGER)."
          echo "Company must be provisioned with a github_repo before Engineer can execute company work."
          echo "skip=true" >> $GITHUB_OUTPUT

          # Log to agent_actions
          OIDC_TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://hive-phi.vercel.app" \
            | jq -r '.value')
          curl -s -X POST "https://hive-phi.vercel.app/api/agents/log" \
            -H "Authorization: Bearer $OIDC_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"company_slug\":\"$COMPANY\",\"agent\":\"engineer\",\"action_type\":\"${TRIGGER:-feature_request}\",\"status\":\"skipped\",\"description\":\"Skipped: company has no github_repo — needs provisioning before Engineer can run\"}" || true

          # Chain continues: dispatch cycle_complete so CEO can score
          if [ -n "$COMPANY" ]; then
            GH_TOKEN="${{ steps.auth.outputs.gh_pat }}"
            curl -s -X POST "https://api.github.com/repos/${GITHUB_REPOSITORY}/dispatches" \
              -H "Authorization: token ${GH_TOKEN}" \
              -H "Accept: application/vnd.github.v3+json" \
              -d "{\"event_type\":\"cycle_complete\",\"client_payload\":{\"company\":\"${COMPANY}\",\"source\":\"engineer\",\"status\":\"skipped\"}}" || true
          fi

      - name: Run build agent (Hive-internal only)
        if: steps.turn_guard.outputs.skip != 'true' && steps.company_guard.outputs.skip != 'true'
        id: agent
        env:
          GH_PAT: ${{ steps.auth.outputs.gh_pat }}
        uses: anthropics/claude-code-action@v1
        with:
          allowed_bots: "hive-orchestrator[bot]"
          claude_code_oauth_token: ${{ steps.auth.outputs.claude_token }}
          claude_args: "--model ${{ steps.model.outputs.model }} --max-turns ${{ steps.model.outputs.max_turns }} --allowedTools Bash,Read,Write,Edit"
          prompt: |
            You are the Engineer agent of Hive. You are working on the Hive repo itself.

            TRIGGER: ${{ needs.context.outputs.trigger }}
            PAYLOAD: ${{ needs.context.outputs.payload }}
            COMPANY: ${{ needs.context.outputs.company }}

            ## Routing

            If COMPANY is "_hive" or empty, this is Hive self-improvement work.
            If COMPANY is a real company slug but has no github_repo, log "Company needs provisioning first" and exit.

            ## Self-improvement workflow (COMPANY = "_hive")

            The PAYLOAD contains task, description, and optionally proposal_id and branch.
            This is an automated improvement proposal from Sentinel — implement it.

            ${{ steps.spec.outputs.has_spec == 'true' && '## IMPLEMENTATION SPEC (pre-analyzed — follow exactly)' || '' }}
            ${{ steps.spec.outputs.has_spec == 'true' && format('**Approach:**\n{0}', steps.spec.outputs.approach) || '' }}
            ${{ steps.spec.outputs.has_spec == 'true' && format('**Acceptance criteria** (verify ALL before committing):\n{0}', steps.spec.outputs.acceptance_criteria) || '' }}
            ${{ steps.spec.outputs.has_spec == 'true' && format('**Affected files** (read these first — do NOT explore the codebase):\n{0}', steps.spec.outputs.affected_files) || '' }}
            ${{ steps.spec.outputs.has_spec == 'true' && format('**Risks:** {0}', steps.spec.outputs.risks) || '' }}
            ${{ steps.spec.outputs.has_spec == 'true' && format('**Complexity:** {0} | **Estimated turns:** {1}', steps.spec.outputs.complexity, steps.spec.outputs.estimated_turns) || '' }}
            ${{ steps.spec.outputs.has_spec == 'true' && 'A spec is present — go straight to implementation. Do NOT explore or re-plan.' || '' }}

            1. Read CLAUDE.md, BRIEFING.md, MISTAKES.md for context
            2. Parse the task description from PAYLOAD to understand what to build
            3. Create a feature branch: use the branch name from PAYLOAD if provided, otherwise hive/improvement/short-slug
               `git checkout -b <branch>`
            4. Implement the change
            5. Run `npx next build` — fix any errors until it passes
            6. Commit with conventional commit message (feat/fix/refactor)
            7. Push the branch and create a PR:
               `GH_TOKEN="$GH_PAT" gh pr create --title "<title>" --body "<diagnosis + what was done>"`
            8. Enable auto-merge so CI triggers the merge automatically:
               `GH_TOKEN="$GH_PAT" gh pr merge --auto --squash --delete-branch <PR_NUMBER>`
            9. Log success to agent_actions via the Hive API

            IMPORTANT: ALL self-improvement changes go through a PR — no direct pushes to main.
            main is branch-protected and requires CI to pass. Auto-merge handles the merge the
            moment CI goes green (~2-3 min). Do NOT attempt to push directly to main.

            ## CI fix workflow (TRIGGER = ci_fix)

            A PR has failing CI. Your job: fix the build errors and push to the SAME branch.

            1. Parse PAYLOAD for: branch, pr_number, ci_errors, task
            2. Checkout the existing branch:
               `git fetch origin && git checkout <branch>`
            3. Read CLAUDE.md and MISTAKES.md for context
            4. Read the ci_errors from PAYLOAD — these are the actual CI failure messages
            5. **Before touching any code**, validate what you are about to write:
               - Run `npx tsx scripts/lint-sql.ts` to see ALL current SQL errors
               - Read `schema.sql` to verify column names before writing any SQL query
               - Common SQL lint failures and their fixes:
                 - `Column 'X' does not exist` → check schema.sql for correct column name
                 - `Value 'X' not allowed for Y.status` → check the CHECK constraint in schema.sql
                 - Never use columns like `github_repo`, `lifecycle` on tables that don't have them
                   (run `grep -A 30 "CREATE TABLE companies" schema.sql` to see exact columns)
            6. Fix ALL the errors. Common CI failures:
               - `npx next build` type/import errors → fix the TypeScript
               - `lint-sql` failures → check schema.sql, fix column/enum references
               - `npm ci` ERESOLVE errors → check peer deps before adding packages; use `npm install --legacy-peer-deps` only if necessary and document why
               - `schema-map:check` failures → run `npx tsx scripts/generate-schema-map.ts` after schema changes
            7. Run `npx tsx scripts/lint-sql.ts && npx next build` to verify ALL errors are fixed before pushing
            8. Commit with: `fix: resolve CI failures on PR #<pr_number>`
            9. Push to the same branch: `git push origin HEAD`
               Do NOT create a new PR — one already exists for this branch.
            10. Log success to agent_actions via the Hive API

            ## Regular Hive-internal work

            For non-self-improvement tasks (ops_escalation, deploy_drift, etc.):
            1. Create a branch: `git checkout -b hive/fix/short-slug`
            2. **Before writing any code**, validate the schema:
               - Run `npx tsx scripts/lint-sql.ts` to see existing SQL errors (fix any you notice)
               - Read `schema.sql` to verify column names before writing any SQL query
               - Never reference columns that don't exist in the schema (e.g. `github_repo` on `hive_backlog`, `lifecycle` on `companies`)
               - Never use enum values not in the CHECK constraint (e.g. `rate_limited` is not a valid `agent_actions.status`)
            3. Implement the change
            4. Run `npx tsx scripts/lint-sql.ts && npx next build` — fix ALL errors before proceeding
            5. Commit and push the branch
            6. Create a PR and enable auto-merge:
               `GH_TOKEN="$GH_PAT" gh pr create --title "<title>" --body "<what was done>"`
               `GH_TOKEN="$GH_PAT" gh pr merge --auto --squash --delete-branch <PR_NUMBER>`
            7. Log to agent_actions

            ## Skill catalog
            Before writing frontend code, configuring Tailwind, deploying, or adding error monitoring, read the relevant skill:
            - Tailwind CSS: `cat .claude/skills/tailwind-4-docs/SKILL.md`
            - React/Next.js components: `cat .claude/skills/vercel-react-best-practices/SKILL.md`
            - Deploying to Vercel: `cat .claude/skills/deploy-to-vercel/SKILL.md`
            - Sentry error monitoring (add/fix/configure): `cat .claude/skills/sentry-nextjs-sdk/SKILL.md`

            ## GitHub Issue routing
            When creating a GitHub Issue, route to the correct repo:
            - Company product work (features, bugs for a specific company) → `carloshmiranda/$COMPANY`
            - Hive platform work (infra bugs, agent improvements, orchestrator issues) → `carloshmiranda/hive`
            Always use: `GH_TOKEN="$GH_PAT" gh issue create --repo carloshmiranda/<correct-repo> ...`
            Never file company issues in the hive repo or vice versa.
            Note: if COMPANY is empty or "_hive", all issues go to `carloshmiranda/hive`.

            ## Rules
            - Always use `GH_TOKEN="$GH_PAT"` for gh commands
            - Write to agent_actions table: what you did, status, any errors
            - Read files before editing them
            - Keep changes focused — one improvement per PR

            ## Turn Budget Management
            You have a limited turn budget. Work efficiently and protect your progress:
            - Focus on completing a WORKING SUBSET over perfection. A partial implementation
              that builds and passes tests is more valuable than an ambitious one that does not.
            - If you have made changes to files, commit checkpoints periodically:
              `git add <files> && git commit -m "wip: checkpoint — <what is done so far>"`
            - When nearing your budget limit, STOP expanding scope. Instead:
              1. Commit all current changes
              2. Push the branch: `git push -u origin HEAD`
              3. Write a brief summary of what is done and what remains in the PR or commit message
            - If the spec has acceptance_criteria, tackle them in priority order. Each completed
              criterion is progress that survives even if you run out of turns.

      - name: Verify build passes before marking success
        id: build_check
        if: steps.agent.outcome == 'success'
        run: |
          CHANGED=$(git diff --name-only origin/main 2>/dev/null | wc -l | tr -d ' ')
          if [ "${CHANGED:-0}" = "0" ]; then
            echo "No file changes detected — skipping build verification"
            exit 0
          fi
          echo "=== Build verification ($CHANGED changed files) ==="
          echo "--- SQL lint ---"
          if ! npx tsx scripts/lint-sql.ts; then
            echo "::error::SQL lint failed. Engineer submitted invalid column/enum references."
            exit 1
          fi
          echo "--- Next.js build ---"
          if ! npx next build; then
            echo "::error::Build failed. Engineer submitted code that does not compile."
            exit 1
          fi
          echo "=== Build verification PASSED ==="

      - name: Log success to Hive API
        if: steps.agent.outcome == 'success' && (steps.build_check.outcome == 'success' || steps.build_check.outcome == 'skipped')
        env:
          PAYLOAD_JSON: ${{ needs.context.outputs.payload }}
        run: |
          OIDC_TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://hive-phi.vercel.app" \
            | jq -r '.value')
          TASK=$(echo "${PAYLOAD_JSON}" | jq -r '.task // "Hive-internal work"' 2>/dev/null | head -c 200 || echo "Hive-internal work")
          TASK_ESCAPED=$(echo "$TASK" | jq -Rs '.' | sed 's/^"//;s/"$//')
          TRIGGER="${{ needs.context.outputs.trigger }}"
          curl -s -X POST "https://hive-phi.vercel.app/api/agents/log" \
            -H "Authorization: Bearer $OIDC_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"company_slug\":\"${{ needs.context.outputs.company }}\",\"agent\":\"engineer\",\"action_type\":\"${TRIGGER:-feature_request}\",\"status\":\"success\",\"description\":\"${TASK_ESCAPED}\"}" || true

      - name: Notify via Telegram
        if: always()
        env:
          PAYLOAD_JSON: ${{ needs.context.outputs.payload }}
        run: |
          OIDC_TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://hive-phi.vercel.app" \
            | jq -r '.value')
          STATUS="${{ steps.agent.outcome == 'success' && 'success' || 'failed' }}"
          TASK=$(echo "${PAYLOAD_JSON}" | jq -r '.task // "Hive-internal work"' 2>/dev/null || echo "Hive-internal work")
          curl -s -X POST "https://hive-phi.vercel.app/api/notify" \
            -H "Authorization: Bearer $OIDC_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"agent\":\"engineer\",\"action\":\"self_improvement\",\"company\":\"hive\",\"status\":\"${STATUS}\",\"summary\":\"${TASK}\"}" || true

      - name: Chain dispatch next work item
        if: always()
        env:
          PAYLOAD_JSON: ${{ needs.context.outputs.payload }}
        run: |
          OIDC_TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://hive-phi.vercel.app" \
            | jq -r '.value')
          BACKLOG_ID=$(echo "${PAYLOAD_JSON}" | jq -r '.backlog_id // empty' 2>/dev/null || echo "")
          AGENT_OUTCOME="${{ steps.agent.outcome }}"
          HIVE_URL="https://hive-phi.vercel.app"
          COMPANY=$(echo "${PAYLOAD_JSON}" | jq -r '.company // empty' 2>/dev/null || echo "")
          CONFIGURED_MAX_TURNS="${{ steps.model.outputs.max_turns }}"

          # Pre-execution guard skipped the agent step — guard already marked item as
          # needs_decomposition via API. No callback needed here; exit to avoid
          # inflating the circuit breaker with false-positive failures.
          if [ "$AGENT_OUTCOME" = "skipped" ]; then
            echo "Agent step skipped by pre-execution guard — guard handled the item, no callback needed"
            exit 0
          fi

          # Override outcome if build verification failed (agent succeeded but code doesn't compile)
          BUILD_FAILED=""
          if [ "$AGENT_OUTCOME" = "success" ] && [ "${{ steps.build_check.outcome }}" = "failure" ]; then
            AGENT_OUTCOME="failure"
            BUILD_FAILED="true"
            echo "  Build verification failed — reclassifying agent outcome as failure"
          fi

          # Extract error subtype and message for decompose logic + chain propagation
          ERROR_TYPE=""
          ERROR_DETAIL=""
          TURNS="0"
          if [ -n "$BUILD_FAILED" ]; then
            ERROR_TYPE="build_failed"
            ERROR_DETAIL="Engineer submitted code that fails TypeScript/SQL validation. Build or lint step rejected output."
          elif [ "$AGENT_OUTCOME" != "success" ]; then
            EXEC_FILE="${{ steps.agent.outputs.execution_file }}"
            if [ -z "$EXEC_FILE" ] || [ ! -f "$EXEC_FILE" ]; then
              EXEC_FILE="/home/runner/work/_temp/claude-execution-output.json"
            fi

            if [ -f "$EXEC_FILE" ] && [ -s "$EXEC_FILE" ]; then
              # Get subtype from last entry (works for all exit types)
              ERROR_TYPE=$(jq -r '.[-1].subtype // ""' "$EXEC_FILE" 2>/dev/null || echo "")
              # Get error message: try .error, .result, then scan for any error in the array
              ERROR_DETAIL=$(jq -r '(.[-1].error // .[-1].result // ([.[] | select(.type == "system" or .type == "error" or .type == "result")] | last | .error // .result // "")) | tostring | .[0:300]' "$EXEC_FILE" 2>/dev/null || echo "")
              TURNS=$(jq -r '.[-1].num_turns // 0' "$EXEC_FILE" 2>/dev/null || echo "0")
              echo "  Error type: $ERROR_TYPE | Detail: ${ERROR_DETAIL:0:100} | Turns: $TURNS"
            else
              # Claude never started — no execution file produced
              ERROR_TYPE="workflow_crash"
              ERROR_DETAIL="No execution output file — Claude agent never started. Check workflow logs."
              echo "  Error type: $ERROR_TYPE (no exec file at $EXEC_FILE)"
            fi

            # Explicit max_turns detection — use 90% of configured max_turns as threshold
            TURN_THRESHOLD=$(( ${CONFIGURED_MAX_TURNS:-50} * 90 / 100 ))
            if [ -z "$ERROR_TYPE" ] || [ "$ERROR_TYPE" = "" ]; then
              if [ "$TURNS" -ge "$TURN_THRESHOLD" ] 2>/dev/null; then
                ERROR_TYPE="error_max_turns"
                ERROR_DETAIL="${ERROR_DETAIL:-No error message in execution output}"
              fi
            fi

            # Fallback: if still empty, capture GitHub Actions step conclusion
            if [ -z "$ERROR_TYPE" ]; then
              ERROR_TYPE="error_unknown"
            fi
            if [ -z "$ERROR_DETAIL" ]; then
              ERROR_DETAIL="Agent step outcome=${{ steps.agent.outcome }}, conclusion=${{ steps.agent.conclusion }}. Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            fi
          fi

          # Outcome classification for max_turns failures — detect partial progress
          PROGRESS_CLASS="no_progress"
          LAST_COMMIT=""
          if echo "$ERROR_TYPE" | grep -q "max_turns"; then
            COMMIT_COUNT=$(git log --oneline origin/main..HEAD 2>/dev/null | wc -l | tr -d ' ')
            UNCOMMITTED=$(git diff --stat HEAD 2>/dev/null | tail -1)
            LAST_COMMIT=$(git log --oneline -1 HEAD 2>/dev/null | head -c 120 || echo "")
            if [ "${COMMIT_COUNT:-0}" -gt 0 ] || [ -n "$UNCOMMITTED" ]; then
              PROGRESS_CLASS="partial_progress"
              echo "  Progress detected: $COMMIT_COUNT commits, uncommitted: ${UNCOMMITTED:-none}"
            else
              echo "  No progress detected — no commits or file changes"
            fi
          fi

          # Determine final STATUS — reclassify max_turns with partial progress as "partial"
          if [ "$AGENT_OUTCOME" = "success" ]; then
            STATUS="success"
          elif [ "$PROGRESS_CLASS" = "partial_progress" ] && echo "$ERROR_TYPE" | grep -q "max_turns"; then
            STATUS="partial"
            echo "  Reclassified: max_turns + partial_progress → status=partial (not failed)"
          else
            STATUS="failed"
          fi

          # Extract PR info from agent output for backlog tracking
          PR_NUMBER=""
          PR_BRANCH=""
          PR_FILES=""
          if [ "$STATUS" = "success" ] || [ "$STATUS" = "partial" ]; then
            EXEC_FILE="${{ steps.agent.outputs.execution_file }}"
            if [ -z "$EXEC_FILE" ] || [ ! -f "$EXEC_FILE" ]; then
              EXEC_FILE="/home/runner/work/_temp/claude-execution-output.json"
            fi
            if [ -f "$EXEC_FILE" ] && [ -s "$EXEC_FILE" ]; then
              # Extract PR number from agent's output (looks for gh pr create output or JSON)
              RESULT_TEXT=$(jq -r '[.[] | select(.type == "assistant")] | last | [.message.content[]? | select(.type == "text") | .text] | join("\n")' "$EXEC_FILE" 2>/dev/null || echo "")
              PR_NUMBER=$(echo "$RESULT_TEXT" | grep -oP '(?:PR |pull/|pr_number.*?)\K\d+' | head -1 || echo "")
              if [ -z "$PR_NUMBER" ]; then
                # Try from tool results (gh pr create returns URL)
                PR_NUMBER=$(jq -r '[.[] | select(.type == "tool_result")] | .[-1].content // "" | tostring' "$EXEC_FILE" 2>/dev/null | grep -oP 'pull/\K\d+' | head -1 || echo "")
              fi
              PR_BRANCH=$(echo "$RESULT_TEXT" | grep -oP '"branch"\s*:\s*"\K[^"]+' | head -1 || echo "")
              echo "  Extracted PR info: number=$PR_NUMBER branch=$PR_BRANCH"
            fi
          fi

          # For partial exits: commit any uncommitted work and push the branch
          if [ "$STATUS" = "partial" ]; then
            if [ -n "$(git diff --stat HEAD 2>/dev/null)" ] || [ -n "$(git diff --cached --stat HEAD 2>/dev/null)" ]; then
              git add -A 2>/dev/null || true
              git commit -m "wip: partial progress — max_turns reached, work preserved for continuation" 2>/dev/null || true
              LAST_COMMIT=$(git log --oneline -1 HEAD 2>/dev/null | head -c 120 || echo "")
              echo "  Committed uncommitted partial work"
            fi
            CURRENT_BRANCH=$(git branch --show-current 2>/dev/null || echo "")
            if [ -n "$CURRENT_BRANCH" ] && [ "$CURRENT_BRANCH" != "main" ]; then
              git push -u origin "$CURRENT_BRANCH" 2>/dev/null || true
              PR_BRANCH="$CURRENT_BRANCH"
              echo "  Pushed partial work to $CURRENT_BRANCH"
            fi
          fi

          if [ -n "$BACKLOG_ID" ] || [ "$(echo "${PAYLOAD_JSON}" | jq -r '.chain_next // false')" = "true" ]; then
            # Build callback payload with PR tracking data
            CALLBACK_PAYLOAD="{\"completed_id\":\"${BACKLOG_ID}\",\"completed_status\":\"${STATUS}\""
            if [ -n "$ERROR_TYPE" ]; then
              CALLBACK_PAYLOAD="${CALLBACK_PAYLOAD},\"error\":\"${ERROR_TYPE}: ${ERROR_DETAIL:0:200} (${TURNS:-0} turns)\""
            fi
            if [ -n "$PR_NUMBER" ]; then
              CALLBACK_PAYLOAD="${CALLBACK_PAYLOAD},\"pr_number\":\"${PR_NUMBER}\""
            fi
            if [ -n "$PR_BRANCH" ]; then
              CALLBACK_PAYLOAD="${CALLBACK_PAYLOAD},\"branch\":\"${PR_BRANCH}\""
            fi
            if [ "$PROGRESS_CLASS" != "no_progress" ] && [ -n "$PROGRESS_CLASS" ]; then
              CALLBACK_PAYLOAD="${CALLBACK_PAYLOAD},\"progress_class\":\"${PROGRESS_CLASS}\""
            fi
            if [ -n "$LAST_COMMIT" ]; then
              SAFE_COMMIT=$(echo "$LAST_COMMIT" | sed 's/"/\\"/g')
              CALLBACK_PAYLOAD="${CALLBACK_PAYLOAD},\"last_commit\":\"${SAFE_COMMIT}\""
            fi
            if [ "${TURNS:-0}" -gt 0 ] 2>/dev/null; then
              CALLBACK_PAYLOAD="${CALLBACK_PAYLOAD},\"turns_used\":${TURNS},\"max_turns\":${CONFIGURED_MAX_TURNS:-50}"
            fi
            CALLBACK_PAYLOAD="${CALLBACK_PAYLOAD}}"

            # First try to chain to next backlog item
            echo "Chaining: marking $BACKLOG_ID as $STATUS (PR #${PR_NUMBER:-none}), dispatching next..."
            BACKLOG_RESULT=$(curl -s -X POST "$HIVE_URL/api/backlog/dispatch" \
              -H "Authorization: Bearer $OIDC_TOKEN" \
              -H "Content-Type: application/json" \
              -d "$CALLBACK_PAYLOAD" || echo "{}")
            echo "  Backlog result: $BACKLOG_RESULT"
          fi

          # Always dispatch cycle_complete so CEO can score the completed cycle
          echo "Dispatching cycle_complete..."
          GH_TOKEN="${{ steps.auth.outputs.gh_pat }}"
          curl -s -X POST "https://api.github.com/repos/${GITHUB_REPOSITORY}/dispatches" \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github.v3+json" \
            -d "{\"event_type\":\"cycle_complete\",\"client_payload\":{\"company\":\"${COMPANY}\",\"source\":\"engineer\",\"status\":\"${STATUS}\"}}" || true

      - name: Log failure to Hive API
        if: failure() || cancelled()
        env:
          PAYLOAD_JSON: ${{ needs.context.outputs.payload }}
        run: |
          OIDC_TOKEN=$(curl -s -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=https://hive-phi.vercel.app" \
            | jq -r '.value')

          # Extract error from Claude's execution output
          EXEC_FILE="${{ steps.agent.outputs.execution_file }}"
          if [ -z "$EXEC_FILE" ] || [ ! -f "$EXEC_FILE" ]; then
            EXEC_FILE="/home/runner/work/_temp/claude-execution-output.json"
          fi

          RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ -f "$EXEC_FILE" ] && [ -s "$EXEC_FILE" ]; then
            # File exists — extract from last entry (covers all exit types: result, error, system)
            SUBTYPE=$(jq -r '.[-1].subtype // "unknown"' "$EXEC_FILE" 2>/dev/null || echo "unknown")
            TURNS=$(jq -r '.[-1].num_turns // 0' "$EXEC_FILE" 2>/dev/null || echo "0")
            # Try multiple error locations: .error on last, .result on last, scan for system/error types
            ERROR_MSG=$(jq -r '
              (.[-1].error // null) as $e1 |
              (.[-1].result // null) as $e2 |
              ([.[] | select(.type == "system" or .type == "error")] | last | .error // .result // null) as $e3 |
              ($e1 // $e2 // $e3 // "No error message in execution output") | tostring | .[0:500]
            ' "$EXEC_FILE" 2>/dev/null || echo "Failed to parse execution file")
          else
            # No execution file — Claude never started
            SUBTYPE="workflow_crash"
            TURNS="0"
            ERROR_MSG="No execution output file produced. Claude agent never started. Likely: payload too large, workflow syntax error, or GitHub Actions resource issue. Run: ${RUN_URL}"
          fi

          TASK=$(echo "${PAYLOAD_JSON}" | jq -r '.task // "Hive-internal work"' 2>/dev/null | head -c 100 || echo "unknown")

          # Escape for JSON
          ERROR_ESCAPED=$(echo "$ERROR_MSG" | jq -Rs '.' | sed 's/^"//;s/"$//')
          TASK_ESCAPED=$(echo "$TASK" | jq -Rs '.' | sed 's/^"//;s/"$//')

          # 0-turn failures are ghost runs (workflow issues, not real agent failures).
          # Log as 'skipped' to avoid inflating failure rate metrics.
          LOG_STATUS="failed"
          if [ "$TURNS" = "0" ]; then
            LOG_STATUS="skipped"
          fi

          echo "Logging $LOG_STATUS: subtype=$SUBTYPE turns=$TURNS error=${ERROR_MSG:0:100}"

          curl -s -X POST "https://hive-phi.vercel.app/api/agents/log" \
            -H "Authorization: Bearer $OIDC_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"company_slug\":\"${{ needs.context.outputs.company }}\",\"agent\":\"engineer\",\"action_type\":\"feature_request\",\"status\":\"${LOG_STATUS}\",\"description\":\"${TASK_ESCAPED}\",\"error\":\"${SUBTYPE}: ${ERROR_ESCAPED} (${TURNS} turns) ${RUN_URL}\"}" || true

          # Send enriched Telegram notification for failures (skip ghost runs)
          if [ "$LOG_STATUS" = "failed" ]; then
            curl -s -X POST "https://hive-phi.vercel.app/api/notify" \
              -H "Authorization: Bearer $OIDC_TOKEN" \
              -H "Content-Type: application/json" \
              -d "{\"agent\":\"engineer\",\"action\":\"feature_request\",\"company\":\"${{ needs.context.outputs.company }}\",\"status\":\"failed\",\"summary\":\"${SUBTYPE} after ${TURNS} turns\",\"error\":\"${ERROR_ESCAPED:0:200}\",\"run_url\":\"$RUN_URL\",\"task_title\":\"${TASK_ESCAPED:0:100}\",\"duration_s\":$((TURNS * 60))}" || true
          fi

          # Job summary
          STATUS_ICON="✅"
          [ "$LOG_STATUS" = "failed" ] && STATUS_ICON="❌"
          [ "$LOG_STATUS" = "skipped" ] && STATUS_ICON="⏭️"
          COMPANY="${{ needs.context.outputs.company }}"
          TASK_SHORT="${TASK_ESCAPED:0:120}"
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          # ${STATUS_ICON} Engineer — ${SUBTYPE} (${COMPANY})

          | Field | Value |
          |-------|-------|
          | Task | ${TASK_SHORT} |
          | Subtype | \`${SUBTYPE}\` |
          | Company | \`${COMPANY}\` |
          | Outcome | ${LOG_STATUS} (${TURNS} turns) |
          | Run | [View logs](${RUN_URL}) |
          EOF
