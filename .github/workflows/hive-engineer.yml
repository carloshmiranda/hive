name: Hive Engineer
run-name: "Engineer: ${{ github.event.action || github.event_name }} — ${{ github.event.client_payload.company || github.event.inputs.company || 'task' }}"

on:
  repository_dispatch:
    types:
      - new_company
      - feature_request
      - ops_escalation
      - deploy_drift

  workflow_dispatch:
    inputs:
      task:
        description: 'Task description'
        required: false
        default: ''
      company:
        description: 'Company slug'
        required: false
        default: ''

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  GH_PAT: ${{ secrets.GH_PAT }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
  # ─── Resolve context for all jobs ───
  context:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      trigger: ${{ steps.ctx.outputs.trigger }}
      payload: ${{ steps.ctx.outputs.payload }}
      company: ${{ steps.resolve.outputs.company }}
      company_repo: ${{ steps.resolve.outputs.company_repo }}

    steps:
      - name: Build context
        id: ctx
        run: |
          set_output() {
            local key="$1" value="$2"
            echo "${key}<<GHEOF" >> $GITHUB_OUTPUT
            echo "${value}" >> $GITHUB_OUTPUT
            echo "GHEOF" >> $GITHUB_OUTPUT
          }

          EVENT="${{ github.event_name }}"
          if [ "$EVENT" = "repository_dispatch" ]; then
            ACTION="${{ github.event.action }}"
            PAYLOAD='${{ toJson(github.event.client_payload) }}'
            set_output "trigger" "${ACTION}"
            set_output "payload" "${PAYLOAD}"
          else
            set_output "trigger" "manual"
            set_output "payload" "{\"task\":\"${{ github.event.inputs.task }}\",\"company\":\"${{ github.event.inputs.company }}\"}"
          fi

      - name: Resolve company repo
        id: resolve
        run: |
          npm install --no-save postgres 2>/dev/null
          COMPANY=$(echo '${{ toJson(github.event.client_payload) }}' | jq -r '.company // ""' 2>/dev/null || echo "")
          if [ -z "$COMPANY" ]; then
            COMPANY="${{ github.event.inputs.company }}"
          fi
          echo "company=${COMPANY}" >> $GITHUB_OUTPUT

          # Look up github_repo from DB
          if [ -n "$COMPANY" ]; then
            REPO=$(node -e "
              const postgres = require('postgres');
              const sql = postgres(process.env.DATABASE_URL);
              sql\`SELECT github_repo FROM companies WHERE slug = \${'${COMPANY}'} LIMIT 1\`
                .then(r => { console.log(r[0]?.github_repo || ''); return sql.end(); })
                .catch(() => process.exit(0));
            " 2>/dev/null || echo "")
            echo "company_repo=${REPO}" >> $GITHUB_OUTPUT
          else
            echo "company_repo=" >> $GITHUB_OUTPUT
          fi

  # ─── Job 1: Provision new company (needs Hive repo for templates) ───
  provision:
    needs: context
    if: needs.context.outputs.trigger == 'new_company'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}

    steps:
      - name: Checkout Hive (for templates)
        uses: actions/checkout@v4

      - name: Run provision agent
        id: agent
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model claude-sonnet-4-20250514 --max-turns 15 --allowedTools Bash,Read,Write,Edit"
          prompt: |
            You are the Engineer agent of Hive. You provision infrastructure for new companies.

            TRIGGER: ${{ needs.context.outputs.trigger }}
            PAYLOAD: ${{ needs.context.outputs.payload }}

            FIRST check if already provisioned:
            `SELECT status, github_repo, vercel_project_id FROM companies WHERE slug = '${{ needs.context.outputs.company }}'`
            If status is 'mvp' AND github_repo IS NOT NULL AND vercel_project_id IS NOT NULL → already done.
            Log success and output: { "company": "${{ needs.context.outputs.company }}", "provisioned": true, "skipped": true }

            Otherwise, query: `SELECT name, slug, description FROM companies WHERE slug = '${{ needs.context.outputs.company }}'`
            Then execute these steps IN ORDER:

            IMPORTANT: For ALL `gh` commands, you MUST set GH_TOKEN so it uses the personal access token:
            `export GH_TOKEN="$GH_PAT"`

            1. Create GitHub repo: `GH_TOKEN="$GH_PAT" gh repo create carloshmiranda/<slug> --public --description "<description>"`
               If the repo already exists, skip this step.
            2. Copy templates/boilerplate/ into /tmp/<slug>, then replace ALL template placeholders:
               Run these sed commands (use -i for in-place, order matters):
               ```bash
               cd /tmp/<slug>
               # IMPORTANT: Do NOT run sed on .github/workflows/ — those use ${{ }} (GitHub Actions syntax, not templates)
               find . -path ./.github -prune -o -type f \( -name '*.ts' -o -name '*.tsx' -o -name '*.json' -o -name '*.txt' -o -name '*.md' -o -name '*.mjs' -o -name '*.example' \) -print | xargs sed -i '' \
                 -e 's/{{SLUG}}/<slug>/g' \
                 -e 's/{{COMPANY_NAME}}/<company_name>/g' \
                 -e 's/{{DESCRIPTION}}/<description>/g' \
                 -e 's/{{COMPANY_URL}}/https:\/\/<slug>.vercel.app/g' \
                 -e 's/{{TARGET_AUDIENCE}}/<target_audience_from_proposal>/g' \
                 -e 's/{{VALUE_PROPOSITION}}/<value_prop_from_proposal>/g'
               ```
               Get TARGET_AUDIENCE and VALUE_PROPOSITION from the proposal context (step below).
               Do NOT replace `{{POSITION}}` in waitlist/route.ts — that's a runtime template.
               Verify no template placeholders remain: `grep -r '{{[A-Z]' /tmp/<slug>/ --include='*.ts' --include='*.tsx' --include='*.json' --include='*.txt' --include='*.md' | grep -v POSITION | grep -v node_modules`
               - CLAUDE.md: Use templates/company-claude.md, replace ALL {{PLACEHOLDERS}} with real company data from the DB query.
                 Query the approval context for the full proposal: `SELECT context FROM approvals WHERE company_id = '<id>' AND gate_type = 'new_company' ORDER BY created_at DESC LIMIT 1`
                 Use context.proposal for description, target audience, etc.
                 Query playbook for insights: `SELECT domain, insight FROM playbook WHERE confidence >= 0.6 ORDER BY confidence DESC LIMIT 5`
                 This CLAUDE.md is what gives agents context to work on the company repo — make it thorough.
            2b. Set up GitHub Actions secrets on the new repo (needed for hive-build.yml):
               ```bash
               GH_TOKEN="$GH_PAT" gh secret set DATABASE_URL --repo carloshmiranda/<slug> --body "$DATABASE_URL"
               GH_TOKEN="$GH_PAT" gh secret set GH_PAT --repo carloshmiranda/<slug> --body "$GH_PAT"
               GH_TOKEN="$GH_PAT" gh secret set CLAUDE_CODE_OAUTH_TOKEN --repo carloshmiranda/<slug> --body "$CLAUDE_CODE_OAUTH_TOKEN"
               GH_TOKEN="$GH_PAT" gh secret set GEMINI_API_KEY --repo carloshmiranda/<slug> --body "$GEMINI_API_KEY"
               ```
            3. Configure git and push to the new repo:
               ```bash
               cd /tmp/<slug>
               git init && git add -A
               git config user.name "Hive Engineer"
               git config user.email "noreply@github.com"
               git commit -m "Initial scaffold"
               git remote add origin https://x-access-token:${GH_PAT}@github.com/carloshmiranda/<slug>.git
               git push -u origin main
               ```
               If the remote already has commits, use `git push -u origin main --force`.
            4. Create Vercel project using curl:
               ```
               curl -s -X POST "https://api.vercel.com/v10/projects" \
                 -H "Authorization: Bearer $VERCEL_TOKEN" \
                 -H "Content-Type: application/json" \
                 -d '{"name":"<slug>","framework":"nextjs","gitRepository":{"type":"github","repo":"carloshmiranda/<slug>"}}'
               ```
               If Vercel returns "project already exists", skip this step.
            4b. Set environment variables on the Vercel project:
               ```
               curl -s -X POST "https://api.vercel.com/v10/projects/<slug>/env" \
                 -H "Authorization: Bearer $VERCEL_TOKEN" \
                 -H "Content-Type: application/json" \
                 -d '[{"key":"DATABASE_URL","value":"placeholder_set_real_value_later","target":["production","preview"],"type":"plain"}]'
               ```
            5. Record infra in DB:
               ```sql
               INSERT INTO infra (company_id, service, resource_id, config)
               VALUES ('<id>', 'github', 'carloshmiranda/<slug>', '{}'),
                      ('<id>', 'vercel', '<slug>', '{}')
               ON CONFLICT DO NOTHING
               ```
            6. Update company:
               ```sql
               UPDATE companies SET
                 status = 'mvp',
                 vercel_project_id = '<slug>',
                 vercel_url = 'https://<slug>.vercel.app',
                 github_repo = 'carloshmiranda/<slug>',
                 updated_at = NOW()
               WHERE id = '<id>'
               ```
            7. Log success: `INSERT INTO agent_actions (agent, company_id, action_type, status, description, started_at, finished_at) VALUES ('engineer', '<id>', 'scaffold_company', 'success', 'Provisioned: GitHub repo + Vercel project', NOW(), NOW())`

            Do NOT create a Neon database or Stripe product — skip those for now.
            Output: { "company": "<slug>", "provisioned": true }

  # ─── Job 2: Dispatch build to company repo (runs on their unlimited Actions minutes) ───
  build:
    needs: context
    if: >
      needs.context.outputs.company_repo != '' && (
        needs.context.outputs.trigger == 'feature_request' ||
        needs.context.outputs.trigger == 'ops_escalation' ||
        needs.context.outputs.trigger == 'deploy_drift' ||
        startsWith(needs.context.outputs.trigger, 'issue:') ||
        needs.context.outputs.trigger == 'manual'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Dispatch build to company repo
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          COMPANY="${{ needs.context.outputs.company }}"
          COMPANY_REPO="${{ needs.context.outputs.company_repo }}"
          TRIGGER="${{ needs.context.outputs.trigger }}"
          PAYLOAD='${{ needs.context.outputs.payload }}'
          TASK_SUMMARY=$(echo "$PAYLOAD" | jq -r '.task // .title // "Build task"' 2>/dev/null | head -c 100)

          echo "Dispatching build to ${COMPANY_REPO} (runs on company's unlimited Actions minutes)"

          # Trigger workflow_dispatch on the company repo's hive-build.yml
          HTTP_CODE=$(curl -s -o /tmp/dispatch-response.txt -w "%{http_code}" \
            -X POST "https://api.github.com/repos/${COMPANY_REPO}/actions/workflows/hive-build.yml/dispatches" \
            -H "Authorization: token $GH_TOKEN" \
            -H "Accept: application/vnd.github.v3+json" \
            -H "Content-Type: application/json" \
            -d "{
              \"ref\": \"main\",
              \"inputs\": {
                \"task_summary\": \"${TASK_SUMMARY}\",
                \"company_slug\": \"${COMPANY}\",
                \"trigger\": \"${TRIGGER}\",
                \"payload\": $(echo "$PAYLOAD" | jq -c '.' 2>/dev/null || echo '{}')
              }
            }")

          if [ "$HTTP_CODE" = "204" ]; then
            echo "Build dispatched to ${COMPANY_REPO} (HTTP ${HTTP_CODE})"
          else
            echo "Dispatch failed (HTTP ${HTTP_CODE}):"
            cat /tmp/dispatch-response.txt
            exit 1
          fi

      - name: Log dispatch to DB
        if: success()
        run: |
          npm install --no-save postgres 2>/dev/null
          node -e "
          const postgres = require('postgres');
          const sql = postgres(process.env.DATABASE_URL);
          async function log() {
            const [c] = await sql\`SELECT id FROM companies WHERE slug = '${{ needs.context.outputs.company }}' LIMIT 1\`;
            await sql\`
              INSERT INTO agent_actions (agent, company_id, action_type, status, description, started_at, finished_at)
              VALUES ('engineer', \${c?.id || null}, '${{ needs.context.outputs.trigger }}', 'success',
                'Dispatched build to company repo ${{ needs.context.outputs.company_repo }}', NOW(), NOW())
            \`;
            await sql.end();
          }
          log().catch(e => console.error(e.message));
          "

  # ─── Job 2b: Fallback — no company repo, run on Hive (Hive-internal work only) ───
  build-hive:
    needs: context
    if: >
      needs.context.outputs.company_repo == '' && (
        needs.context.outputs.trigger == 'feature_request' ||
        needs.context.outputs.trigger == 'ops_escalation' ||
        needs.context.outputs.trigger == 'deploy_drift' ||
        startsWith(needs.context.outputs.trigger, 'issue:') ||
        needs.context.outputs.trigger == 'manual'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Hive
        uses: actions/checkout@v4

      - name: Configure git
        run: |
          git config user.name "Hive Engineer"
          git config user.email "noreply@github.com"

      - name: Run build agent (Hive-internal only)
        id: agent
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model claude-sonnet-4-20250514 --max-turns 35 --allowedTools Bash,Read,Write,Edit"
          prompt: |
            You are the Engineer agent of Hive. You are working on the Hive repo itself.

            TRIGGER: ${{ needs.context.outputs.trigger }}
            PAYLOAD: ${{ needs.context.outputs.payload }}
            COMPANY: ${{ needs.context.outputs.company }}

            WARNING: The company has no github_repo yet. You are in the Hive repo.
            Only do Hive-internal work (templates, boilerplate, operational improvements).
            If this is a feature_request for a company, log: "Company needs provisioning first" and exit.

            For Hive-internal issues/tasks:
            1. Implement the change in the current directory
            2. Build to verify: `npx next build` — fix any errors
            3. Commit and push
            4. Log to agent_actions

            RULES:
            - Always use `GH_TOKEN="$GH_PAT"` for gh commands
            - Write to agent_actions table: what you did, status, any errors

      - name: Log failure to DB
        if: always() && steps.agent.outcome == 'failure'
        run: |
          npm install --no-save postgres 2>/dev/null
          COMPANY="${{ needs.context.outputs.company }}"
          node -e "
          const postgres = require('postgres');
          const sql = postgres(process.env.DATABASE_URL);
          async function log() {
            const companyId = '${COMPANY}' ? (await sql\`SELECT id FROM companies WHERE slug = '${COMPANY}' LIMIT 1\`)[0]?.id : null;
            await sql\`
              INSERT INTO agent_actions (agent, action_type, status, error, started_at, finished_at, company_id)
              VALUES ('engineer', 'feature_request', 'failed', 'Hive-internal build failed', NOW() - INTERVAL '30 minutes', NOW(), \${companyId})
            \`;
            await sql.end();
          }
          log().catch(e => console.error(e.message));
          "
