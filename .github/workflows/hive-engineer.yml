name: Hive Engineer
run-name: "Engineer: ${{ github.event.action || github.event_name }} — ${{ github.event.client_payload.company || github.event.inputs.company || 'task' }}"

on:
  repository_dispatch:
    types:
      - new_company
      - feature_request
      - ops_escalation
      - deploy_drift

  issues:
    types: [opened, labeled]

  pull_request_review:
    types: [submitted]

  workflow_dispatch:
    inputs:
      task:
        description: 'Task description'
        required: false
        default: ''
      company:
        description: 'Company slug'
        required: false
        default: ''

permissions:
  contents: write
  issues: write
  pull-requests: write
  id-token: write

env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  GH_PAT: ${{ secrets.GH_PAT }}
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
  engineer:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    # Only run on issues with feature/bug labels, or approved PR reviews
    if: >
      github.event_name != 'issues' ||
      contains(github.event.issue.labels.*.name, 'feature') ||
      contains(github.event.issue.labels.*.name, 'bug')

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build Engineer context
        id: context
        run: |
          EVENT="${{ github.event_name }}"

          set_output() {
            local key="$1" value="$2"
            echo "${key}<<GHEOF" >> $GITHUB_OUTPUT
            echo "${value}" >> $GITHUB_OUTPUT
            echo "GHEOF" >> $GITHUB_OUTPUT
          }

          if [ "$EVENT" = "repository_dispatch" ]; then
            ACTION="${{ github.event.action }}"
            PAYLOAD='${{ toJson(github.event.client_payload) }}'
            set_output "trigger" "${ACTION}"
            set_output "payload" "${PAYLOAD}"
          elif [ "$EVENT" = "issues" ]; then
            set_output "trigger" "issue:#${{ github.event.issue.number }} ${{ github.event.issue.title }}"
            set_output "payload" "{\"issue_number\":${{ github.event.issue.number }},\"title\":\"${{ github.event.issue.title }}\",\"body\":$(echo '${{ github.event.issue.body }}' | jq -Rs .)}"
          elif [ "$EVENT" = "pull_request_review" ]; then
            set_output "trigger" "pr_approved:#${{ github.event.pull_request.number }}"
            set_output "payload" "{\"pr_number\":${{ github.event.pull_request.number }},\"state\":\"${{ github.event.review.state }}\"}"
          else
            set_output "trigger" "manual"
            set_output "payload" "{\"task\":\"${{ github.event.inputs.task }}\",\"company\":\"${{ github.event.inputs.company }}\"}"
          fi

      - name: Run Engineer agent
        id: agent
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: "--model claude-sonnet-4-20250514 --max-turns 50 --allowedTools Bash,Read,Write,Edit"
          prompt: |
            You are the Engineer agent of Hive. You write code, fix bugs, and deploy.

            TRIGGER: ${{ steps.context.outputs.trigger }}
            PAYLOAD: ${{ steps.context.outputs.payload }}

            Read BRIEFING.md and CLAUDE.md for context.

            Based on the trigger:

            ## new_company — Provision infrastructure for a new company
            Query the company from DB: `SELECT name, slug, description FROM companies WHERE id = '<company_id>'`
            Then execute these steps IN ORDER:

            IMPORTANT: For ALL `gh` commands, you MUST set GH_TOKEN so it uses the personal access token:
            `export GH_TOKEN="$GH_PAT"`

            1. Create GitHub repo: `GH_TOKEN="$GH_PAT" gh repo create carloshmiranda/<slug> --private --description "<description>"`
               If the repo already exists, skip this step.
            2. Copy templates/boilerplate/ into /tmp/<slug>, customize package.json name and CLAUDE.md with company details
            3. Push to the new repo: `cd /tmp/<slug> && git init && git add -A && git commit -m "Initial scaffold" && git remote add origin https://x-access-token:${GH_PAT}@github.com/carloshmiranda/<slug>.git && git push -u origin main`
               If the remote already has commits, use `git push -u origin main --force`.
            4. Create Vercel project using curl:
               ```
               curl -s -X POST "https://api.vercel.com/v10/projects" \
                 -H "Authorization: Bearer $VERCEL_TOKEN" \
                 -H "Content-Type: application/json" \
                 -d '{"name":"<slug>","framework":"nextjs","gitRepository":{"type":"github","repo":"carloshmiranda/<slug>"}}'
               ```
               If Vercel returns "project already exists", skip this step.
            4b. Set environment variables on the Vercel project:
               ```
               # The boilerplate needs DATABASE_URL at build time for API routes
               # For now, use a placeholder that makes neon() skip at build time
               curl -s -X POST "https://api.vercel.com/v10/projects/<slug>/env" \
                 -H "Authorization: Bearer $VERCEL_TOKEN" \
                 -H "Content-Type: application/json" \
                 -d '[{"key":"DATABASE_URL","value":"placeholder_set_real_value_later","target":["production","preview"],"type":"plain"}]'
               ```
               This prevents build failures from missing env vars.
            5. Record infra in DB using DATABASE_URL:
               ```sql
               INSERT INTO infra (company_id, service, resource_id, config)
               VALUES ('<id>', 'github', 'carloshmiranda/<slug>', '{}'),
                      ('<id>', 'vercel', '<slug>', '{}')
               ON CONFLICT DO NOTHING
               ```
            6. Update company with status AND infra references:
               ```sql
               UPDATE companies SET
                 status = 'mvp',
                 vercel_project_id = '<slug>',
                 vercel_url = 'https://<slug>.vercel.app',
                 github_repo = 'carloshmiranda/<slug>',
                 updated_at = NOW()
               WHERE id = '<id>'
               ```
            7. Log success: `INSERT INTO agent_actions (agent, company_id, action_type, status, description, started_at, finished_at) VALUES ('engineer', '<id>', 'scaffold_company', 'success', 'Provisioned: GitHub repo + Vercel project', NOW(), NOW())`

            Do NOT create a Neon database or Stripe product — skip those for now.

            ## feature_request — Build features from CEO plan
            Read the CEO plan from cycles table, implement the code changes in the company's repo, commit + push.

            ## ops_escalation — Fix errors
            Read the error from agent_actions, diagnose and fix, commit + push.

            ## deploy_drift — Fix stale deployments
            Check Vercel deployment status, trigger a redeploy if needed.

            ## Other triggers
            - issue (feature/bug): Implement the feature or fix described
            - pr_approved: Merge the PR and verify deploy
            - manual: Execute the specified task

            RULES:
            - For feature_request: run `npx next build` before committing, create a branch and open a PR
            - For new_company: commit directly to main (it's a new repo)
            - Write to agent_actions table: what you did, status, any errors
            - If you open a PR, output: { "pr_opened": true, "pr_number": N, "company": "slug" }
            - Output: { "company": "<slug>", "provisioned": true } for new_company

      - name: Log failure to DB
        if: always() && steps.agent.outcome == 'failure'
        run: |
          npm install --no-save postgres 2>/dev/null
          EXEC_FILE="${{ steps.agent.outputs.execution_file }}"
          SUBTYPE=$(jq -r '.[-1].subtype // "unknown"' "$EXEC_FILE" 2>/dev/null || echo "unknown")
          TURNS=$(jq -r '.[-1].num_turns // 0' "$EXEC_FILE" 2>/dev/null || echo "0")
          COST=$(jq -r '.[-1].total_cost_usd // 0' "$EXEC_FILE" 2>/dev/null || echo "0")
          COMPANY=$(echo '${{ steps.context.outputs.payload }}' | jq -r '.company // ""' 2>/dev/null || echo "")

          node -e "
          const postgres = require('postgres');
          const sql = postgres(process.env.DATABASE_URL);
          const SLUG = '${COMPANY}';
          async function log() {
            const companyId = SLUG ? (await sql\`SELECT id FROM companies WHERE slug = \${SLUG} LIMIT 1\`)[0]?.id : null;
            await sql\`
              INSERT INTO agent_actions (agent, action_type, status, error, output, started_at, finished_at, company_id)
              VALUES ('engineer', 'feature_request', 'failed',
                \${'error_' + '${SUBTYPE}' + ': exhausted after ${TURNS} turns (\$${COST} USD)'},
                \${JSON.stringify({subtype: '${SUBTYPE}', turns: parseInt('${TURNS}'), cost: parseFloat('${COST}')})}::jsonb,
                NOW() - INTERVAL '${TURNS} minutes', NOW(),
                \${companyId})
            \`;
            await sql.end();
          }
          log().catch(e => console.error('DB log failed:', e.message));
          "
          echo "Logged failure: $SUBTYPE ($TURNS turns, \$$COST)"

      - name: Chain dispatch
        if: always() && steps.agent.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          set +e  # Prevent grep/jq exit codes from crashing the step
          RESULT=$(jq -r '[.[] | select(.type == "assistant")] | last | [.message.content[] | select(.type == "text") | .text] | join("\n")' "${{ steps.agent.outputs.execution_file }}" 2>/dev/null || echo "{}")
          REPO="${{ github.repository }}"
          echo "Chain dispatch parsing last assistant output (${#RESULT} chars)"

          dispatch() {
            curl -s -X POST "https://api.github.com/repos/$REPO/dispatches" \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              -d "{\"event_type\":\"$1\",\"client_payload\":$2}"
            echo "  Dispatched: $1"
          }

          # Chain to CEO if PR opened (strategy review)
          echo "$RESULT" | grep -q "pr_opened.*true" && \
            dispatch "ceo_review" "{\"source\":\"engineer\",\"pr_number\":$(echo "$RESULT" | jq -r '.pr_number // 0' 2>/dev/null)}"

          echo "Chain dispatch complete"
