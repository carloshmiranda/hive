name: CI

on:
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'package.json'
      - 'package-lock.json'
      - 'next.config.*'
      - 'tailwind.config.*'
      - 'tsconfig.json'

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npx next build
        env:
          DATABASE_URL: postgresql://user:password@localhost:5432/fake_db
          NEXT_PUBLIC_URL: https://example.com
          LAUNCH_MODE: waitlist
          # Fake keys to satisfy build requirements
          STRIPE_SECRET_KEY: sk_test_fake
          STRIPE_WEBHOOK_SECRET: whsec_fake
          STRIPE_PRICE_ID: price_fake
          NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY: pk_test_fake
          RESEND_API_KEY: re_fake
          RESEND_WEBHOOK_SECRET: fake_secret