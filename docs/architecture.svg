<svg viewBox="0 0 800 680" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title { font-size: 18px; font-weight: 600; fill: #1a1a1a; }
      .subtitle { font-size: 11px; fill: #666; }
      .label { font-size: 13px; font-weight: 500; fill: #1a1a1a; }
      .small { font-size: 11px; fill: #666; }
      .tiny { font-size: 10px; fill: #888; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="680" fill="#fafaf8" rx="12"/>

  <!-- Title -->
  <text class="title" x="400" y="30" text-anchor="middle">Hive — Autonomous Venture Orchestrator</text>
  <text class="subtitle" x="400" y="48" text-anchor="middle">7 agents, event-driven, zero crons, Mac-free</text>

  <!-- ═══ EVENT SOURCES ═══ -->
  <text class="tiny" x="30" y="82">EVENT SOURCES</text>
  <rect x="30" y="90" width="88" height="32" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="0.5"/>
  <text class="small" x="74" y="110" text-anchor="middle">Stripe</text>
  <rect x="126" y="90" width="88" height="32" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="0.5"/>
  <text class="small" x="170" y="110" text-anchor="middle">Issues</text>
  <rect x="222" y="90" width="88" height="32" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="0.5"/>
  <text class="small" x="266" y="110" text-anchor="middle">PRs</text>
  <rect x="318" y="90" width="88" height="32" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="0.5"/>
  <text class="small" x="362" y="110" text-anchor="middle">Approvals</text>
  <rect x="414" y="90" width="88" height="32" rx="6" fill="#FEF3C7" stroke="#F59E0B" stroke-width="0.5"/>
  <text class="small" x="458" y="110" text-anchor="middle">Deploys</text>

  <!-- Sentinel -->
  <rect x="560" y="90" width="210" height="32" rx="6" fill="#F3F4F6" stroke="#9CA3AF" stroke-width="0.5"/>
  <text class="small" x="665" y="106" text-anchor="middle">Sentinel (catches gaps, 4h)</text>
  <text class="tiny" x="665" y="118" text-anchor="middle">queries Neon → dispatches if stale</text>

  <!-- Arrows from events -->
  <line x1="74" y1="122" x2="200" y2="158" stroke="#D97706" stroke-width="0.7" marker-end="url(#arr)"/>
  <line x1="170" y1="122" x2="480" y2="195" stroke="#D97706" stroke-width="0.7" marker-end="url(#arr)"/>
  <line x1="266" y1="122" x2="480" y2="195" stroke="#D97706" stroke-width="0.7" marker-end="url(#arr)"/>
  <line x1="362" y1="122" x2="250" y2="158" stroke="#D97706" stroke-width="0.7" marker-end="url(#arr)"/>
  <line x1="458" y1="122" x2="590" y2="296" stroke="#D97706" stroke-width="0.7" marker-end="url(#arr)"/>

  <!-- Sentinel dashed arrows -->
  <line x1="620" y1="122" x2="130" y2="240" stroke="#9CA3AF" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <line x1="660" y1="122" x2="400" y2="330" stroke="#9CA3AF" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arr)"/>
  <line x1="700" y1="122" x2="650" y2="370" stroke="#9CA3AF" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arr)"/>

  <!-- ═══ VERCEL WEBHOOK LAYER ═══ -->
  <rect x="30" y="148" width="300" height="40" rx="8" fill="#F0F0EC" stroke="#C4C4BE" stroke-width="0.5"/>
  <text class="label" x="180" y="166" text-anchor="middle">Vercel (webhooks only)</text>
  <text class="tiny" x="180" y="180" text-anchor="middle">Stripe, deploys → repository_dispatch</text>
  <line x1="330" y1="168" x2="420" y2="205" stroke="#7C3AED" stroke-width="0.8" marker-end="url(#arr)"/>

  <!-- ═══ GITHUB ACTIONS ROUTER ═══ -->
  <rect x="390" y="185" width="380" height="44" rx="10" fill="#EDE9FE" stroke="#7C3AED" stroke-width="0.5"/>
  <text class="label" x="580" y="205" text-anchor="middle">GitHub Actions (event router)</text>
  <text class="tiny" x="580" y="219" text-anchor="middle">repository_dispatch + issues + PRs + sentinel</text>

  <!-- Split arrows -->
  <line x1="480" y1="229" x2="200" y2="290" stroke="#0D9488" stroke-width="0.8" marker-end="url(#arr)"/>
  <line x1="650" y1="229" x2="590" y2="290" stroke="#7C3AED" stroke-width="0.8" marker-end="url(#arr)"/>
  <text class="tiny" x="310" y="260">claude-code-base-action</text>
  <text class="tiny" x="610" y="260" text-anchor="middle">curl dispatch</text>

  <!-- ═══ BRAIN TIER ═══ -->
  <text class="tiny" x="30" y="285">BRAIN TIER — Claude Max 5x on GitHub runners</text>
  <rect x="30" y="296" width="380" height="44" rx="10" fill="#CCFBF1" stroke="#0D9488" stroke-width="0.5"/>
  <text class="label" x="220" y="314" text-anchor="middle">GitHub runner + CLAUDE_CODE_OAUTH_TOKEN</text>
  <text class="tiny" x="220" y="330" text-anchor="middle">filesystem, git, bash, npm, web search</text>

  <!-- Brain agent boxes -->
  <rect x="34" y="356" width="82" height="48" rx="6" fill="#99F6E4" stroke="#0D9488" stroke-width="0.5"/>
  <text class="label" x="75" y="376" text-anchor="middle">CEO</text>
  <text class="tiny" x="75" y="392" text-anchor="middle">decides</text>

  <rect x="124" y="356" width="82" height="48" rx="6" fill="#99F6E4" stroke="#0D9488" stroke-width="0.5"/>
  <text class="label" x="165" y="376" text-anchor="middle">Scout</text>
  <text class="tiny" x="165" y="392" text-anchor="middle">researches</text>

  <rect x="214" y="356" width="96" height="48" rx="6" fill="#FECACA" stroke="#DC2626" stroke-width="0.5"/>
  <text class="label" x="262" y="376" text-anchor="middle">Engineer</text>
  <text class="tiny" x="262" y="392" text-anchor="middle">builds</text>

  <rect x="318" y="356" width="88" height="48" rx="6" fill="#99F6E4" stroke="#0D9488" stroke-width="0.5"/>
  <text class="label" x="362" y="376" text-anchor="middle">Evolver</text>
  <text class="tiny" x="362" y="392" text-anchor="middle">evolves</text>

  <!-- ═══ WORKER TIER ═══ -->
  <text class="tiny" x="450" y="285">WORKER TIER — Gemini/Groq on Vercel</text>
  <rect x="450" y="296" width="320" height="44" rx="10" fill="#EDE9FE" stroke="#7C3AED" stroke-width="0.5"/>
  <text class="label" x="610" y="314" text-anchor="middle">Vercel serverless</text>
  <text class="tiny" x="610" y="330" text-anchor="middle">Gemini Flash-Lite / Groq Llama 70B</text>

  <!-- Worker agent boxes -->
  <rect x="454" y="356" width="76" height="48" rx="6" fill="#DDD6FE" stroke="#7C3AED" stroke-width="0.5"/>
  <text class="label" x="492" y="376" text-anchor="middle">Ops</text>
  <text class="tiny" x="492" y="392" text-anchor="middle">monitors</text>

  <rect x="538" y="356" width="86" height="48" rx="6" fill="#DDD6FE" stroke="#7C3AED" stroke-width="0.5"/>
  <text class="label" x="581" y="376" text-anchor="middle">Growth</text>
  <text class="tiny" x="581" y="392" text-anchor="middle">creates</text>

  <rect x="632" y="356" width="96" height="48" rx="6" fill="#DDD6FE" stroke="#7C3AED" stroke-width="0.5"/>
  <text class="label" x="680" y="376" text-anchor="middle">Outreach</text>
  <text class="tiny" x="680" y="392" text-anchor="middle">drafts</text>

  <!-- ═══ CHAIN ARROWS ═══ -->
  <!-- CEO → Scout -->
  <path d="M75 404 L75 440 L140 440 L140 430" fill="none" stroke="#0D9488" stroke-width="0.8" marker-end="url(#arr)"/>
  <text class="tiny" x="108" y="437">low score</text>

  <!-- CEO → Engineer -->
  <path d="M116 380 L212 380" fill="none" stroke="#DC2626" stroke-width="0.8" marker-end="url(#arr)"/>

  <!-- Scout → Growth -->
  <path d="M206 380 L536 380" fill="none" stroke="#7C3AED" stroke-width="0.7" marker-end="url(#arr)"/>
  <text class="tiny" x="380" y="374">research done</text>

  <!-- Scout → Outreach -->
  <path d="M206 390 L630 390" fill="none" stroke="#7C3AED" stroke-width="0.7" marker-end="url(#arr)"/>
  <text class="tiny" x="420" y="400">leads found</text>

  <!-- Ops → Engineer (escalate) -->
  <path d="M454 380 L312 380" fill="none" stroke="#DC2626" stroke-width="0.7" marker-end="url(#arr)"/>

  <!-- Engineer → CEO (PR review) -->
  <path d="M262 356 L100 356 L100 404" fill="none" stroke="#0D9488" stroke-width="0.5" stroke-dasharray="4 3" marker-end="url(#arr)"/>

  <!-- ═══ NEON ═══ -->
  <line x1="220" y1="404" x2="380" y2="475" stroke="#6B7280" stroke-width="0.5" marker-end="url(#arr)"/>
  <line x1="610" y1="404" x2="480" y2="475" stroke="#6B7280" stroke-width="0.5" marker-end="url(#arr)"/>

  <rect x="320" y="470" width="220" height="40" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="0.5"/>
  <text class="label" x="430" y="490" text-anchor="middle">Neon (all state)</text>
  <text class="tiny" x="430" y="503" text-anchor="middle">companies, cycles, actions, research, approvals</text>

  <!-- Dashboard -->
  <line x1="430" y1="510" x2="430" y2="530" stroke="#6B7280" stroke-width="0.5" marker-end="url(#arr)"/>
  <rect x="320" y="530" width="220" height="32" rx="8" fill="#F3F4F6" stroke="#6B7280" stroke-width="0.5"/>
  <text class="label" x="430" y="550" text-anchor="middle">Dashboard (Vercel)</text>

  <!-- Company repos -->
  <line x1="262" y1="404" x2="130" y2="475" stroke="#DC2626" stroke-width="0.5" marker-end="url(#arr)"/>
  <rect x="30" y="470" width="200" height="40" rx="8" fill="#FEE2E2" stroke="#DC2626" stroke-width="0.5"/>
  <text class="label" x="130" y="488" text-anchor="middle">Company repos</text>
  <text class="tiny" x="130" y="502" text-anchor="middle">git push → Vercel deploy</text>

  <!-- ═══ LEGEND ═══ -->
  <line x1="30" y1="590" x2="770" y2="590" stroke="#E5E7EB" stroke-width="0.5" stroke-dasharray="4 4"/>

  <rect x="30" y="608" width="350" height="50" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="0.5"/>
  <text class="label" x="205" y="628" text-anchor="middle">$100/mo total (existing Max 5x)</text>
  <text class="tiny" x="205" y="646" text-anchor="middle">GitHub, Vercel, Neon all on free tiers</text>

  <rect x="420" y="608" width="350" height="50" rx="8" fill="#ECFDF5" stroke="#059669" stroke-width="0.5"/>
  <text class="label" x="595" y="628" text-anchor="middle">Mac not required</text>
  <text class="tiny" x="595" y="646" text-anchor="middle">Close lid, go travelling — Hive runs autonomously</text>
</svg>
